<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
<link rel="icon" type="image/png" sizes="64x64" href="./assets/edurena_logo_64.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Whack-a-Mole — Edurena</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#1a1006; --panel:#2a1c0e; --bdr:#4a3420;
      --txt:#fff4e6; --muted:#a08868;
      --acc:#ff9433; --grn:#00ff88; --red:#ff3355; --yel:#ffcc00;
      --f:'Plus Jakarta Sans',system-ui,sans-serif;
      --display:'Orbitron',monospace;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{
      position:fixed;inset:0;width:100%;height:100vh;height:100dvh;
      background:var(--bg);color:var(--txt);font-family:var(--f);
      overflow:hidden;touch-action:none;overscroll-behavior:none;
    }
    .screen{display:none;position:fixed;inset:0;z-index:100}
    .screen.on{display:flex;flex-direction:column;align-items:center;justify-content:center}
    #s-fatal{background:var(--bg);z-index:9999}
    #s-fatal h2{color:var(--red);font-family:var(--display);font-size:22px;margin-bottom:12px}
    #s-fatal p{color:var(--muted);font-size:14px;line-height:1.8;max-width:420px;text-align:center}

    #s-join{background:var(--bg)}
    .brand-title{font-family:var(--display);font-size:clamp(18px,5vw,32px);font-weight:900;letter-spacing:3px;color:var(--acc);margin-bottom:4px;text-shadow:0 0 20px rgba(255,148,51,.4)}
    .brand-sub{color:var(--muted);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:28px;text-align:center}
    .join-card{max-width:340px;width:100%;background:rgba(42,28,14,.95);border:1px solid var(--bdr);border-radius:16px;padding:24px;backdrop-filter:blur(16px);box-shadow:0 20px 60px rgba(0,0,0,0.5)}
    .field-lbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
    .inp{display:block;width:100%;padding:12px 14px;min-height:48px;background:#140d05;border:1.5px solid var(--bdr);border-radius:10px;color:var(--txt);font-size:16px;font-family:var(--f);outline:none;margin-bottom:14px;-webkit-appearance:none;touch-action:manipulation}
    .inp:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(255,148,51,0.15)}
    .inp-code{text-transform:uppercase;letter-spacing:4px;font-family:var(--display);font-size:16px;text-align:center}
    .join-btn{width:100%;padding:14px;min-height:52px;background:linear-gradient(135deg,#c0501c,#ff9433);color:#1a1006;border:none;border-radius:10px;font-size:15px;font-weight:700;font-family:var(--display);letter-spacing:1px;cursor:pointer;touch-action:manipulation;box-shadow:0 4px 24px rgba(255,148,51,0.3)}
    .join-btn:disabled{opacity:.5;cursor:not-allowed}
    .join-err{color:var(--red);font-size:13px;margin-top:10px;text-align:center;min-height:18px}

    #s-lobby{background:var(--bg)}
    .lobby-code{font-family:var(--display);font-size:clamp(32px,8vw,56px);font-weight:900;letter-spacing:8px;color:var(--acc);margin:8px 0;text-shadow:0 0 30px rgba(255,148,51,0.5)}
    .lobby-count{font-family:var(--display);font-size:44px;font-weight:900;color:var(--grn);margin-top:14px}
    .lobby-lbl{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin:4px 0 16px}
    .chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:520px;margin:0 auto 16px;min-height:32px}
    .chip{padding:4px 12px;background:#241608;border:1px solid #4a3420;border-radius:20px;font-size:12px;font-weight:600;color:var(--acc)}
    .pulse-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--acc);margin-right:7px;animation:pdot 1.4s ease-in-out infinite;vertical-align:middle}
    @keyframes pdot{0%,100%{opacity:1}50%{opacity:.3}}
    .lobby-wait{font-size:13px;color:var(--muted)}

    #s-countdown{background:var(--bg)}
    .cd-num{font-family:var(--display);font-size:clamp(100px,22vw,180px);font-weight:900;color:#fff;text-shadow:0 0 60px var(--acc)}

    /* ── GAME ── */
    #game-wrap{position:fixed;inset:0;display:none;flex-direction:column;z-index:1}
    #game-wrap.on{display:flex}
    .game-top{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:rgba(42,28,14,.9);border-bottom:1px solid var(--bdr)}
    .top-pill{background:rgba(255,148,51,.15);color:var(--acc);font-family:var(--display);font-size:10px;padding:4px 10px;border-radius:6px;border:1px solid rgba(255,148,51,.35)}
    .top-timer{font-family:var(--display);font-size:18px;color:var(--yel);text-shadow:0 0 8px rgba(255,204,0,.4)}
    .top-score{font-family:var(--display);font-size:13px;color:var(--grn)}

    #board-area{flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;gap:10px;position:relative}
    #board-frame{
      position:relative;padding:18px 16px 26px;border-radius:18px;width:min(84vw,320px);
      background:repeating-linear-gradient(115deg,#8b5a2b 0px,#8b5a2b 9px,#7a4d24 9px,#7a4d24 18px);
      border:8px solid #5c3a1a;
      box-shadow:0 10px 0 #3e2611,0 14px 24px rgba(0,0,0,.5),inset 0 0 26px rgba(0,0,0,.35);
    }
    #board-frame::before{content:'';position:absolute;inset:6px;border-radius:12px;border:2px solid rgba(255,255,255,.08);pointer-events:none}
    #hole-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;position:relative;z-index:1}
    .hole{
      position:relative;aspect-ratio:1;border-radius:50%;
      background:radial-gradient(circle at 50% 38%,#241710 0%,#0a0603 65%,#000 100%);
      box-shadow:inset 0 9px 16px rgba(0,0,0,.85),0 3px 0 rgba(255,255,255,.06),0 0 0 6px #5c3a1a,0 0 0 8px #3e2611;
      display:flex;align-items:center;justify-content:center;overflow:visible
    }
    .hole .mole{font-size:0;transform:scale(0) translateY(60%);transition:transform .22s cubic-bezier(.34,1.7,.64,1);user-select:none;filter:drop-shadow(0 4px 5px rgba(0,0,0,.6))}
    .hole.active .mole{font-size:clamp(28px,7vw,40px);transform:scale(1) translateY(0)}
    .hole.whacked .mole{transform:scale(.85) translateY(35%) rotate(8deg);filter:brightness(.55) drop-shadow(0 4px 5px rgba(0,0,0,.6))}
    .whack-fx{position:absolute;top:-6px;left:50%;font-size:0;opacity:0;pointer-events:none;transform:translateX(-50%)}
    .hole.whacked .whack-fx{font-size:13px;opacity:1;animation:whackPop .55s ease forwards}
    @keyframes whackPop{0%{transform:translateX(-50%) scale(.3);opacity:1}55%{transform:translateX(-50%) scale(1.5) rotate(-8deg);opacity:1}100%{transform:translateX(-50%) scale(1.9) rotate(4deg);opacity:0}}

    /* ── HAMMER ── */
    #hammer{
      position:absolute;width:46px;height:80px;left:50%;top:50%;
      transform-origin:14% 14%;transform:translate(-50%,-50%) rotate(-52deg);
      z-index:5;pointer-events:none;transition:left .12s ease,top .12s ease;
      filter:drop-shadow(0 6px 6px rgba(0,0,0,.5));
    }
    #hammer.idle{opacity:0;top:-40px}
    #hammer .handle{position:absolute;left:18px;top:18px;width:9px;height:62px;border-radius:5px;background:linear-gradient(90deg,#8a5a2e,#c98a4a,#8a5a2e)}
    #hammer .head{position:absolute;left:0;top:0;width:46px;height:26px;border-radius:7px;background:linear-gradient(180deg,#e63946,#a4151f);box-shadow:inset 0 -4px 6px rgba(0,0,0,.35),inset 0 3px 4px rgba(255,255,255,.25)}
    #hammer.swing{animation:hammerSwing .42s cubic-bezier(.36,0,.66,-0.1)}
    @keyframes hammerSwing{
      0%{transform:translate(-50%,-50%) rotate(-52deg);opacity:1}
      55%{transform:translate(-50%,-30%) rotate(8deg);opacity:1}
      75%{transform:translate(-50%,-30%) rotate(2deg);opacity:1}
      100%{transform:translate(-50%,-50%) rotate(-52deg);opacity:1}
    }
    #board-frame.impact{animation:boardShake .25s ease}
    @keyframes boardShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px) rotate(-.4deg)}75%{transform:translateX(4px) rotate(.4deg)}}
    .whack-comic{position:absolute;z-index:6;font-family:var(--display);font-weight:900;font-size:0;color:#fff;-webkit-text-stroke:2px #1a1006;text-shadow:2px 2px 0 #ff9433;pointer-events:none;opacity:0;transform:translate(-50%,-50%) scale(.4) rotate(-12deg)}
    .whack-comic.show{font-size:22px;opacity:1;animation:comicPop .6s cubic-bezier(.34,1.6,.64,1) forwards}
    @keyframes comicPop{0%{transform:translate(-50%,-50%) scale(.3) rotate(-12deg);opacity:0}30%{transform:translate(-50%,-60%) scale(1.15) rotate(4deg);opacity:1}100%{transform:translate(-50%,-90%) scale(.9) rotate(4deg);opacity:0}}
    #claim-banner{font-family:var(--display);font-size:13px;font-weight:700;color:var(--yel);text-align:center;min-height:18px;letter-spacing:1px}

    .bottom-panel{
      flex-shrink:0;background:linear-gradient(to top,rgba(20,13,5,.98),rgba(20,13,5,.9));
      border-top:2px solid rgba(255,148,51,0.55);padding:8px 10px calc(8px + env(safe-area-inset-bottom,0px));
      max-height:36vh;max-height:36dvh;overflow-y:auto;touch-action:pan-y;
    }
    .q-card{background:var(--panel);border:1px solid var(--bdr);border-left:3px solid rgba(255,148,51,0.6);border-radius:8px;padding:8px 10px}
    .q-num{font-family:var(--display);font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:4px}
    .q-txt{font-size:clamp(13px,2.2vw,16px);font-weight:600;color:var(--txt);line-height:1.4;margin-bottom:8px}
    .opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
    @media(max-width:380px){.opts-grid{grid-template-columns:1fr}}
    .opt-btn{display:flex;align-items:center;gap:6px;padding:11px 12px;border-radius:9px;background:#140d05;border:1.5px solid var(--bdr);color:var(--txt);font-size:14px;font-weight:600;font-family:var(--f);cursor:pointer;text-align:left;width:100%;min-height:50px;touch-action:manipulation}
    .opt-btn:disabled{cursor:not-allowed;opacity:.6}
    .opt-btn.correct{border-color:var(--grn);background:rgba(0,255,136,.1);color:var(--grn)}
    .opt-btn.wrong{border-color:var(--red);background:rgba(255,51,85,.08);color:var(--red)}
    .opt-key{width:22px;height:22px;border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:10px;font-weight:700;background:#2a1c0e;color:var(--muted)}
    .q-img-wrap{margin:4px 0 6px;text-align:center}
    .q-img-wrap img{max-width:100%;max-height:110px;border-radius:8px;object-fit:contain;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03)}
    .opt-img{max-width:100%;max-height:60px;border-radius:6px;margin-top:4px;object-fit:contain;display:block}
    .opts-grid.img-grid{grid-template-columns:1fr 1fr;gap:8px}
    .opt-btn.img-only{flex-direction:column;align-items:center;min-height:90px;padding:6px 8px;gap:4px}
    .opt-btn.img-only .opt-img{max-height:72px;width:100%;margin-top:0}
    .short-area{display:flex;gap:6px}
    .short-inp{flex:1;padding:10px 12px;min-height:48px;background:#140d05;border:1.5px solid var(--bdr);border-radius:8px;color:var(--txt);font-size:16px;font-family:var(--f);outline:none}
    .sub-btn{padding:8px 18px;background:linear-gradient(135deg,var(--acc),#ffcc00);color:#1a1006;border:none;border-radius:8px;font-size:13px;font-weight:700;font-family:var(--display);min-height:48px}
    .answered-msg{text-align:center;padding:14px;font-family:var(--display);font-size:12px;color:var(--muted);letter-spacing:1px}

    #s-leaderboard{background:var(--bg)}
    .lb-title{font-family:var(--display);font-size:18px;color:var(--acc);letter-spacing:2px;margin-bottom:18px}
    .lb-row{display:flex;align-items:center;gap:10px;width:min(86vw,360px);padding:9px 12px;background:var(--panel);border:1px solid var(--bdr);border-radius:9px;margin-bottom:6px}
    .lb-row.me{border-color:var(--acc)}
    .lb-pos{font-family:var(--display);font-size:13px;color:var(--muted);width:22px}
    .lb-name{flex:1;font-size:13px;font-weight:600}
    .lb-score{font-family:var(--display);font-size:13px;color:var(--yel)}

    .finish-overlay{position:fixed;inset:0;background:rgba(20,13,5,.94);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .8s}
    .finish-overlay.show{opacity:1;pointer-events:auto}
    .finish-title{font-family:var(--display);font-size:clamp(26px,7vw,46px);font-weight:900;color:var(--acc);letter-spacing:4px;text-shadow:0 0 30px rgba(255,148,51,.5)}
    .finish-rank{font-family:var(--display);font-size:clamp(40px,9vw,68px);font-weight:900;color:var(--yel);margin:16px 0}
    .finish-stat-val{font-family:var(--display);font-size:24px;font-weight:900;color:var(--acc)}
    .finish-stat-lbl{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:3px}
    .finish-stats{display:flex;gap:26px}
    .finish-stat{text-align:center}
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <base target="_blank">
</head>
<body>

<div class="screen on" id="s-fatal"><h2>CANNOT LOAD</h2><p id="fatal-msg">Open this from the Edurena student portal.</p></div>

<div class="screen" id="s-join">
  <div class="brand-title">WHACK-A-MOLE</div>
  <div class="brand-sub">Edurena &nbsp;&#x25BA;&nbsp; Fastest Correct Answer Wins</div>
  <div class="join-card">
    <div class="field-lbl">Game Code</div>
    <input class="inp inp-code" id="inp-code" type="text" placeholder="ABCDEF" maxlength="10" autocomplete="off" spellcheck="false">
    <div class="field-lbl">Your Name</div>
    <input class="inp" id="inp-name" type="text" placeholder="Your name" maxlength="20" autocomplete="given-name">
    <button class="join-btn" id="joinBtn">&#x1F528;&nbsp; JOIN GAME</button>
    <div class="join-err" id="joinErr"></div>
  </div>
</div>

<div class="screen" id="s-lobby">
  <div class="brand-title" style="font-size:clamp(14px,4vw,20px);margin-bottom:14px">WHACK-A-MOLE</div>
  <div style="font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase">GAME CODE</div>
  <div class="lobby-code" id="lby-code">------</div>
  <div class="lobby-count" id="lby-count">0</div>
  <div class="lobby-lbl">players in lobby</div>
  <div class="chips" id="lby-chips"></div>
  <div class="lobby-wait"><span class="pulse-dot"></span>Waiting for the host to start&hellip;</div>
</div>

<div class="screen" id="s-countdown"><div class="cd-num" id="cd-num">3</div></div>

<div id="game-wrap">
  <div class="game-top">
    <div class="top-pill" id="hud-code">---</div>
    <div class="top-timer" id="hud-timer">--</div>
    <div class="top-score" id="hud-score">0 pts</div>
  </div>
  <div id="board-area">
    <div id="board-frame">
      <div id="hole-grid"></div>
      <div id="hammer" class="idle"><div class="handle"></div><div class="head"></div></div>
    </div>
    <div id="claim-banner"></div>
  </div>
  <div class="bottom-panel" id="bottom-panel">
    <div class="q-card">
      <div class="q-num" id="q-num">Round 1</div>
      <div class="q-txt" id="q-txt">Loading&hellip;</div>
      <div id="q-img-area"></div>
      <div id="q-area"></div>
    </div>
  </div>
</div>

<div class="screen" id="s-leaderboard">
  <div class="lb-title">&#x1F3C6; LEADERBOARD</div>
  <div id="lb-rows"></div>
</div>

<div class="finish-overlay" id="finish-overlay">
  <div class="finish-title">GAME OVER!</div>
  <div class="finish-rank" id="finish-rank-num">P1</div>
  <div class="finish-stats">
    <div class="finish-stat"><div class="finish-stat-val" id="finish-whacked">0</div><div class="finish-stat-lbl">Moles Whacked</div></div>
    <div class="finish-stat"><div class="finish-stat-val" id="finish-score">0</div><div class="finish-stat-lbl">Total Score</div></div>
  </div>
</div>

<script>
(function(){
'use strict';

/* ════════════════ MOBILE ZOOM LOCK ════════════════ */
document.addEventListener('gesturestart', function(e){ e.preventDefault(); }, {passive:false});
document.addEventListener('gesturechange', function(e){ e.preventDefault(); }, {passive:false});
document.addEventListener('touchmove', function(e){ if(e.touches&&e.touches.length>1) e.preventDefault(); }, {passive:false});
var _lastTapTs=0;
document.addEventListener('touchend', function(e){ var now=Date.now(); if(now-_lastTapTs<300) e.preventDefault(); _lastTapTs=now; }, {passive:false});
function lockMobileZoom(){
  var vp=document.querySelector('meta[name=viewport]');
  if(vp){ var content=vp.getAttribute('content'); vp.setAttribute('content', content+', shrink-to-fit=no');
    requestAnimationFrame(function(){ requestAnimationFrame(function(){ vp.setAttribute('content', content); }); }); }
  if(window.scrollTo) window.scrollTo(0,0);
}
window.addEventListener('load', lockMobileZoom);

var P = new URLSearchParams(window.location.search);
var GAS_URL = (P.get('script') || '').trim();
function el(id){ return document.getElementById(id); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showScreen(id){ document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('on');}); var t=el(id); if(t) t.classList.add('on'); }

if (!GAS_URL) { el('fatal-msg').textContent = 'Missing backend URL.'; return; }
showScreen('s-join');

var db;
try {
  var cfg = {
    apiKey:'AIzaSyCLfySFzCpbz3CBX1bjha5KxvA0MrJExIc',
    authDomain:'kahoot-24063.firebaseapp.com',
    databaseURL:'https://kahoot-24063-default-rtdb.firebaseio.com',
    projectId:'kahoot-24063',
    storageBucket:'kahoot-24063.firebasestorage.app',
    messagingSenderId:'962917873467',
    appId:'1:962917873467:web:a6b526aee30cd15c92291e'
  };
  var existingApp = null;
  if (firebase.apps) firebase.apps.forEach(function(a){ if(a.name==='whack') existingApp=a; });
  db = firebase.database(existingApp || firebase.initializeApp(cfg,'whack'));
} catch(e) { showScreen('s-fatal'); el('fatal-msg').textContent = 'Firebase error: ' + e.message; return; }

/* ════════════════ STATE ════════════════ */
var sessionId='', playerId='', playerName='';
var questions=[], totalQ=0, timePerQ=12, holeCount=9;
var currentQIdx=-1, activeHole=-1, answered=false, claimWon=false;
var myScore=0, myWhacked=0;
var lobbyPRef=null, stateRef=null, claimRef=null;
var timerRaf=null, roundDeadline=0;

el('joinBtn').addEventListener('click', doJoin);

function doJoin(){
  var btn=el('joinBtn'), errE=el('joinErr');
  sessionId=(el('inp-code').value||'').trim().toUpperCase();
  playerName=(el('inp-name').value||'').trim();
  errE.textContent='';
  if(sessionId.length<4){errE.textContent='Enter a valid game code';return;}
  if(playerName.length<2){errE.textContent='Enter your name (min 2 chars)';return;}
  btn.disabled=true; btn.textContent='JOINING…';
  playerId='p_'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);

  db.ref('whack/'+sessionId+'/meta').once('value').then(function(metaSnap){
    var meta=metaSnap&&metaSnap.val();
    if(!meta){ throw new Error('Game not found. Check the code.'); }
    totalQ=meta.totalQ||0; timePerQ=meta.timePerQ||12; holeCount=meta.holeCount||9;
    return db.ref('whack/'+sessionId+'/questions').once('value');
  }).then(function(qSnap){
    var raw=qSnap.val();
    questions=raw?(Array.isArray(raw)?raw:Object.values(raw)).filter(Boolean):[];
    totalQ=totalQ||questions.length;
    if(!questions.length) throw new Error('Game not ready yet — ask your host to reload.');
    return db.ref('whack/'+sessionId+'/players/'+playerId).set({
      name:playerName, score:0, correctCount:0, online:true,
      joinedAt:firebase.database.ServerValue.TIMESTAMP
    });
  }).then(function(){
    db.ref('whack/'+sessionId+'/players/'+playerId+'/online').onDisconnect().set(false);
    el('lby-code').textContent=sessionId;
    buildHoleGrid();
    showScreen('s-lobby');
    watchLobby();
    btn.disabled=false; btn.textContent='\u{1F528}  JOIN GAME';
  }).catch(function(e){
    errE.textContent=e.message||'Could not join.';
    btn.disabled=false; btn.textContent='\u{1F528}  JOIN GAME';
  });
}

function watchLobby(){
  lobbyPRef=db.ref('whack/'+sessionId+'/players');
  lobbyPRef.on('value',function(snap){
    var players=(snap&&snap.val())||{};
    var names=Object.values(players).map(function(p){return p.name||'?';});
    el('lby-count').textContent=names.length;
    el('lby-chips').innerHTML=names.map(function(n){return '<div class="chip">'+esc(n)+'</div>';}).join('');
  });
  stateRef=db.ref('whack/'+sessionId+'/state');
  stateRef.on('value',function(snap){
    var st=(snap&&snap.val())||{};
    var phase=st.phase||'lobby';
    if(phase==='countdown'){ detachLobby(); showScreen('s-countdown'); runCountdown(); }
    else if(phase==='round'){
      /* always clear any overlay screen (leaderboard, reveal) — without this,
         once #game-wrap gets its .on class in round 1 it's never re-cleared,
         so the leaderboard overlay from round 1 stays stuck on top forever */
      document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('on');});
      if(!el('game-wrap').classList.contains('on')){ el('game-wrap').classList.add('on'); el('hud-code').textContent=sessionId; }
      if(st.qIndex!==currentQIdx) startRound(st.qIndex, st.activeHole, st.roundStartAt);
    } else if(phase==='reveal'){
      stopTimer();
      showRoundResult(st);
    } else if(phase==='leaderboard'){
      stopTimer();
      renderLeaderboard(st);
    } else if(phase==='final'){
      stopTimer();
      showFinish();
    }
  });
}
function detachLobby(){ if(lobbyPRef){try{lobbyPRef.off('value');}catch(_){}lobbyPRef=null;} }

function runCountdown(){
  var n=3; el('cd-num').textContent=n;
  var iv=setInterval(function(){ n--; if(n<=0){clearInterval(iv);return;} el('cd-num').textContent=n; },1000);
}

function buildHoleGrid(){
  var g=el('hole-grid'); g.innerHTML='';
  for(var i=0;i<holeCount;i++){
    var h=document.createElement('div'); h.className='hole'; h.dataset.index=i;
    h.innerHTML='<span class="mole">\u{1F439}</span><span class="whack-fx">\u{1F4A5}</span>';
    g.appendChild(h);
  }
}

/* ════════════════ ROUND FLOW ════════════════ */
function startRound(qIdx, hole, startedAt){
  currentQIdx=qIdx; activeHole=hole; answered=false; claimWon=false;
  document.querySelectorAll('.hole').forEach(function(h){ h.classList.remove('active','whacked'); });
  var holeEl=document.querySelector('.hole[data-index="'+hole+'"]');
  if(holeEl) holeEl.classList.add('active');
  el('claim-banner').textContent='';
  var hammer=el('hammer'); hammer.classList.remove('swing'); hammer.classList.add('idle');

  var q=questions[qIdx]; if(!q) return;
  el('q-num').textContent='Round '+(qIdx+1)+' / '+totalQ;
  el('q-txt').textContent=q.question||'';
  var qia=el('q-img-area'); qia.innerHTML='';
  if(q.image_url&&q.image_url.trim()){
    var qw=document.createElement('div'); qw.className='q-img-wrap';
    var qi=document.createElement('img'); qi.src=q.image_url; qi.alt='Question image';
    qi.onerror=function(){qw.remove();};
    qw.appendChild(qi); qia.appendChild(qw);
  }
  el('q-area').innerHTML='';
  if(q.type==='MCQ'||q.type==='TF'){
    var labels=['A','B','C','D'];
    var imgs=q.option_images||[];
    var anyImgOnly=(q.options||[]).some(function(o,i){ return imgs[i]&&!o; });
    var grid=document.createElement('div'); grid.className=anyImgOnly?'opts-grid img-grid':'opts-grid';
    (q.options||[]).forEach(function(opt,i){
      var btn=document.createElement('button'); btn.className='opt-btn';
      var imgSrc=imgs[i]||'';
      var isImgOnly=imgSrc&&!opt;
      if(isImgOnly) btn.classList.add('img-only');
      var txtPart=opt?'<span>'+esc(opt)+'</span>':'';
      var imgPart=imgSrc?'<img class="opt-img" src="'+esc(imgSrc)+'" alt="option '+(i+1)+'" loading="lazy" onerror="this.remove()">':'';
      btn.innerHTML='<div class="opt-key">'+(labels[i]||i+1)+'</div><div style="flex:1">'+txtPart+imgPart+'</div>';
      btn.addEventListener('click',(function(o,b){return function(){submitAns(o,b);};})(opt||labels[i],btn));
      grid.appendChild(btn);
    });
    el('q-area').appendChild(grid);
  } else {
    var area=document.createElement('div'); area.className='short-area';
    var inp=document.createElement('input'); inp.className='short-inp'; inp.type='text'; inp.placeholder='Type answer…';
    var sbtn=document.createElement('button'); sbtn.className='sub-btn'; sbtn.textContent='GO';
    sbtn.addEventListener('click',function(){if(!inp.disabled&&inp.value.trim()) submitAns(inp.value.trim(),null);});
    inp.addEventListener('keydown',function(e){if(e.key==='Enter') sbtn.click();});
    area.appendChild(inp); area.appendChild(sbtn);
    el('q-area').appendChild(area);
  }

  roundDeadline = (startedAt||Date.now()) + timePerQ*1000;
  startTimer();
  watchClaim(qIdx);
}

function startTimer(){
  stopTimer();
  function tick(){
    var rem=Math.max(0,Math.ceil((roundDeadline-Date.now())/1000));
    el('hud-timer').textContent=rem+'s';
    if(rem<=0){ stopTimer(); return; }
    timerRaf=requestAnimationFrame(tick);
  }
  tick();
}
function stopTimer(){ if(timerRaf){cancelAnimationFrame(timerRaf);timerRaf=null;} }

function watchClaim(qIdx){
  if(claimRef){ try{claimRef.off('value');}catch(_){} }
  claimRef=db.ref('whack/'+sessionId+'/claims/'+qIdx);
  claimRef.on('value',function(snap){
    var c=snap&&snap.val();
    if(c&&c.claimedBy){
      var holeEl=document.querySelector('.hole[data-index="'+activeHole+'"]');
      var already=holeEl&&holeEl.classList.contains('whacked');
      if(holeEl) holeEl.classList.add('whacked');
      if(!already) swingHammer(activeHole);
      db.ref('whack/'+sessionId+'/players/'+c.claimedBy+'/name').once('value',function(nSnap){
        var nm=nSnap.val()||'Someone';
        el('claim-banner').textContent=(c.claimedBy===playerId?'You':nm)+' whacked it! \u{1F528}';
      });
    }
  });
}

/* ── HAMMER SWING — positions the mallet over the hit hole and animates it down ── */
function swingHammer(holeIndex){
  var holeEl=document.querySelector('.hole[data-index="'+holeIndex+'"]');
  var hammer=el('hammer'), board=el('board-frame');
  if(!holeEl||!hammer||!board) return;
  var boardRect=board.getBoundingClientRect(), holeRect=holeEl.getBoundingClientRect();
  var cx=holeRect.left+holeRect.width/2-boardRect.left;
  var cy=holeRect.top+holeRect.height/2-boardRect.top;
  hammer.classList.remove('idle');
  hammer.style.left=cx+'px'; hammer.style.top=cy+'px';
  hammer.classList.remove('swing'); void hammer.offsetWidth; hammer.classList.add('swing');
  board.classList.remove('impact'); void board.offsetWidth; board.classList.add('impact');
  showComicText(cx,cy);
  setTimeout(function(){ hammer.classList.add('idle'); },480);
}
function showComicText(cx,cy){
  var words=['WHACK!','BONK!','POW!','BAM!'];
  var c=document.createElement('div');
  c.className='whack-comic';
  c.textContent=words[Math.floor(Math.random()*words.length)];
  c.style.left=cx+'px'; c.style.top=cy+'px';
  el('board-frame').appendChild(c);
  void c.offsetWidth; c.classList.add('show');
  setTimeout(function(){ c.remove(); },650);
}

/* ════════════════ ANSWER SUBMIT — claim transaction then validate ════════════════ */
function submitAns(answer, btnEl){
  if(answered) return;
  answered=true;
  el('q-area').querySelectorAll('button,input').forEach(function(b){b.disabled=true;});
  var qIdx=currentQIdx;

  var claimNode=db.ref('whack/'+sessionId+'/claims/'+qIdx+'/claimedBy');
  claimNode.transaction(function(current){
    return current ? undefined : playerId; // only claim if empty — abort txn otherwise
  }).then(function(result){
    var iWonClaim = result.committed && result.snapshot.val()===playerId;

    fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'validateContestedAnswer',sessionId:sessionId,playerId:playerId,qIndex:qIdx,answer:answer})})
      .then(function(r){return r.json();})
      .then(function(res){
        var isCorrect=!!(res&&res.status==='success'&&res.data&&res.data.isCorrect===true);
        if(btnEl) btnEl.classList.add(isCorrect?'correct':'wrong');

        if(iWonClaim && !isCorrect){
          // rollback — I claimed the hole but was wrong, reopen it for someone else
          db.ref('whack/'+sessionId+'/claims/'+qIdx).update({claimedBy:null,holeIndex:activeHole});
        }
        if(iWonClaim && isCorrect){
          claimWon=true; myWhacked++;
          var pts=(questions[qIdx].points||1)*100;
          myScore+=pts;
          db.ref('whack/'+sessionId+'/claims/'+qIdx).update({holeIndex:activeHole,claimedAt:firebase.database.ServerValue.TIMESTAMP});
          db.ref('whack/'+sessionId+'/players/'+playerId+'/score').transaction(function(cur){return (cur||0)+pts;});
          db.ref('whack/'+sessionId+'/players/'+playerId+'/correctCount').transaction(function(cur){return (cur||0)+1;});
          el('hud-score').textContent=myScore+' pts';
          el('claim-banner').textContent='You whacked it! \u{1F528}';
          var holeEl=document.querySelector('.hole[data-index="'+activeHole+'"]');
          if(holeEl&&!holeEl.classList.contains('whacked')){ holeEl.classList.add('whacked'); swingHammer(activeHole); }
        } else if(!iWonClaim){
          el('q-area').insertAdjacentHTML('beforeend','<div class="answered-msg">'+(isCorrect?'Correct, but too slow!':'Locked in.')+'</div>');
        } else {
          el('q-area').insertAdjacentHTML('beforeend','<div class="answered-msg">Wrong answer.</div>');
        }
      })
      .catch(function(){
        if(iWonClaim) db.ref('whack/'+sessionId+'/claims/'+qIdx).update({claimedBy:null});
      });
  }).catch(function(){ /* transaction error — hole already claimed by someone else, just validate for personal feedback */
    fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'validateContestedAnswer',sessionId:sessionId,playerId:playerId,qIndex:qIdx,answer:answer})})
      .then(function(r){return r.json();})
      .then(function(res){
        var isCorrect=!!(res&&res.status==='success'&&res.data&&res.data.isCorrect===true);
        if(btnEl) btnEl.classList.add(isCorrect?'correct':'wrong');
        el('q-area').insertAdjacentHTML('beforeend','<div class="answered-msg">'+(isCorrect?'Correct, but too slow!':'Locked in.')+'</div>');
      });
  });
}

function showRoundResult(st){
  if(claimRef){ try{claimRef.off('value');}catch(_){} claimRef=null; }
  if(!answered){
    el('q-area').querySelectorAll('button,input').forEach(function(b){b.disabled=true;});
  }
  if(st.correctAnswer){
    el('q-area').insertAdjacentHTML('beforeend','<div class="answered-msg">Correct answer: '+esc(st.correctAnswer)+'</div>');
  }
}

function renderLeaderboard(st){
  showScreen('s-leaderboard');
  db.ref('whack/'+sessionId+'/players').once('value',function(snap){
    var players=Object.values((snap&&snap.val())||{}).sort(function(a,b){return (b.score||0)-(a.score||0);});
    el('lb-rows').innerHTML=players.map(function(p,i){
      var mine=p.name===playerName; // best-effort highlight
      return '<div class="lb-row'+(mine?' me':'')+'"><div class="lb-pos">#'+(i+1)+'</div><div class="lb-name">'+esc(p.name||'?')+'</div><div class="lb-score">'+(p.score||0)+'</div></div>';
    }).join('');
  });
}

function showFinish(){
  el('finish-whacked').textContent=myWhacked;
  el('finish-score').textContent=myScore;
  db.ref('whack/'+sessionId+'/players').once('value',function(snap){
    var players=Object.entries((snap&&snap.val())||{}).map(function(e){return Object.assign({pid:e[0]},e[1]);})
      .sort(function(a,b){return (b.score||0)-(a.score||0);});
    var idx=players.findIndex(function(p){return p.pid===playerId;});
    el('finish-rank-num').textContent='P'+(idx>=0?idx+1:players.length);
  });
  el('finish-overlay').classList.add('show');
}

window.addEventListener('beforeunload',function(){
  [lobbyPRef,stateRef,claimRef].forEach(function(r){if(r){try{r.off('value');}catch(_){}}});
});

})();
</script>
