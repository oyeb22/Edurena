<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kart Race Projector — Edurena</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050810;--panel:#0a0d1a;--bdr:#1a2035;
  --txt:#e8edf5;--muted:#5a6a8a;
  --acc:#00d4ff;--grn:#00ff88;--red:#ff3355;--yel:#ffcc00;
  --f:'Plus Jakarta Sans',system-ui,sans-serif;
  --mono:'Orbitron',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#050810;overflow:hidden;color:var(--txt);font-family:var(--f)}
#c{position:fixed;top:0;left:0;display:block;z-index:1}

/* HUD SIDEBAR */
#hud{
  position:fixed;top:0;right:0;bottom:0;width:230px;
  background:rgba(5,8,16,.94);border-left:1px solid rgba(0,212,255,.12);
  backdrop-filter:blur(14px);z-index:10;
  display:flex;flex-direction:column;padding:16px;overflow:hidden;
}
.hud-brand{font-family:var(--mono);font-size:11px;font-weight:900;
  letter-spacing:3px;color:var(--acc);margin-bottom:3px;text-transform:uppercase}
.hud-code{font-family:var(--mono);font-size:22px;font-weight:900;
  letter-spacing:6px;color:#fff;text-shadow:0 0 14px rgba(0,212,255,.5);margin-bottom:14px}
.hud-lbl{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--muted);
  letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:6px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--red);flex-shrink:0;
  animation:ldp 1.2s ease-in-out infinite;box-shadow:0 0 7px var(--red)}
@keyframes ldp{0%,100%{opacity:1}50%{opacity:.3}}
.stand-row{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:7px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.05);margin-bottom:4px;transition:background .4s}
.stand-row.leader{border-color:rgba(255,204,0,.4);background:rgba(255,204,0,.07)}
.stand-pos{font-family:var(--mono);font-size:11px;font-weight:900;color:var(--muted);width:18px;text-align:center;flex-shrink:0}
.stand-row.rk1 .stand-pos{color:#ffd700}
.stand-row.rk2 .stand-pos{color:#c0c0c0}
.stand-row.rk3 .stand-pos{color:#cd7f32}
.stand-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.stand-name{font-size:12px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stand-pct{font-family:var(--mono);font-size:10px;color:var(--muted)}
.stand-done{color:var(--grn)}
#hud-ctrl{margin-top:auto;padding-top:10px;border-top:1px solid rgba(255,255,255,.07)}
.hud-btn{display:block;width:100%;padding:9px;border-radius:8px;font-family:var(--mono);
  font-size:11px;font-weight:700;letter-spacing:1px;cursor:pointer;border:none;text-align:center;transition:all .2s}
.hud-btn.end{background:rgba(255,51,85,.15);color:var(--red);border:1px solid rgba(255,51,85,.3)}
.hud-btn.end:hover{background:rgba(255,51,85,.25)}

/* OVERLAYS */
.oscreen{position:fixed;inset:0;z-index:50;display:none;flex-direction:column;
  align-items:center;justify-content:center;background:rgba(5,8,16,.92);backdrop-filter:blur(12px)}
.oscreen.on{display:flex}

/* WAITING */
.wait-card{text-align:center;padding:30px;max-width:600px;width:90%}
.w-brand{font-family:var(--mono);font-size:13px;font-weight:900;color:var(--acc);
  letter-spacing:4px;text-transform:uppercase;margin-bottom:26px}
.w-lbl{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.w-code{font-family:var(--mono);font-size:clamp(52px,11vw,80px);font-weight:900;
  color:var(--acc);letter-spacing:14px;text-shadow:0 0 40px rgba(0,212,255,.5);margin-bottom:4px}
.w-count-big{font-family:var(--mono);font-size:52px;font-weight:900;color:var(--grn);
  text-shadow:0 0 20px rgba(0,255,136,.4);margin-top:18px}
.w-count-lbl{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin:4px 0 16px}
.w-chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:520px;margin:0 auto 20px}
.w-chip{padding:4px 12px;background:#0d1525;border:1px solid #1e2d4a;
  border-radius:20px;font-size:12px;font-weight:600;animation:chipPop .3s ease;color:var(--acc)}
@keyframes chipPop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
.w-status{font-size:13px;color:var(--muted);letter-spacing:1px}
.pulse-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--acc);
  margin-right:7px;animation:pdot 1.4s ease-in-out infinite;vertical-align:middle;box-shadow:0 0 8px var(--acc)}
@keyframes pdot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}
.w-err{color:var(--red);font-size:13px;margin-top:12px}

/* COUNTDOWN */
#countdown-overlay{position:fixed;inset:0;z-index:60;display:flex;align-items:center;
  justify-content:center;pointer-events:none;opacity:0;transition:opacity .3s;
  background:rgba(5,8,16,.5);backdrop-filter:blur(4px)}
#countdown-overlay.show{opacity:1}
.cd-big{font-family:var(--mono);font-size:clamp(120px,25vw,220px);font-weight:900;
  color:#fff;text-shadow:0 0 80px var(--acc),0 0 160px rgba(0,212,255,.3);
  animation:cdPop .7s cubic-bezier(.22,1,.36,1) both}
@keyframes cdPop{from{transform:scale(3.5);opacity:0}to{transform:scale(1);opacity:1}}

/* PODIUM */
#s-end{gap:20px}
.pod-title{font-family:var(--mono);font-size:clamp(28px,5vw,48px);font-weight:900;
  background:linear-gradient(135deg,var(--yel),var(--acc));-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;letter-spacing:5px}
.pod-wrap{display:flex;align-items:flex-end;gap:16px;margin:20px 0}
.pod-col{display:flex;flex-direction:column;align-items:center;gap:8px}
.pod-blk{border-radius:8px 8px 0 0;background:linear-gradient(to top,rgba(255,255,255,.08),rgba(255,255,255,.15));
  display:flex;align-items:center;justify-content:center;font-family:var(--mono);
  font-size:28px;font-weight:900;color:#fff;width:110px}
.pod-blk.b1{height:130px;border:1px solid rgba(255,204,0,.5);box-shadow:0 0 25px rgba(255,204,0,.25)}
.pod-blk.b2{height:90px;border:1px solid rgba(192,192,192,.4)}
.pod-blk.b3{height:65px;border:1px solid rgba(205,127,50,.4)}
.pod-name{font-size:13px;font-weight:700;max-width:110px;text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.end-close-btn{padding:14px 44px;background:linear-gradient(135deg,#0055aa,#5500cc);
  color:#fff;border:none;border-radius:10px;font-family:var(--mono);font-size:13px;
  font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s;margin-top:8px}
.end-close-btn:hover{transform:translateY(-2px)}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud" style="display:none">
  <div class="hud-brand">&#x1F3C1; Kart Race</div>
  <div class="hud-code" id="hud-code">----</div>
  <div class="hud-lbl"><span class="live-dot"></span>Live Standings</div>
  <div id="standings"></div>
  <div id="hud-ctrl">
    <button class="hud-btn end" onclick="endRaceBtn()">End Race</button>
  </div>
</div>

<div class="oscreen on" id="s-wait">
  <div class="wait-card">
    <div class="w-brand">&#x1F3CE; Kart Race — Projector View</div>
    <div class="w-lbl">Race Code</div>
    <div class="w-code" id="w-code">----</div>
    <div class="w-count-big" id="w-count">0</div>
    <div class="w-count-lbl">drivers on grid</div>
    <div class="w-chips" id="w-chips"></div>
    <div class="w-status"><span class="pulse-dot"></span><span id="w-status-txt">Connecting…</span></div>
    <div class="w-err" id="w-err"></div>
  </div>
</div>

<div id="countdown-overlay">
  <div class="cd-big" id="cd-num">3</div>
</div>

<div class="oscreen" id="s-end">
  <div class="pod-title">RACE OVER!</div>
  <div class="pod-wrap" id="pod-wrap"></div>
  <button class="end-close-btn" onclick="window.close()">Close Projector</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script>
(function(){
'use strict';

/* ── URL PARAMS ── */
var P = new URLSearchParams(location.search);
var raceId = (P.get('raceId') || '').trim().toUpperCase();

function el(id){ return document.getElementById(id); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ── FIREBASE ── */
var db;
try {
  var fbCfg = {
    apiKey:'AIzaSyCLfySFzCpbz3CBX1bjha5KxvA0MrJExIc',
    authDomain:'kahoot-24063.firebaseapp.com',
    databaseURL:'https://kahoot-24063-default-rtdb.firebaseio.com',
    projectId:'kahoot-24063',
    storageBucket:'kahoot-24063.firebasestorage.app',
    messagingSenderId:'962917873467',
    appId:'1:962917873467:web:a6b526aee30cd15c92291e'
  };
  var ea=null;
  if(firebase.apps) firebase.apps.forEach(function(a){if(a.name==='rh')ea=a;});
  db=firebase.database(ea||firebase.initializeApp(fbCfg,'rh'));
} catch(e){ el('w-err').textContent='Firebase: '+e.message; }

/* ── STATE ── */
var allPlayers={}, gameRunning=false, raceStarted=false;
var rafId=null, lastTime=0;
var playersRef=null, stateRef=null;
var lastCorrect={}, kartFx={}; // pid -> {boost,nitro,wrong} timers

/* ══════════════════════════════════════════════════
   CANVAS + PERSPECTIVE MATH
══════════════════════════════════════════════════ */
var c=el('c'), ctx=c.getContext('2d');
var CW=0, CH=0, HUD_W=230;
var HORIZON_Y=0;
var ROAD_W_BASE=0; // road width at z=1
var FOCAL_Y=0;     // (CH - HORIZON_Y) — used for perspective

function resize(){
  CW=c.width=window.innerWidth;
  CH=c.height=window.innerHeight;
  HORIZON_Y=CH*0.40;
  FOCAL_Y=CH-HORIZON_Y;       // = 0.60*CH
  ROAD_W_BASE=(CW-HUD_W)*0.72; // road width at z=1.0
}
window.addEventListener('resize',resize); resize();

// Project world-z to screen-y and road-width
function proj(z){ return { y: HORIZON_Y + FOCAL_Y/z, w: ROAD_W_BASE/z }; }

/* ══════════════════════════════════════════════════
   BACKGROUND ASSETS (generated once, reused)
══════════════════════════════════════════════════ */
var stars=[];
(function genStars(){
  for(var i=0;i<120;i++)
    stars.push({x:Math.random(),y:Math.random(),r:Math.random()*1.4+0.3,a:Math.random()*.7+.3});
})();

var clouds=[
  {x:.08,y:.12,rx:.11,ry:.05,spd:.004},
  {x:.28,y:.07,rx:.14,ry:.06,spd:.003},
  {x:.54,y:.16,rx:.10,ry:.04,spd:.005},
  {x:.72,y:.09,rx:.12,ry:.05,spd:.0035},
  {x:.92,y:.14,rx:.09,ry:.04,spd:.0045},
];

// Mountain silhouette path (pre-computed)
var mtPts=[];
(function genMts(){
  var n=40;
  for(var i=0;i<=n;i++){
    var fx=i/n;
    var fy=0.55+Math.sin(fx*6.2)*0.18+Math.sin(fx*14.1)*0.09+Math.sin(fx*2.7+1)*0.14;
    mtPts.push({x:fx,y:fy});
  }
})();

/* ══════════════════════════════════════════════════
   ROAD SCROLL
══════════════════════════════════════════════════ */
var roadScrollZ=0;
var roadSpeed=1.8; // z-units per second (constant visual speed)
var targetRoadSpeed=1.8;

var Z_NEAR=1.0, Z_FAR=9.0;
var STRIPE_Z=0.28; // z-length of each road stripe
var TREE_Z=0.55;   // z-spacing between trees

/* ══════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════ */
function hexAdjust(hex,amt){
  var r=parseInt(hex.slice(1,3),16)||0,g=parseInt(hex.slice(3,5),16)||0,b=parseInt(hex.slice(5,7),16)||0;
  function cl(v){return Math.max(0,Math.min(255,v+amt));}
  return '#'+[cl(r),cl(g),cl(b)].map(function(v){return('0'+v.toString(16)).slice(-2)}).join('');
}
function trap(y1,w1,y2,w2,cx,col){
  ctx.fillStyle=col;
  ctx.beginPath();
  ctx.moveTo(cx-w1/2,y1); ctx.lineTo(cx+w1/2,y1);
  ctx.lineTo(cx+w2/2,y2); ctx.lineTo(cx-w2/2,y2);
  ctx.closePath(); ctx.fill();
}
function rrFill(x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,x+w,y+r,r); ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h,x+w-r,y+h,r); ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r); ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,x+r,y,r); ctx.closePath(); ctx.fill();
}

/* ══════════════════════════════════════════════════
   SKY + BACKGROUND
══════════════════════════════════════════════════ */
function drawSky(){
  // Sky gradient
  var sg=ctx.createLinearGradient(0,0,0,HORIZON_Y);
  sg.addColorStop(0,'#04061a');
  sg.addColorStop(0.5,'#0c0840');
  sg.addColorStop(1,'#1e1080');
  ctx.fillStyle=sg; ctx.fillRect(0,0,CW-HUD_W,HORIZON_Y);

  // Stars
  stars.forEach(function(s){
    var sy=s.y*HORIZON_Y;
    if(sy>=HORIZON_Y) return;
    ctx.fillStyle='rgba(255,255,255,'+s.a+')';
    ctx.beginPath(); ctx.arc(s.x*(CW-HUD_W),sy,s.r,0,Math.PI*2); ctx.fill();
  });

  // Clouds
  clouds.forEach(function(cl){
    var cx2=cl.x*(CW-HUD_W), cy2=cl.y*HORIZON_Y;
    var rx=cl.rx*(CW-HUD_W), ry=cl.ry*HORIZON_Y;
    ctx.fillStyle='rgba(180,160,255,0.07)';
    ctx.beginPath(); ctx.ellipse(cx2,cy2,rx,ry,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx2-rx*.3,cy2+ry*.2,rx*.7,ry*.8,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx2+rx*.3,cy2+ry*.15,rx*.65,ry*.75,0,0,Math.PI*2); ctx.fill();
  });

  // Mountain silhouette
  ctx.fillStyle='#070420';
  ctx.beginPath(); ctx.moveTo(0,HORIZON_Y);
  mtPts.forEach(function(p){ ctx.lineTo(p.x*(CW-HUD_W),p.y*HORIZON_Y); });
  ctx.lineTo(CW-HUD_W,HORIZON_Y); ctx.closePath(); ctx.fill();

  // Horizon glow
  var hg=ctx.createLinearGradient(0,HORIZON_Y-22,0,HORIZON_Y+8);
  hg.addColorStop(0,'rgba(80,40,255,0)');
  hg.addColorStop(0.5,'rgba(100,50,255,0.35)');
  hg.addColorStop(1,'rgba(20,10,80,0)');
  ctx.fillStyle=hg; ctx.fillRect(0,HORIZON_Y-22,CW-HUD_W,30);
}

/* ══════════════════════════════════════════════════
   ROAD SEGMENTS + TREES
══════════════════════════════════════════════════ */
function drawRoad(){
  var rcx=(CW-HUD_W)/2; // road center x

  // Draw from far (high z) to near (low z)
  var dz=0.04;
  for(var z=Z_FAR; z>=Z_NEAR; z-=dz){
    var p1=proj(z), p2=proj(z+dz);
    var y1=Math.max(p1.y,HORIZON_Y), y2=Math.min(p2.y,CH+4);
    if(y1>=y2) continue;

    // Which stripe? (scrolling)
    var stripeIdx=Math.floor((z+roadScrollZ)/STRIPE_Z);
    var alt=stripeIdx%2;

    // Grass left
    ctx.fillStyle=alt?'#1c3518':'#192e15';
    ctx.beginPath();
    ctx.moveTo(0,y1); ctx.lineTo(rcx-p1.w/2,y1);
    ctx.lineTo(rcx-p2.w/2,y2); ctx.lineTo(0,y2);
    ctx.closePath(); ctx.fill();

    // Grass right
    ctx.beginPath();
    ctx.moveTo(CW-HUD_W,y1); ctx.lineTo(rcx+p1.w/2,y1);
    ctx.lineTo(rcx+p2.w/2,y2); ctx.lineTo(CW-HUD_W,y2);
    ctx.closePath(); ctx.fill();

    // Road surface
    ctx.fillStyle=alt?'#12112a':'#0e0d22';
    trap(y1,p1.w,y2,p2.w,rcx,alt?'#12112a':'#0e0d22');

    // Center dashes (every other stripe)
    if(alt){
      var dw=Math.max(1.5,3*(1/z));
      ctx.fillStyle='rgba(255,255,255,0.55)';
      trap(y1,dw,y2,dw,rcx,'rgba(255,255,255,0.55)');
    }
  }

  // Yellow edge lines with glow
  ctx.save();
  ctx.shadowColor='#ffcc00'; ctx.shadowBlur=6;
  ctx.fillStyle='#ffcc00';
  var dz2=0.06;
  for(var z2=Z_FAR; z2>=Z_NEAR; z2-=dz2){
    var pp1=proj(z2), pp2=proj(z2+dz2);
    var yy1=Math.max(pp1.y,HORIZON_Y), yy2=Math.min(pp2.y,CH+4);
    if(yy1>=yy2) continue;
    var ew=Math.max(1,2.5*(1/z2));
    // Left edge
    trap(yy1,ew,yy2,ew,rcx-pp1.w/2-ew/2,'#ffcc00');
    // Right edge
    trap(yy1,ew,yy2,ew,rcx+pp1.w/2+ew/2,'#ffcc00');
  }
  ctx.restore();

  // Trees (both sides)
  var firstTZ=Math.floor((roadScrollZ+Z_NEAR)/TREE_Z)*TREE_Z;
  for(var tz=firstTZ; tz<roadScrollZ+Z_FAR+TREE_Z; tz+=TREE_Z){
    var az=tz-roadScrollZ;
    if(az<Z_NEAR||az>Z_FAR-0.1) continue;
    var tp=proj(az);
    if(tp.y<HORIZON_Y||tp.y>CH) continue;
    var ts=0.88/az;
    drawTree(rcx-tp.w/2-28*ts, tp.y, ts);
    drawTree(rcx+tp.w/2+28*ts, tp.y, ts);
  }
}

function drawTree(x,groundY,s){
  if(s<0.04) return;
  // Trunk
  ctx.fillStyle='#3d2210';
  rrFill(x-3*s,groundY-16*s,6*s,16*s,2);
  // Layers (3 triangle-ish)
  var cols=['#0a3a0a','#0d4a0d','#0f5a0f'];
  for(var ti=0;ti<3;ti++){
    var tw=((3-ti)*18+10)*s, th=20*s;
    var ty=groundY-16*s-th*0.6*ti-th;
    ctx.fillStyle=cols[ti];
    ctx.beginPath();
    ctx.moveTo(x,ty); ctx.lineTo(x+tw/2,ty+th); ctx.lineTo(x-tw/2,ty+th);
    ctx.closePath(); ctx.fill();
  }
}

/* ══════════════════════════════════════════════════
   KART FROM BEHIND (perspective)
══════════════════════════════════════════════════ */
function drawKartBehind(kx,groundY,kartZ,col,name,rank,fx){
  var s=0.95/kartZ; // perspective scale
  if(s<0.05) return;

  var dark=hexAdjust(col,-55), light=hexAdjust(col,55);
  var BW=78*s, BH=36*s, TW=20*s, TH=26*s;
  var WW=BW*1.55, WH=7*s;
  var bodyTop=groundY-TH*0.55-BH;

  ctx.save();

  // FX: nitro glow
  if(fx&&fx.nitro>0){
    ctx.shadowColor='#00aaff'; ctx.shadowBlur=25*s;
  } else if(fx&&fx.boost>0){
    ctx.shadowColor=col; ctx.shadowBlur=14*s;
  }

  // Ground shadow
  ctx.globalAlpha=Math.min(0.5,s*.55);
  ctx.fillStyle='#000';
  ctx.beginPath(); ctx.ellipse(kx,groundY+2*s,BW*.9,TH*.18,0,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1; ctx.shadowBlur=0;

  // Left rear tire
  ctx.fillStyle='#1a1a1a';
  rrFill(kx-BW/2-TW*.65,groundY-TH,TW,TH,3*s);
  ctx.fillStyle='#2e2e2e';
  rrFill(kx-BW/2-TW*.65+TW*.12,groundY-TH+TH*.1,TW*.76,TH*.78,2*s);
  // Right rear tire
  ctx.fillStyle='#1a1a1a';
  rrFill(kx+BW/2-TW*.35,groundY-TH,TW,TH,3*s);
  ctx.fillStyle='#2e2e2e';
  rrFill(kx+BW/2-TW*.35+TW*.12,groundY-TH+TH*.1,TW*.76,TH*.78,2*s);

  // Diffuser
  ctx.fillStyle='#111';
  rrFill(kx-BW/2-2,groundY-TH*.3-4*s,BW+4,6*s,2);

  // Main body
  var bg=ctx.createLinearGradient(kx-BW/2,bodyTop,kx+BW/2,bodyTop+BH);
  bg.addColorStop(0,dark); bg.addColorStop(.28,light); bg.addColorStop(.7,col); bg.addColorStop(1,dark);
  ctx.fillStyle=bg;
  rrFill(kx-BW/2,bodyTop,BW,BH,7*s);

  // Side pods
  ctx.fillStyle=hexAdjust(col,-22);
  rrFill(kx-BW/2-6*s,bodyTop+BH*.3,10*s,BH*.5,3*s);
  rrFill(kx+BW/2-4*s,bodyTop+BH*.3,10*s,BH*.5,3*s);

  // Cockpit recess
  ctx.fillStyle=hexAdjust(col,-38);
  rrFill(kx-BW*.25,bodyTop+BH*.08,BW*.5,BH*.6,5*s);

  // Rear wing assembly
  ctx.fillStyle=dark;
  // Wing endplates
  rrFill(kx-WW/2,bodyTop-WH-8*s,6*s,WH+8*s,2*s);
  rrFill(kx+WW/2-6*s,bodyTop-WH-8*s,6*s,WH+8*s,2*s);
  // Wing blade
  ctx.fillStyle=hexAdjust(col,-10);
  rrFill(kx-WW/2,bodyTop-WH-2*s,WW,WH,2*s);
  // Lower beam wing
  ctx.fillStyle=dark;
  rrFill(kx-BW*.38,bodyTop-2*s,BW*.76,4*s,2);

  // Driver head (visible over cockpit)
  if(s>0.22){
    ctx.fillStyle='#e8c890';
    ctx.beginPath(); ctx.arc(kx,bodyTop+BH*.18,11*s,0,Math.PI*2); ctx.fill();
    // Helmet top
    ctx.fillStyle=col;
    ctx.beginPath(); ctx.arc(kx,bodyTop+BH*.14,11*s,Math.PI*.08,Math.PI*.92); ctx.fill();
    // Visor
    ctx.fillStyle='rgba(80,200,255,.5)';
    ctx.beginPath(); ctx.ellipse(kx,bodyTop+BH*.2,8*s,4*s,0,Math.PI*.05,Math.PI*.95); ctx.fill();
  }

  // Number plate
  if(s>0.18){
    ctx.fillStyle='rgba(255,255,255,.92)';
    var pw=22*s,ph=15*s;
    rrFill(kx-pw/2,groundY-TH*.65-ph/2,pw,ph,2*s);
    ctx.fillStyle='#111';
    ctx.font='bold '+Math.round(Math.max(8,11*s))+'px Orbitron,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(String(rank),kx,groundY-TH*.65);
  }

  // Exhaust pipes
  if(s>0.28){
    ctx.fillStyle='#444';
    ctx.beginPath(); ctx.arc(kx-BW*.18,groundY-TH*.15,3.5*s,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(kx+BW*.18,groundY-TH*.15,3.5*s,0,Math.PI*2); ctx.fill();
    // Nitro flame
    if(fx&&fx.nitro>0){
      ctx.save();
      ctx.globalAlpha=fx.nitro*0.85;
      var fg=ctx.createLinearGradient(kx,groundY-TH*.1,kx,groundY+TH*.7*fx.nitro);
      fg.addColorStop(0,'rgba(80,200,255,1)'); fg.addColorStop(.5,'rgba(0,80,255,.7)'); fg.addColorStop(1,'rgba(0,0,200,0)');
      ctx.fillStyle=fg;
      ctx.beginPath(); ctx.ellipse(kx-BW*.18,groundY-TH*.1,4*s,20*s*fx.nitro,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(kx+BW*.18,groundY-TH*.1,4*s,20*s*fx.nitro,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }

  ctx.restore();

  // Name label
  if(s>0.20){
    var lblY=bodyTop-WH-12*s;
    ctx.save();
    var fs=Math.max(9,Math.round(13*s));
    ctx.font='700 '+fs+'px "Plus Jakarta Sans",sans-serif';
    var tw=ctx.measureText(name).width;
    var px=6*s,py=4*s;
    ctx.fillStyle='rgba(5,8,16,.92)';
    rrFill(kx-tw/2-px,lblY-py,tw+px*2,fs+py*2,3*s);
    ctx.fillStyle=col; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor=col; ctx.shadowBlur=6;
    ctx.fillText(name,kx,lblY+fs/2);
    ctx.restore();
  }
}

/* ══════════════════════════════════════════════════
   PARTICLES
══════════════════════════════════════════════════ */
var particles=[];
function spawnExhaust(kx,groundY,kartZ,isNitro){
  var s=0.95/kartZ;
  var n=isNitro?6:2;
  var BW=78*s, TH=26*s;
  for(var i=0;i<n;i++){
    var side=(i%2===0?-1:1)*BW*.18;
    particles.push({
      x:kx+side,y:groundY-TH*.1,
      vx:(Math.random()-.5)*1.2,
      vy:2+Math.random()*3,
      life:1,size:(isNitro?5:2.5)*s,
      col:isNitro?['#44ccff','#0088ff','#aaeeff'][i%3]:['#777','#555','#999'][i%3]
    });
  }
}
function updateParticles(dt){
  particles=particles.filter(function(p){
    p.x+=p.vx; p.y+=p.vy; p.life-=dt*2.2; p.size*=.95;
    return p.life>0&&p.size>.3;
  });
}
function drawParticles(){
  particles.forEach(function(p){
    ctx.save(); ctx.globalAlpha=p.life*.8; ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

/* ══════════════════════════════════════════════════
   SPEED LINES
══════════════════════════════════════════════════ */
var speedLines=[];
function ensureSpeedLines(){
  while(speedLines.length<18) speedLines.push({
    x:Math.random()*(CW-HUD_W),
    y:HORIZON_Y+Math.random()*(CH-HORIZON_Y),
    len:Math.random()*60+20,
    spd:Math.random()*8+6,
    a:Math.random()*.5+.2
  });
}
function drawSpeedLines(boost){
  if(!boost) return;
  ctx.save(); ctx.strokeStyle='rgba(0,180,255,0.18)';
  speedLines.forEach(function(sl){
    ctx.lineWidth=Math.random()*1.5+.5;
    ctx.globalAlpha=sl.a*boost;
    ctx.beginPath();
    ctx.moveTo(sl.x,sl.y); ctx.lineTo(sl.x+sl.len,sl.y);
    ctx.stroke();
    sl.x-=sl.spd;
    if(sl.x+sl.len<0){ sl.x=CW-HUD_W; sl.y=HORIZON_Y+Math.random()*(CH-HORIZON_Y); }
  });
  ctx.restore();
}

/* ══════════════════════════════════════════════════
   KART Z POSITIONS (smooth)
══════════════════════════════════════════════════ */
var kartZTarget={}, kartZCurrent={};

function computeKartZTargets(){
  var sorted=Object.values(allPlayers).sort(function(a,b){
    if(!!b.finished!==!!a.finished) return b.finished?1:-1;
    return (b.progress||0)-(a.progress||0);
  });
  var leaderProg=sorted.length?(sorted[0].progress||0):0;
  sorted.forEach(function(p,rank){
    var gap=leaderProg-(p.progress||0);
    kartZTarget[p.pid]=1.12+rank*0.30+gap*2.2;
    kartZTarget[p.pid]=Math.min(kartZTarget[p.pid],6.5);
  });
}

function smoothKartZ(dt){
  Object.keys(kartZTarget).forEach(function(pid){
    var t=kartZTarget[pid];
    var c=kartZCurrent[pid];
    if(c===undefined) c=t;
    kartZCurrent[pid]=c+(t-c)*Math.min(1,dt*2.5);
  });
}

/* ══════════════════════════════════════════════════
   MAIN LOOP
══════════════════════════════════════════════════ */
var boostFlash=0; // 0-1 global boost indicator

function loop(ts){
  if(!gameRunning) return;
  rafId=requestAnimationFrame(loop);
  var dt=Math.min(.05,(ts-(lastTime||ts))/1000); lastTime=ts;

  // Road scroll
  roadScrollZ+=roadSpeed*dt;

  // Update kart effect timers
  Object.keys(kartFx).forEach(function(pid){
    var f=kartFx[pid];
    if(f.nitro>0){ f.nitro-=dt; boostFlash=Math.max(boostFlash,f.nitro); }
    if(f.boost>0) f.boost-=dt;
    if(f.wrong>0) f.wrong-=dt;
  });
  boostFlash=Math.max(0,boostFlash-dt*2);

  computeKartZTargets();
  smoothKartZ(dt);

  // Render
  ctx.clearRect(0,0,CW,CH);
  drawSky();
  drawRoad();

  // Sort players for draw order (farthest first)
  var sorted=Object.values(allPlayers).sort(function(a,b){
    return (kartZCurrent[b.pid]||2)-(kartZCurrent[a.pid]||2);
  });
  var rcx=(CW-HUD_W)/2;
  sorted.forEach(function(p,drawIdx){
    var pid=p.pid;
    var kz=kartZCurrent[pid]||1.5;
    var kp=proj(kz);
    if(kp.y<HORIZON_Y||kp.y>CH+80) return;
    var laneOff=(p.laneX||0)/14*kp.w;
    var kx=rcx+laneOff;

    var fx=kartFx[pid]||{};
    drawKartBehind(kx,kp.y,kz,p.color||'#3498db',(p.name||'?').slice(0,10),drawIdx+1,fx);

    // Exhaust particles every ~6 frames
    if(Math.random()<0.17) spawnExhaust(kx,kp.y,kz,fx.nitro>0);
  });

  drawParticles();
  updateParticles(dt);
  ensureSpeedLines();
  drawSpeedLines(boostFlash);

  updateStandings();
}

/* ══════════════════════════════════════════════════
   IDLE LOOP (lobby / waiting)
══════════════════════════════════════════════════ */
function idleLoop(ts){
  if(gameRunning) return;
  requestAnimationFrame(idleLoop);
  var dt=Math.min(.05,(ts-(lastTime||ts))/1000); lastTime=ts;
  roadScrollZ+=0.8*dt; // slow idle scroll

  ctx.clearRect(0,0,CW,CH);
  drawSky();
  drawRoad();

  // Show players on starting grid while waiting
  var players=Object.values(allPlayers);
  var rcx=(CW-HUD_W)/2;
  var gridZ=[1.12,1.25,1.38,1.51,1.64,1.77];
  var gridX=[-0.18,0.18,-0.18,0.18,-0.18,0.18];
  players.forEach(function(p,i){
    if(i>=gridZ.length) return;
    var gz=gridZ[i];
    var gp=proj(gz);
    var kx=rcx+gridX[i]*(gp.w/2);
    drawKartBehind(kx,gp.y,gz,p.color||'#3498db',(p.name||'?').slice(0,10),i+1,{});
  });
}

/* ══════════════════════════════════════════════════
   HUD
══════════════════════════════════════════════════ */
function updateStandings(){
  var sorted=Object.values(allPlayers).sort(function(a,b){
    if(!!b.finished!==!!a.finished) return b.finished?1:-1;
    return (b.progress||0)-(a.progress||0);
  });
  var html='';
  sorted.forEach(function(p,i){
    var rkCls=i===0?' rk1':i===1?' rk2':i===2?' rk3':'';
    var pct=p.finished?'<span class="stand-done">DONE</span>':Math.round((p.progress||0)*100)+'%';
    html+='<div class="stand-row'+(i===0?' leader':'')+rkCls+'">'
      +'<div class="stand-pos">'+(i+1)+'</div>'
      +'<div class="stand-dot" style="background:'+esc(p.color||'#888')+'"></div>'
      +'<div class="stand-name">'+esc((p.name||'?').slice(0,13))+'</div>'
      +'<div class="stand-pct">'+pct+'</div>'
      +'</div>';
  });
  el('standings').innerHTML=html||'<div style="font-size:11px;color:var(--muted);padding:8px">Waiting…</div>';
}

/* ══════════════════════════════════════════════════
   FIREBASE WATCHERS
══════════════════════════════════════════════════ */
function watchPlayers(){
  playersRef=db.ref('race/'+raceId+'/players');
  playersRef.on('value',function(snap){
    var players=(snap&&snap.val())||{};
    allPlayers={};
    Object.entries(players).forEach(function(e){
      var pid=e[0], p=e[1];
      allPlayers[pid]=Object.assign({pid:pid},p);
      // Detect correct answer events
      var prev=lastCorrect[pid]||0;
      var curr=p.correct||0;
      if(curr>prev){
        kartFx[pid]=kartFx[pid]||{};
        if((p.streak||0)>=3){ kartFx[pid].nitro=2.2; roadSpeed=3.5; setTimeout(function(){roadSpeed=1.8;},2500); }
        else { kartFx[pid].boost=1.2; roadSpeed=2.6; setTimeout(function(){roadSpeed=1.8;},1200); }
        lastCorrect[pid]=curr;
      }
    });
    if(!raceStarted){
      var names=Object.values(allPlayers).map(function(p){return p.name||'?';});
      el('w-count').textContent=names.length;
      el('w-chips').innerHTML=names.map(function(n){return '<div class="w-chip">'+esc(n)+'</div>';}).join('');
    }
  });
}

function watchState(){
  stateRef=db.ref('race/'+raceId+'/state');
  stateRef.on('value',function(snap){
    if(!snap||!snap.val()) return;
    var st=snap.val();
    if(st.phase==='started'&&!raceStarted){
      raceStarted=true;
      var startedAt=st.startedAt||Date.now();
      showOverlay(null);
      el('hud').style.display='flex';
      el('hud-code').textContent=raceId;
      runCountdown(startedAt,function(){
        gameRunning=true;
        lastTime=performance.now();
        rafId=requestAnimationFrame(loop);
      });
    } else if(st.phase==='ended'&&gameRunning){
      showPodium();
    }
  });
}

/* ══════════════════════════════════════════════════
   COUNTDOWN (server-synced)
══════════════════════════════════════════════════ */
function runCountdown(startedAt,done){
  var overlay=el('countdown-overlay'), numEl=el('cd-num');
  overlay.classList.add('show');
  function tick(){
    var elapsed=(Date.now()-startedAt)/1000;
    var cnt=Math.max(0,Math.ceil(3-elapsed));
    numEl.className='cd-big'; void numEl.offsetWidth; numEl.className='cd-big';
    if(cnt===0){
      numEl.textContent='GO!';
      setTimeout(function(){overlay.classList.remove('show'); done&&done();},750);
    } else {
      numEl.textContent=String(cnt);
      setTimeout(tick,1000);
    }
  }
  tick();
}

/* ══════════════════════════════════════════════════
   CONTROLS + PODIUM
══════════════════════════════════════════════════ */
function endRaceBtn(){
  if(!confirm('End race for all players?')) return;
  if(raceId&&db) db.ref('race/'+raceId+'/state/phase').set('ended');
  gameRunning=false;
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  showPodium();
}
function showPodium(){
  gameRunning=false;
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  var sorted=Object.values(allPlayers).sort(function(a,b){
    if(!!b.finished!==!!a.finished) return b.finished?1:-1;
    return (b.progress||0)-(a.progress||0);
  });
  var medals=['🥇','🥈','🥉'], bk=['b1','b2','b3'];
  var order=[sorted[1],sorted[0],sorted[2]].filter(Boolean);
  var ranks=[2,1,3];
  var html='';
  for(var pi=0;pi<order.length;pi++){
    var p=order[pi], r=ranks[pi]-1;
    html+='<div class="pod-col">'
      +'<div class="pod-name">'+esc((p.name||'?').slice(0,13))+'</div>'
      +'<div class="pod-blk '+bk[r]+'" style="border-color:'+esc(p.color||'#3498db')+'60;box-shadow:0 0 22px '+esc(p.color||'#3498db')+'44">'+medals[r]+'</div>'
      +'</div>';
  }
  el('pod-wrap').innerHTML=html||'<div style="color:var(--muted)">No finishers yet</div>';
  showOverlay('s-end');
}
function showOverlay(id){
  document.querySelectorAll('.oscreen').forEach(function(s){s.classList.remove('on');});
  if(id) el(id).classList.add('on');
}

/* ══════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════ */
if(!raceId){
  el('w-err').textContent='No race ID — open from LiveHost projector button';
  el('w-status-txt').textContent='Waiting for connection…';
} else {
  el('w-code').textContent=raceId;
  el('w-status-txt').textContent='Waiting for race director to start…';
  watchPlayers();
  watchState();
  requestAnimationFrame(idleLoop);
}

window.addEventListener('beforeunload',function(){
  if(rafId) cancelAnimationFrame(rafId);
  if(playersRef){try{playersRef.off('value');}catch(_){}}
  if(stateRef){try{stateRef.off('value');}catch(_){}}
});

})();
</script>
