<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="icon" type="image/png" sizes="64x64" href="./assets/edurena_logo_64.png">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kart Race Projector — Edurena</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050810;--panel:#0a0d1a;--bdr:#1a2035;
  --txt:#e8edf5;--muted:#5a6a8a;
  --acc:#00d4ff;--grn:#00ff88;--red:#ff3355;--yel:#ffcc00;
  --f:'Plus Jakarta Sans',system-ui,sans-serif;
  --mono:'Orbitron',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;color:var(--txt);font-family:var(--f)}
#c{position:fixed;top:0;left:0;width:100%;height:100%;display:block;z-index:1}

/* ── HUD SIDEBAR ── */
#hud{
  position:fixed;top:0;right:0;bottom:0;width:230px;
  background:rgba(5,8,16,.92);border-left:1px solid rgba(0,212,255,.12);
  backdrop-filter:blur(16px);z-index:10;
  display:flex;flex-direction:column;padding:16px;overflow:hidden;
}
.hud-brand{font-family:var(--mono);font-size:11px;font-weight:900;
  letter-spacing:3px;color:var(--acc);margin-bottom:3px;text-transform:uppercase}
.hud-code{font-family:var(--mono);font-size:22px;font-weight:900;
  letter-spacing:6px;color:#fff;text-shadow:0 0 14px rgba(0,212,255,.5);margin-bottom:14px}
.hud-lbl{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--muted);
  letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:6px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--red);flex-shrink:0;
  animation:ldp 1.2s ease-in-out infinite;box-shadow:0 0 7px var(--red)}
@keyframes ldp{0%,100%{opacity:1}50%{opacity:.3}}
.stand-row{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:7px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.05);margin-bottom:4px;transition:background .4s}
.stand-row.leader{border-color:rgba(255,204,0,.4);background:rgba(255,204,0,.07)}
.stand-pos{font-family:var(--mono);font-size:11px;font-weight:900;color:var(--muted);width:18px;text-align:center;flex-shrink:0}
.stand-row.rk1 .stand-pos{color:#ffd700}
.stand-row.rk2 .stand-pos{color:#c0c0c0}
.stand-row.rk3 .stand-pos{color:#cd7f32}
.stand-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.stand-name{font-size:12px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stand-pct{font-family:var(--mono);font-size:10px;color:var(--muted)}
.stand-done{color:var(--grn)}
#hud-ctrl{margin-top:auto;padding-top:10px;border-top:1px solid rgba(255,255,255,.07)}
.hud-btn{display:block;width:100%;padding:9px;border-radius:8px;font-family:var(--mono);
  font-size:11px;font-weight:700;letter-spacing:1px;cursor:pointer;border:none;text-align:center;transition:all .2s}
.hud-btn.end{background:rgba(255,51,85,.15);color:var(--red);border:1px solid rgba(255,51,85,.3)}
.hud-btn.end:hover{background:rgba(255,51,85,.25)}

/* ── CAMERA SWITCH BUTTONS ── */
.cam-section{margin-bottom:10px}
.cam-lbl{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--muted);
  letter-spacing:2px;text-transform:uppercase;margin-bottom:5px}
.cam-btn{display:block;width:100%;padding:6px 8px;border-radius:6px;
  font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.5px;
  cursor:pointer;border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.04);color:var(--muted);
  text-align:left;margin-bottom:3px;transition:all .15s;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cam-btn:hover{background:rgba(255,255,255,.1);color:var(--txt)}
.cam-btn.active{background:rgba(0,212,255,.12);border-color:rgba(0,212,255,.38);color:var(--acc)}
.cam-btn.player-btn.active{border-color:var(--player-col,#888);background:rgba(0,0,0,.2);
  color:var(--player-col,#888);box-shadow:0 0 8px var(--player-col,transparent)}
.cam-dot{display:inline-block;width:7px;height:7px;border-radius:50%;
  margin-right:5px;vertical-align:middle;flex-shrink:0}

/* ── OVERLAYS ── */
.oscreen{position:fixed;inset:0;z-index:50;display:none;flex-direction:column;
  align-items:center;justify-content:center;background:rgba(5,8,16,.92);backdrop-filter:blur(12px)}
.oscreen.on{display:flex}

/* ── WAITING ── */
.wait-card{text-align:center;padding:30px;max-width:600px;width:90%}
.w-brand{font-family:var(--mono);font-size:13px;font-weight:900;color:var(--acc);
  letter-spacing:4px;text-transform:uppercase;margin-bottom:26px}
.w-lbl{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.w-code{font-family:var(--mono);font-size:clamp(52px,11vw,80px);font-weight:900;
  color:var(--acc);letter-spacing:14px;text-shadow:0 0 40px rgba(0,212,255,.5);margin-bottom:4px}
.w-count-big{font-family:var(--mono);font-size:52px;font-weight:900;color:var(--grn);
  text-shadow:0 0 20px rgba(0,255,136,.4);margin-top:18px}
.w-count-lbl{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin:4px 0 16px}
.w-chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:520px;margin:0 auto 20px}
.w-chip{padding:4px 12px;background:#0d1525;border:1px solid #1e2d4a;
  border-radius:20px;font-size:12px;font-weight:600;animation:chipPop .3s ease;color:var(--acc)}
@keyframes chipPop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
.w-status{font-size:13px;color:var(--muted);letter-spacing:1px}
.pulse-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--acc);
  margin-right:7px;animation:pdot 1.4s ease-in-out infinite;vertical-align:middle;box-shadow:0 0 8px var(--acc)}
@keyframes pdot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}
.w-err{color:var(--red);font-size:13px;margin-top:12px}

/* ── COUNTDOWN ── */
#countdown-overlay{position:fixed;inset:0;z-index:60;display:flex;align-items:center;
  justify-content:center;pointer-events:none;opacity:0;transition:opacity .3s;
  background:rgba(5,8,16,.45);backdrop-filter:blur(3px)}
#countdown-overlay.show{opacity:1}
.cd-big{font-family:var(--mono);font-size:clamp(120px,25vw,220px);font-weight:900;
  color:#fff;text-shadow:0 0 80px var(--acc),0 0 160px rgba(0,212,255,.3);
  animation:cdPop .7s cubic-bezier(.22,1,.36,1) both}
@keyframes cdPop{from{transform:scale(3.5);opacity:0}to{transform:scale(1);opacity:1}}

/* ── PODIUM ── */
#s-end{gap:20px}
.pod-title{font-family:var(--mono);font-size:clamp(28px,5vw,48px);font-weight:900;
  background:linear-gradient(135deg,var(--yel),var(--acc));-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;letter-spacing:5px}
.pod-wrap{display:flex;align-items:flex-end;gap:16px;margin:20px 0}
.pod-col{display:flex;flex-direction:column;align-items:center;gap:8px}
.pod-blk{border-radius:8px 8px 0 0;background:linear-gradient(to top,rgba(255,255,255,.08),rgba(255,255,255,.15));
  display:flex;align-items:center;justify-content:center;font-family:var(--mono);
  font-size:28px;font-weight:900;color:#fff;width:110px}
.pod-blk.b1{height:130px;border:1px solid rgba(255,204,0,.5);box-shadow:0 0 25px rgba(255,204,0,.25)}
.pod-blk.b2{height:90px;border:1px solid rgba(192,192,192,.4)}
.pod-blk.b3{height:65px;border:1px solid rgba(205,127,50,.4)}
.pod-name{font-size:13px;font-weight:700;max-width:110px;text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.end-close-btn{padding:14px 44px;background:linear-gradient(135deg,#0055aa,#5500cc);
  color:#fff;border:none;border-radius:10px;font-family:var(--mono);font-size:13px;
  font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s;margin-top:8px}
.end-close-btn:hover{transform:translateY(-2px)}

/* ── LOADING BAR ── */
#load-bar{position:fixed;bottom:0;left:0;height:3px;width:0%;
  background:linear-gradient(90deg,var(--acc),var(--grn));z-index:80;transition:width .3s}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="load-bar"></div>

<div id="hud" style="display:none">
  <div class="hud-brand">&#x1F3CE; Kart Race</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader }      from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader }     from 'three/addons/loaders/DRACOLoader.js';
import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

(function(){
'use strict';

/* ── URL PARAMS ── */
var P      = new URLSearchParams(location.search);
var raceId = (P.get('raceId') || '').trim().toUpperCase();

function el(id){ return document.getElementById(id); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function setLoad(pct){ el('load-bar').style.width = pct + '%'; }

/* ── FIREBASE ── */
var db;
try {
  var fbCfg = {
    apiKey:'AIzaSyCLfySFzCpbz3CBX1bjha5KxvA0MrJExIc',
    authDomain:'kahoot-24063.firebaseapp.com',
    databaseURL:'https://kahoot-24063-default-rtdb.firebaseio.com',
    projectId:'kahoot-24063',
    storageBucket:'kahoot-24063.firebasestorage.app',
    messagingSenderId:'962917873467',
    appId:'1:962917873467:web:a6b526aee30cd15c92291e'
  };
  var ea = null;
  if(firebase.apps) firebase.apps.forEach(function(a){ if(a.name==='rh') ea=a; });
  db = firebase.database(ea || firebase.initializeApp(fbCfg,'rh'));
} catch(e){ el('w-err').textContent = 'Firebase: ' + e.message; }

/* ── GAME STATE ── */
var allPlayers  = {};
var gameRunning = false;
var raceStarted = false;
var lastTime    = 0;
var playersRef  = null, stateRef = null;
var lastCorrect = {}, kartFx = {};
/*  kartFx[pid] = { boost: 0-2, nitro: 0-2 }  — countdown timers in seconds  */

/* ── CAMERA FOLLOW STATE ── */
var camTarget  = null;                           /* pid string, or null = orbit */
var camFollow  = new THREE.Vector3(0, 68, 165);  /* lerped camera position      */
var camLookAt  = new THREE.Vector3(0, 15, 0);    /* lerped look-at point        */
var _camPt     = new THREE.Vector3();
var _camTan    = new THREE.Vector3();

/* ── THREE.JS GLOBALS ── */
var renderer, scene, camera, composer;
var trackCurve;                    // CatmullRomCurve3, closed
var kartObjects = {};              // pid → { group, bodyMeshes, wheels, boostLight }
var kartTemplate = null;           // loaded GLTFLoader result (or null = not yet)
var ROAD_HW     = 12;              // road half-width in world units
var HUD_PX      = 230;            // HUD sidebar width — used for camera FOV offset

/* ── CAMERA ── */
var camAngle  = 0;
var camRadius = 165;
var camHeight = 68;

/* ═══════════════════════════════════════════════════════════════
   SCENE INIT
═══════════════════════════════════════════════════════════════ */
function initScene(){
  var canvas = el('c');

  renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
  renderer.toneMapping       = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;
  renderer.outputColorSpace  = THREE.SRGBColorSpace;

  scene  = new THREE.Scene();
  scene.fog = new THREE.Fog(0xa8d8ea, 220, 480);

  var aspect = window.innerWidth / window.innerHeight;
  camera = new THREE.PerspectiveCamera(54, aspect, 0.5, 800);
  camera.position.set(0, camHeight, camRadius);
  camera.lookAt(0, 15, 0);

  window.addEventListener('resize', onResize);

  /* post-processing: subtle bloom on lights */
  composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  var bloom = new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight),
    0.55,  // strength
    0.45,  // radius
    0.80   // threshold — only bright lights bloom
  );
  composer.addPass(bloom);

  setupLights();
  buildEnvironment();
  loadKartModel();

  requestAnimationFrame(animate);
}

function onResize(){
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
}

/* ═══════════════════════════════════════════════════════════════
   LIGHTS
═══════════════════════════════════════════════════════════════ */
function setupLights(){
  /* sky/ground hemisphere */
  var hemi = new THREE.HemisphereLight(0x87ceeb, 0x3a9c1c, 1.0);
  scene.add(hemi);

  /* primary sun */
  var sun = new THREE.DirectionalLight(0xfff8e0, 2.8);
  sun.position.set(80, 130, 60);
  sun.castShadow = true;
  sun.shadow.mapSize.set(1024, 1024);
  sun.shadow.camera.left   = -220;
  sun.shadow.camera.right  =  220;
  sun.shadow.camera.top    =  220;
  sun.shadow.camera.bottom = -220;
  sun.shadow.camera.near   =   1;
  sun.shadow.camera.far    = 600;
  sun.shadow.bias          = -0.0004;
  scene.add(sun);

  /* fill light from opposite side */
  var fill = new THREE.DirectionalLight(0xc8e8ff, 0.6);
  fill.position.set(-60, 60, -80);
  scene.add(fill);

  var amb = new THREE.AmbientLight(0xffffff, 0.3);
  scene.add(amb);
}

/* ═══════════════════════════════════════════════════════════════
   ENVIRONMENT
═══════════════════════════════════════════════════════════════ */
var trackRadius = 90; /* updated once track GLB loads */

function initTrackCurve(r){
  var f = r / 90;
  trackCurve = new THREE.CatmullRomCurve3([
    new THREE.Vector3(  0,0, 90*f), new THREE.Vector3( 38*f,0, 83*f),
    new THREE.Vector3( 68*f,0, 63*f), new THREE.Vector3( 87*f,0, 33*f),
    new THREE.Vector3( 92*f,0,  0), new THREE.Vector3( 87*f,0,-33*f),
    new THREE.Vector3( 68*f,0,-63*f), new THREE.Vector3( 38*f,0,-83*f),
    new THREE.Vector3(  0,0,-92*f), new THREE.Vector3(-38*f,0,-83*f),
    new THREE.Vector3(-68*f,0,-63*f), new THREE.Vector3(-87*f,0,-33*f),
    new THREE.Vector3(-92*f,0,  0), new THREE.Vector3(-87*f,0, 33*f),
    new THREE.Vector3(-68*f,0, 63*f), new THREE.Vector3(-38*f,0, 83*f),
  ], true, 'catmullrom', 0.5);
  trackCurve.arcLengthDivisions = 2000;
}

function buildEnvironment(){
  initTrackCurve(90); /* placeholder until track GLB loads */
  setLoad(15);

  buildSky();

  /* Green ground plane — always visible behind the track GLB */
  var grass = new THREE.Mesh(
    new THREE.PlaneGeometry(1200, 1200),
    new THREE.MeshLambertMaterial({ color: 0x3aaa1a })
  );
  grass.rotation.x = -Math.PI / 2;
  grass.receiveShadow = true;
  scene.add(grass);

  setLoad(25);
  loadTrackGLB();
}

/* Load the Mario Circuit track from the open-source repo */
function loadTrackGLB(){
  var loader = new GLTFLoader();
  var draco  = new DRACOLoader();
  draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
  loader.setDRACOLoader(draco);

  loader.load(
    'https://raw.githubusercontent.com/mustache-dev/Mario-Kart-3.js/main/public/models/mario-circuit-test-transformed.glb',
    function(gltf){
      var group = gltf.scene;

      /* Measure raw extent at current scale (scale=1 from loader) */
      var rawBox  = new THREE.Box3().setFromObject(group);
      var rawSize = new THREE.Vector3(); rawBox.getSize(rawSize);
      var rawExtent = Math.max(rawSize.x, rawSize.z) * 0.5;

      /* Scale so the track fills a 105-unit radius in our world */
      var TARGET_R  = 105;
      var s         = rawExtent > 0.001 ? TARGET_R / rawExtent : 0.08;
      group.scale.setScalar(s);

      /* Centre the track at origin, bottom of bounding box → y=0 */
      var sBox   = new THREE.Box3().setFromObject(group);
      var center = sBox.getCenter(new THREE.Vector3());
      group.position.set(-center.x, -sBox.min.y, -center.z);

      group.traverse(function(child){
        if(!child.isMesh) return;
        child.receiveShadow = true;
        child.castShadow    = false;
        var mats = Array.isArray(child.material) ? child.material : [child.material];
        mats.forEach(function(m){
          if(!m) return;
          if(m.roughness !== undefined) m.roughness = Math.min(m.roughness, 0.9);
          if(m.metalness !== undefined) m.metalness = Math.max(m.metalness, 0);
        });
      });
      scene.add(group);
      setLoad(65);

      /* Kart path at 88% of radius — Mario Circuit road runs the outer perimeter */
      trackRadius = TARGET_R;
      initTrackCurve(TARGET_R * 0.88);

      finishEnvironment(TARGET_R);
    },
    function(xhr){ if(xhr.total) setLoad(25 + 38*(xhr.loaded/xhr.total)); },
    function(err){
      console.warn('Mario Circuit GLB failed – using procedural track:', err);
      buildProceduralTrack();
      finishEnvironment(90);
    }
  );
}

/* Called only when track GLB fails to load */
function buildProceduralTrack(){
  var infGeo = new THREE.PlaneGeometry(200, 200);
  var infMesh = new THREE.Mesh(infGeo, new THREE.MeshLambertMaterial({ color: 0x2d8812 }));
  infMesh.rotation.x = -Math.PI / 2; infMesh.position.y = 0.01;
  scene.add(infMesh);
  scene.add(buildRoadMesh());
  buildCurbs();
}

/* Build scene decoration once track size is known */
function finishEnvironment(r){
  buildStartBanner();
  buildTrees(r * 1.32);
  buildFlags(r * 1.10);
  buildCrowd(r * 1.18);
  camRadius = Math.max(175, r * 1.90);
  camHeight = Math.max(80, r * 0.92);
  setLoad(70);
}

/* ── Sky ── */
function buildSky(){
  var skyGeo = new THREE.SphereGeometry(450, 32, 16);
  var skyMat = new THREE.ShaderMaterial({
    uniforms:{
      uTop:{ value: new THREE.Color(0x1a55d0) },
      uMid:{ value: new THREE.Color(0x87ceeb) },
      uBot:{ value: new THREE.Color(0xb8e0f0) },
    },
    vertexShader:[
      'varying float vY;',
      'void main(){',
      '  vY = normalize(position).y;',
      '  gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);',
      '}'
    ].join('\n'),
    fragmentShader:[
      'uniform vec3 uTop,uMid,uBot;',
      'varying float vY;',
      'void main(){',
      '  float h = clamp(vY,-1.0,1.0);',
      '  vec3 c = h>0.0 ? mix(uMid,uTop,pow(h,0.6)) : mix(uBot,uMid,pow(h+1.0,0.6));',
      '  gl_FragColor = vec4(c,1.0);',
      '}'
    ].join('\n'),
    side: THREE.BackSide,
    depthWrite: false,
  });
  scene.add(new THREE.Mesh(skyGeo, skyMat));

  /* Clouds */
  var cloudMat = new THREE.MeshBasicMaterial({ color:0xffffff, transparent:true, opacity:0.88 });
  var cloudPos = [
    [0,130,-220],[110,120,-190],[-160,140,-100],
    [210,130, 60],[-90,135, 160],[55,115,215],
    [-215,128,-55],[175,142,-130],
  ];
  cloudPos.forEach(function(p){
    var cg = new THREE.Group();
    cg.position.set(p[0],p[1],p[2]);
    var r = 16 + Math.random()*10;
    [[0,0,0],[-r*.5,-r*.2,r*.3],[r*.6,-r*.15,0],[r*.1,r*.1,-r*.5]].forEach(function(o){
      var sr  = r*(0.45+Math.random()*0.55);
      var s   = new THREE.Mesh(new THREE.SphereGeometry(sr,8,6), cloudMat);
      s.position.set(o[0],o[1],o[2]);
      s.scale.set(1.7, 0.6, 1.2);
      cg.add(s);
    });
    scene.add(cg);
  });
}

/* ── Road ribbon ── */
function buildRoadMesh(){
  var N = 400;
  var pos=[], nor=[], uvs=[], idx=[];
  var _p = new THREE.Vector3();
  var _t = new THREE.Vector3();

  for(var i=0;i<=N;i++){
    var u = i/N;
    trackCurve.getPointAt(u, _p);
    trackCurve.getTangentAt(u, _t); _t.normalize();

    /* right vector in XZ plane */
    var rx = _t.z, rz = -_t.x;

    /* left edge */
    pos.push(_p.x - rx*ROAD_HW, 0.04, _p.z - rz*ROAD_HW);
    nor.push(0,1,0); uvs.push(0, u*18);

    /* right edge */
    pos.push(_p.x + rx*ROAD_HW, 0.04, _p.z + rz*ROAD_HW);
    nor.push(0,1,0); uvs.push(1, u*18);
  }
  for(var i=0;i<N;i++){
    var a=i*2, b=i*2+1, c=i*2+2, d=i*2+3;
    idx.push(a,c,b, b,c,d);
  }

  var geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos,3));
  geo.setAttribute('normal',   new THREE.Float32BufferAttribute(nor,3));
  geo.setAttribute('uv',       new THREE.Float32BufferAttribute(uvs,2));
  geo.setIndex(idx);

  var tex = makeRoadTexture();
  tex.wrapS = THREE.ClampToEdgeWrapping;
  tex.wrapT = THREE.RepeatWrapping;

  var mat = new THREE.MeshStandardMaterial({
    map: tex, roughness:0.92, metalness:0.0, side:THREE.DoubleSide
  });
  var mesh = new THREE.Mesh(geo, mat);
  mesh.receiveShadow = true;
  return mesh;
}

function makeRoadTexture(){
  var c = document.createElement('canvas');
  c.width=256; c.height=512;
  var x = c.getContext('2d');

  /* asphalt gradient */
  var g = x.createLinearGradient(0,0,256,0);
  g.addColorStop(0,   '#1a1a1e');
  g.addColorStop(0.08,'#242428');
  g.addColorStop(0.5, '#2a2a30');
  g.addColorStop(0.92,'#242428');
  g.addColorStop(1,   '#1a1a1e');
  x.fillStyle=g; x.fillRect(0,0,256,512);

  /* grain */
  for(var i=0;i<600;i++){
    var v=Math.floor(Math.random()*16);
    x.fillStyle='rgba('+v+','+v+','+v+',0.35)';
    x.fillRect(Math.random()*256, Math.random()*512, 1+Math.random()*2, 1);
  }

  /* dashed centre line */
  x.save(); x.strokeStyle='rgba(255,255,255,0.75)'; x.setLineDash([38,26]);
  x.lineWidth=7; x.beginPath(); x.moveTo(128,0); x.lineTo(128,512); x.stroke(); x.restore();

  /* white edge lines */
  x.save(); x.setLineDash([]); x.lineWidth=4; x.strokeStyle='rgba(255,255,255,0.55)';
  x.beginPath(); x.moveTo(8,0);   x.lineTo(8,512);   x.stroke();
  x.beginPath(); x.moveTo(248,0); x.lineTo(248,512);  x.stroke();
  x.restore();

  return new THREE.CanvasTexture(c);
}

/* ── Curbs ── */
function buildCurbs(){
  var CURB_W = 2.6;
  var N = 400;
  var posL=[], posR=[], nor=[], uvs=[], idx=[];
  var _p=new THREE.Vector3(), _t=new THREE.Vector3();

  for(var i=0;i<=N;i++){
    var u=i/N;
    trackCurve.getPointAt(u,_p); trackCurve.getTangentAt(u,_t); _t.normalize();
    var rx=_t.z, rz=-_t.x;

    /* left curb: ROAD_HW → ROAD_HW+CURB_W */
    posL.push(_p.x - rx*ROAD_HW,       0.06, _p.z - rz*ROAD_HW);
    posL.push(_p.x - rx*(ROAD_HW+CURB_W), 0.06, _p.z - rz*(ROAD_HW+CURB_W));

    /* right curb */
    posR.push(_p.x + rx*ROAD_HW,       0.06, _p.z + rz*ROAD_HW);
    posR.push(_p.x + rx*(ROAD_HW+CURB_W), 0.06, _p.z + rz*(ROAD_HW+CURB_W));

    nor.push(0,1,0, 0,1,0);
    uvs.push(0, u*36, 1, u*36);

    if(i<N){
      var a=i*2, b=i*2+1, c=i*2+2, d=i*2+3;
      idx.push(a,c,b, b,c,d);
    }
  }

  var tex = makeCurbTexture();
  tex.wrapS=THREE.ClampToEdgeWrapping; tex.wrapT=THREE.RepeatWrapping;
  var mat = new THREE.MeshStandardMaterial({ map:tex, roughness:0.65, side:THREE.DoubleSide });

  function makeMesh(positions){
    var geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(positions,3));
    geo.setAttribute('normal',   new THREE.Float32BufferAttribute(nor,3));
    geo.setAttribute('uv',       new THREE.Float32BufferAttribute(uvs,2));
    geo.setIndex(idx);
    var m = new THREE.Mesh(geo, mat);
    m.receiveShadow = true;
    return m;
  }
  scene.add(makeMesh(posL));
  scene.add(makeMesh(posR));
}

function makeCurbTexture(){
  var c=document.createElement('canvas'); c.width=64; c.height=16;
  var x=c.getContext('2d');
  for(var i=0;i<8;i++){
    x.fillStyle = i%2===0 ? '#ee2211' : '#f5f5f5';
    x.fillRect(i*8,0,8,16);
  }
  return new THREE.CanvasTexture(c);
}

/* ── Start/Finish banner ── */
function buildStartBanner(){
  var startPt  = trackCurve.getPointAt(0);
  var startTan = trackCurve.getTangentAt(0).normalize();
  var yaw      = Math.atan2(startTan.x, startTan.z);

  var g = new THREE.Group();
  g.position.copy(startPt);
  g.rotation.y = yaw;

  var poleMat = new THREE.MeshStandardMaterial({ color:0xbbbbbb, metalness:0.7, roughness:0.3 });
  var poleGeo = new THREE.CylinderGeometry(0.38, 0.38, 18, 10);

  var pL = new THREE.Mesh(poleGeo, poleMat); pL.position.set(-(ROAD_HW+1), 9, 0); pL.castShadow=true; g.add(pL);
  var pR = new THREE.Mesh(poleGeo, poleMat); pR.position.set(  ROAD_HW+1,  9, 0); pR.castShadow=true; g.add(pR);

  var beamGeo = new THREE.BoxGeometry(ROAD_HW*2+2, 1.1, 1.1);
  var beam    = new THREE.Mesh(beamGeo, poleMat);
  beam.position.set(0, 18, 0); g.add(beam);

  /* canvas banner texture */
  var bc=document.createElement('canvas'); bc.width=512; bc.height=80;
  var bx=bc.getContext('2d');
  /* checkered */
  for(var xi=0;xi<16;xi++) for(var yi=0;yi<2;yi++){
    bx.fillStyle=(xi+yi)%2===0?'#111':'#fff';
    bx.fillRect(xi*32, yi*40, 32, 40);
  }
  /* text */
  bx.fillStyle='#ffcc00';
  bx.font='bold 28px Orbitron,sans-serif';
  bx.textAlign='center'; bx.textBaseline='middle';
  bx.shadowColor='#000'; bx.shadowBlur=6;
  bx.fillText('START / FINISH', 256, 40);

  var banTex = new THREE.CanvasTexture(bc);
  var banGeo = new THREE.PlaneGeometry(ROAD_HW*2+2, 3.5);
  var banMat = new THREE.MeshBasicMaterial({ map:banTex, side:THREE.DoubleSide });
  var banner  = new THREE.Mesh(banGeo, banMat);
  banner.position.set(0, 15.2, 0);
  g.add(banner);

  scene.add(g);
}

/* ── Trees (instanced) ── */
function buildTrees(baseRadius){
  baseRadius = baseRadius || 116;
  var N     = 72;
  var tGeo  = new THREE.CylinderGeometry(0.45, 0.7, 4.5, 8);
  var tMat  = new THREE.MeshLambertMaterial({ color:0x5c3310 });
  var lGeo  = new THREE.SphereGeometry(3.8, 8, 6);
  var leafColors = [0x1c6408, 0x228212, 0x267a0e, 0x1e7212];

  var tInst = new THREE.InstancedMesh(tGeo, tMat, N);
  var lInsts = leafColors.map(function(col){
    return new THREE.InstancedMesh(lGeo, new THREE.MeshLambertMaterial({color:col}), Math.ceil(N/leafColors.length)+2);
  });
  var lCount = [0,0,0,0];

  var dummy = new THREE.Object3D();
  for(var i=0;i<N;i++){
    var ang  = (i/N)*Math.PI*2;
    var dist = baseRadius + (i*41)%55;
    var x    = Math.cos(ang)*dist;
    var z    = Math.sin(ang)*dist;
    var sc   = 0.65 + (i*0.19)%0.55;

    dummy.position.set(x, 2.25*sc, z);
    dummy.scale.set(sc,sc,sc);
    dummy.rotation.set(0,ang,0);
    dummy.updateMatrix();
    tInst.setMatrixAt(i, dummy.matrix);

    var li = i%leafColors.length;
    dummy.position.set(x, 7.5*sc, z);
    dummy.scale.set(sc*1.1, sc*0.88, sc*1.1);
    dummy.updateMatrix();
    lInsts[li].setMatrixAt(lCount[li]++, dummy.matrix);
  }

  tInst.castShadow=true; scene.add(tInst);
  lInsts.forEach(function(l){ l.castShadow=true; scene.add(l); });
}

/* ── Colored flags ── */
function buildFlags(baseRadius){
  baseRadius = baseRadius || (ROAD_HW + 5.5 + 90);
  var colors=[0xff2211,0xffcc00,0x00aaff,0x00ff88,0xff6600,0xcc22ff,0xff00aa,0x00ffcc];
  var poleGeo = new THREE.CylinderGeometry(0.18, 0.18, 10, 6);
  var poleMat = new THREE.MeshLambertMaterial({ color:0xaaaaaa });

  for(var i=0;i<24;i++){
    var u   = i/24;
    var ang = u * Math.PI * 2;
    var side = i%2===0?1:-1;
    var dist = baseRadius * (0.92 + (i*0.07)%0.16);
    var pt  = new THREE.Vector3(Math.cos(ang)*dist, 0, Math.sin(ang)*dist);
    var tan = new THREE.Vector3(-Math.sin(ang), 0, Math.cos(ang));
    var rx  = tan.z, rz = -tan.x;
    var off  = 0;

    var pole = new THREE.Mesh(poleGeo, poleMat);
    pole.position.set(pt.x+rx*off*side, 5, pt.z+rz*off*side);
    scene.add(pole);

    var flagGeo = new THREE.PlaneGeometry(3.2, 1.6);
    var flagMat = new THREE.MeshBasicMaterial({
      color: colors[i%colors.length], side:THREE.DoubleSide
    });
    var flag = new THREE.Mesh(flagGeo, flagMat);
    flag.position.set(pt.x+rx*off*side+1.6, 10.3, pt.z+rz*off*side);
    flag.rotation.y = Math.atan2(tan.x, tan.z) + Math.PI/2;
    scene.add(flag);
  }
}

/* ── Crowd silhouettes ── */
function buildCrowd(baseRadius){
  baseRadius = baseRadius || 105;
  var headGeo  = new THREE.SphereGeometry(0.55, 6, 6);
  var bodyGeo  = new THREE.CylinderGeometry(0.4, 0.55, 1.4, 6);
  var crowdColors=[0xff6644,0x44aaff,0xffcc22,0x88ff44,0xff44cc,0x44ffcc,0xffaa44,0xcc44ff];
  var N = 140;

  for(var i=0;i<N;i++){
    var ang  = (i/N)*Math.PI*2;
    var dist = baseRadius + (i*31)%20;
    var x    = Math.cos(ang)*dist;
    var z    = Math.sin(ang)*dist;
    var col  = new THREE.Color(crowdColors[i%crowdColors.length]);

    var mat = new THREE.MeshLambertMaterial({ color:col });
    var body = new THREE.Mesh(bodyGeo, mat);
    body.position.set(x, 0.7+Math.sin(i*2.7)*0.15, z);
    scene.add(body);

    var head = new THREE.Mesh(headGeo, mat);
    head.position.set(x, 1.9+Math.sin(i*2.7)*0.15, z);
    scene.add(head);
  }
}

/* ═══════════════════════════════════════════════════════════════
   KART MODEL LOADING
═══════════════════════════════════════════════════════════════ */
function loadKartModel(){
  var loader = new GLTFLoader();

  /* Draco decoder — use Khronos gstatic CDN (always reliable) */
  var draco = new DRACOLoader();
  draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
  loader.setDRACOLoader(draco);

  var url = 'https://raw.githubusercontent.com/mustache-dev/Mario-Kart-3.js/main/public/kart-transformed.glb';

  loader.load(
    url,
    function(gltf){
      kartTemplate = gltf;
      setLoad(90);
      /* Spawn karts for players who joined while the model was loading */
      Object.values(allPlayers).forEach(function(p){
        if(!kartObjects[p.pid]) createKartForPlayer(p);
      });
      setLoad(100);
      setTimeout(function(){ el('load-bar').style.opacity=0; }, 600);
    },
    function(xhr){
      if(xhr.total) setLoad(70 + 20*(xhr.loaded/xhr.total));
    },
    function(err){
      console.warn('Kart GLB failed, using fallback:', err);
      kartTemplate = { scene: null }; /* signal: use fallback */
      Object.values(allPlayers).forEach(function(p){
        if(!kartObjects[p.pid]) createKartForPlayer(p);
      });
      setLoad(100);
    }
  );
}

/* Deep-clone a GLB scene, duplicating materials so each kart is independent */
function cloneWithMaterials(source){
  var clone = source.clone(true);
  clone.traverse(function(child){
    if(!child.isMesh) return;
    if(Array.isArray(child.material)){
      child.material = child.material.map(function(m){ return m.clone(); });
    } else if(child.material){
      child.material = child.material.clone();
    }
  });
  return clone;
}

function createKartForPlayer(player){
  var pid = player.pid;
  if(kartObjects[pid]) return;

  var group       = new THREE.Group();
  var bodyMeshes  = [];
  var wheels      = [];

  if(kartTemplate && kartTemplate.scene){
    /* GLB kart */
    var kartScene = cloneWithMaterials(kartTemplate.scene);

    /* The GLB model's front faces –Z; rotating by PI makes it face +Z  */
    /* (matching the original Kart.jsx rotation-y={Math.PI})             */
    kartScene.rotation.y  = Math.PI;
    kartScene.position.y  = -0.5;
    kartScene.scale.setScalar(1.25);

    kartScene.traverse(function(child){
      if(!child.isMesh) return;
      child.castShadow    = true;
      child.receiveShadow = false;
      if(/wheel/i.test(child.name)) wheels.push(child);

      var mats = Array.isArray(child.material) ? child.material : [child.material];
      mats.forEach(function(mat){
        if(!mat) return;
        /* Primary: match known body material names from the repo's GLB */
        var isBody = (mat.name === 'm_Body' || mat.name === 'Body' ||
                      mat.name === 'm_Kart' || mat.name === 'Kart');
        if(isBody){
          mat.color.set(player.color || '#3498db');
          mat.emissive = new THREE.Color(player.color || '#3498db');
          mat.emissiveIntensity = 0.08;
          bodyMeshes.push(child);
        }
      });
    });

    /* Fallback: if no body found by name, tint all non-wheel, non-dark meshes */
    if(bodyMeshes.length === 0){
      kartScene.traverse(function(child){
        if(!child.isMesh || /wheel/i.test(child.name)) return;
        var mats = Array.isArray(child.material) ? child.material : [child.material];
        mats.forEach(function(mat){
          if(!mat || !mat.color) return;
          var lum = (mat.color.r + mat.color.g + mat.color.b) / 3;
          if(lum > 0.09){ /* skip black/dark tyre-like materials */
            mat.color.set(player.color || '#3498db');
            mat.emissive = new THREE.Color(player.color || '#3498db');
            mat.emissiveIntensity = 0.08;
            bodyMeshes.push(child);
          }
        });
      });
    }

    group.add(kartScene);

  } else {
    /* Fallback: simple box kart */
    var fb = makeFallbackKart(player.color || '#3498db');
    fb.traverse(function(c){
      if(!c.isMesh) return;
      c.castShadow = true;
      bodyMeshes.push(c);
    });
    group.add(fb);
  }

  /* Name label sprite (always faces camera) */
  var sprite = makeNameSprite(player.name || '?', player.color || '#3498db');
  sprite.position.set(0, 4.5, 0);
  sprite.scale.set(7.5, 1.9, 1);
  group.add(sprite);

  /* Point light behind kart — used for boost/nitro glow */
  var bLight = new THREE.PointLight(player.color || '#3498db', 0, 16, 2.0);
  bLight.position.set(0, 0.9, -2.0);
  group.add(bLight);

  scene.add(group);

  kartObjects[pid] = {
    group:        group,
    bodyMeshes:   bodyMeshes,
    wheels:       wheels,
    boostLight:   bLight,
    smoothProg:   player.progress || 0,
    targetProg:   player.progress || 0,
    color:        player.color || '#3498db',
  };
}

function removeKartForPlayer(pid){
  var ko = kartObjects[pid];
  if(!ko) return;
  scene.remove(ko.group);
  ko.group.traverse(function(c){
    if(c.geometry) c.geometry.dispose();
    if(c.material){
      (Array.isArray(c.material)?c.material:[c.material]).forEach(function(m){m&&m.dispose();});
    }
  });
  delete kartObjects[pid];
}

/* Fallback kart: simple low-poly box shape */
function makeFallbackKart(color){
  var g   = new THREE.Group();
  var col = new THREE.Color(color);
  var std = function(c,r,m){ return new THREE.MeshStandardMaterial({color:c,roughness:r||0.4,metalness:m||0.3}); };

  var body = new THREE.Mesh(new THREE.BoxGeometry(1.85,0.52,2.4), std(col));
  body.position.y = 0.52; g.add(body);

  var cab = new THREE.Mesh(new THREE.BoxGeometry(1.1,0.44,1.1), std(col));
  cab.position.set(0,1.0,-0.12); g.add(cab);

  var wing = new THREE.Mesh(new THREE.BoxGeometry(2.1,0.1,0.42), std(col));
  wing.position.set(0,1.28,-0.96); g.add(wing);

  var wGeo = new THREE.CylinderGeometry(0.38,0.38,0.22,12);
  var wMat = std(new THREE.Color(0x111111),0.9,0.1);
  [[-1.0,0.38,0.82],[1.0,0.38,0.82],[-1.0,0.38,-0.82],[1.0,0.38,-0.82]].forEach(function(p){
    var w = new THREE.Mesh(wGeo,wMat);
    w.rotation.z = Math.PI/2;
    w.position.set(p[0],p[1],p[2]);
    g.add(w);
  });

  return g;
}

/* Canvas-texture sprite for the player name tag */
function makeNameSprite(name, color){
  var c   = document.createElement('canvas'); c.width=256; c.height=64;
  var ctx = c.getContext('2d');

  /* dark pill background */
  ctx.fillStyle = 'rgba(5,8,22,0.82)';
  _rrFillCtx(ctx,0,0,256,64,12); ctx.fill();

  /* color accent bar */
  ctx.fillStyle = color;
  _rrFillCtx(ctx,0,50,256,14,[0,0,12,12]); ctx.fill();

  /* name text */
  ctx.fillStyle   = '#ffffff';
  ctx.font        = 'bold 25px Orbitron,monospace';
  ctx.textAlign   = 'center';
  ctx.textBaseline= 'middle';
  ctx.shadowColor = color;
  ctx.shadowBlur  = 8;
  ctx.fillText(name.slice(0,12), 128, 28);

  var tex = new THREE.CanvasTexture(c);
  return new THREE.Sprite(new THREE.SpriteMaterial({ map:tex, transparent:true, depthWrite:false }));
}

function _rrFillCtx(ctx,x,y,w,h,r){
  if(typeof r==='number') r=[r,r,r,r];
  ctx.beginPath();
  ctx.moveTo(x+r[0],y);
  ctx.lineTo(x+w-r[1],y); ctx.arcTo(x+w,y,x+w,y+r[1],r[1]);
  ctx.lineTo(x+w,y+h-r[2]); ctx.arcTo(x+w,y+h,x+w-r[2],y+h,r[2]);
  ctx.lineTo(x+r[3],y+h); ctx.arcTo(x,y+h,x,y+h-r[3],r[3]);
  ctx.lineTo(x,y+r[0]); ctx.arcTo(x,y,x+r[0],y,r[0]);
  ctx.closePath();
}

/* ═══════════════════════════════════════════════════════════════
   KART POSITION + ANIMATION
═══════════════════════════════════════════════════════════════ */
var _vPos  = new THREE.Vector3();
var _vTan  = new THREE.Vector3();
var _vTnx  = new THREE.Vector3();
var _vRight= new THREE.Vector3();

function updateKartObject(pid, player, dt){
  var ko = kartObjects[pid];
  if(!ko) return;

  /* Smoothly interpolate towards Firebase progress */
  var target = player.progress || 0;
  var diff   = target - ko.smoothProg;
  ko.smoothProg += diff * Math.min(1.0, dt*3.5);

  var t = ((ko.smoothProg % 1)+1) % 1;

  trackCurve.getPointAt(t,   _vPos);
  trackCurve.getTangentAt(t, _vTan);
  _vTan.normalize();

  /* Right vector (perpendicular in XZ) */
  _vRight.set(_vTan.z, 0, -_vTan.x);

  /* Lane offset: laneX is in [-3.5, 3.5] design units */
  var laneX  = player.laneX || 0;
  var lScale = 1.65; /* world units per design lane unit */
  _vPos.x   += _vRight.x * laneX * lScale;
  _vPos.z   += _vRight.z * laneX * lScale;
  _vPos.y    = 0.5;

  ko.group.position.copy(_vPos);

  /* Yaw: align kart's local +Z to tangent direction.
     +Math.PI because the GLB model is rotated 180° in Kart.jsx */
  ko.group.rotation.y = Math.atan2(_vTan.x, _vTan.z) + Math.PI;

  /* Subtle lean through corners using curvature */
  var tA = (t+0.01)%1, tB=(t-0.01+1)%1;
  trackCurve.getTangentAt(tA, _vTnx); _vTnx.normalize();
  trackCurve.getTangentAt(tB, _vPos);  _vPos.normalize(); /* reuse _vPos temporarily */
  var curv = _vTnx.x * _vPos.z - _vTnx.z * _vPos.x;
  ko.group.rotation.z = curv * 14;
  /* Restore _vPos */
  trackCurve.getPointAt(t, _vPos);

  /* Wheel spin proportional to progress speed */
  var speed = diff / Math.max(dt, 0.001);
  if(ko.wheels.length && Math.abs(speed)>0.0001){
    ko.wheels.forEach(function(w){ w.rotation.x += speed * 85; });
  }

  /* Boost / nitro light and emissive */
  var fx = kartFx[pid] || {};
  var nitro = Math.max(0, fx.nitro||0);
  var boost = Math.max(0, fx.boost||0);

  if(nitro > 0){
    ko.boostLight.intensity = 700 * nitro;
    ko.boostLight.color.set(0x0099ff);
    ko.boostLight.distance = 20;
    _setBodyEmissive(ko, 0.45);
  } else if(boost > 0){
    ko.boostLight.intensity = 320 * boost;
    ko.boostLight.color.set(ko.color);
    ko.boostLight.distance = 14;
    _setBodyEmissive(ko, 0.22);
  } else {
    ko.boostLight.intensity = 0;
    _setBodyEmissive(ko, 0.07);
  }
}

function _setBodyEmissive(ko, val){
  ko.bodyMeshes.forEach(function(m){
    var mats = Array.isArray(m.material)?m.material:[m.material];
    mats.forEach(function(mat){ if(mat&&mat.emissiveIntensity!==undefined) mat.emissiveIntensity=val; });
  });
}

/* Grid positions while waiting for race to start */
var _idleT = 0;
function updateIdleKarts(ts){
  _idleT = ts / 1000;
  var players = Object.values(allPlayers);

  players.forEach(function(p, i){
    var ko = kartObjects[p.pid];
    if(!ko) return;

    var col  = i % 2;          /* 0=left lane, 1=right lane  */
    var row  = Math.floor(i/2);
    var u    = 0.005 * row;    /* stagger along start straight */

    trackCurve.getPointAt(u, _vPos);
    trackCurve.getTangentAt(u, _vTan); _vTan.normalize();
    _vRight.set(_vTan.z, 0, -_vTan.x);

    var lx = col===0 ? -3.2 : 3.2;
    ko.group.position.set(
      _vPos.x + _vRight.x*lx,
      0.5 + Math.sin(_idleT*1.3+i*1.1)*0.12,
      _vPos.z + _vRight.z*lx
    );
    ko.group.rotation.y = Math.atan2(_vTan.x, _vTan.z) + Math.PI;
    ko.group.rotation.z = Math.sin(_idleT*0.8+i)*0.02; /* gentle sway */
    ko.boostLight.intensity = 0;
  });
}

/* ═══════════════════════════════════════════════════════════════
   MAIN ANIMATION LOOP
═══════════════════════════════════════════════════════════════ */
function animate(ts){
  requestAnimationFrame(animate);
  var dt = Math.min(0.05, (ts-(lastTime||ts))/1000);
  lastTime = ts;

  /* Camera: follow a chosen player or orbit the track */
  if(camTarget && kartObjects[camTarget]){
    var _ko = kartObjects[camTarget];
    var _t  = ((_ko.smoothProg||0)%1+1)%1;
    trackCurve.getPointAt(_t,   _camPt);
    trackCurve.getTangentAt(_t, _camTan); _camTan.normalize();

    /* Ideal behind-kart position: 10 back, 5.5 up */
    var idealPos = {
      x: _camPt.x - _camTan.x * 10,
      y: _camPt.y + 5.5,
      z: _camPt.z - _camTan.z * 10
    };
    /* Look slightly ahead of the kart */
    var idealLook = {
      x: _camPt.x + _camTan.x * 8,
      y: _camPt.y + 1.5,
      z: _camPt.z + _camTan.z * 8
    };

    var lerpK = Math.min(1, dt * 4.5);
    camFollow.x += (idealPos.x  - camFollow.x)  * lerpK;
    camFollow.y += (idealPos.y  - camFollow.y)  * lerpK;
    camFollow.z += (idealPos.z  - camFollow.z)  * lerpK;
    camLookAt.x += (idealLook.x - camLookAt.x) * lerpK;
    camLookAt.y += (idealLook.y - camLookAt.y) * lerpK;
    camLookAt.z += (idealLook.z - camLookAt.z) * lerpK;

    camera.position.copy(camFollow);
    camera.lookAt(camLookAt);

  } else {
    /* Slow broadcast orbit */
    camAngle += dt * 0.10;
    var camH = camHeight + Math.sin(camAngle * 0.55) * 10;
    var idealOrbitPos = {
      x: Math.cos(camAngle) * camRadius,
      y: camH,
      z: Math.sin(camAngle) * camRadius
    };
    var lerpO = Math.min(1, dt * 3.5);
    camFollow.x += (idealOrbitPos.x - camFollow.x) * lerpO;
    camFollow.y += (camH            - camFollow.y) * lerpO;
    camFollow.z += (idealOrbitPos.z - camFollow.z) * lerpO;
    camLookAt.x += (0  - camLookAt.x) * lerpO;
    camLookAt.y += (15 - camLookAt.y) * lerpO;
    camLookAt.z += (0  - camLookAt.z) * lerpO;

    camera.position.copy(camFollow);
    camera.lookAt(camLookAt);
  }

  /* FX timers */
  Object.keys(kartFx).forEach(function(pid){
    var f = kartFx[pid];
    if(f.nitro>0) f.nitro -= dt;
    if(f.boost>0) f.boost -= dt;
    if(f.wrong>0) f.wrong -= dt;
  });

  /* Update karts */
  if(raceStarted && gameRunning){
    Object.values(allPlayers).forEach(function(p){
      updateKartObject(p.pid, p, dt);
    });
  } else {
    updateIdleKarts(ts);
  }

  /* Render with bloom post-processing */
  composer.render();
}

/* ═══════════════════════════════════════════════════════════════
   HUD STANDINGS
═══════════════════════════════════════════════════════════════ */
function updateStandings(){
  var sorted = Object.values(allPlayers).sort(function(a,b){
    if(!!b.finished !== !!a.finished) return b.finished?1:-1;
    return (b.progress||0)-(a.progress||0);
  });
  var html='';
  sorted.forEach(function(p,i){
    var rk = i===0?' rk1':i===1?' rk2':i===2?' rk3':'';
    var pct = p.finished
      ? '<span class="stand-done">DONE</span>'
      : Math.round((p.progress||0)*100)+'%';
    html += '<div class="stand-row'+(i===0?' leader':'')+rk+'">'
      +'<div class="stand-pos">'+(i+1)+'</div>'
      +'<div class="stand-dot" style="background:'+esc(p.color||'#888')+'"></div>'
      +'<div class="stand-name">'+esc((p.name||'?').slice(0,13))+'</div>'
      +'<div class="stand-pct">'+pct+'</div>'
      +'</div>';
  });
  el('standings').innerHTML = html ||
    '<div style="font-size:11px;color:var(--muted);padding:8px">Waiting…</div>';
  updateCamButtons();
}

/* ═══════════════════════════════════════════════════════════════
   FIREBASE WATCHERS
═══════════════════════════════════════════════════════════════ */
function watchPlayers(){
  playersRef = db.ref('race/'+raceId+'/players');
  playersRef.on('value', function(snap){
    var data = (snap && snap.val()) || {};
    var next = {};

    Object.entries(data).forEach(function(e){
      var pid=e[0], p=e[1];
      next[pid] = Object.assign({ pid:pid }, p);

      /* Detect correct-answer events → trigger boost FX */
      var prev = lastCorrect[pid] || 0;
      var curr = p.correct || 0;
      if(curr > prev){
        kartFx[pid] = kartFx[pid] || {};
        if((p.streak||0) >= 3){
          kartFx[pid].nitro = 2.2; /* nitro streak */
        } else {
          kartFx[pid].boost = 1.2; /* normal boost */
        }
        lastCorrect[pid] = curr;
      }
    });

    /* Remove karts for players who left */
    Object.keys(kartObjects).forEach(function(pid){
      if(!next[pid]) removeKartForPlayer(pid);
    });

    allPlayers = next;

    /* Create karts for new players (if model ready) */
    if(kartTemplate !== null){
      Object.values(allPlayers).forEach(function(p){
        if(!kartObjects[p.pid]) createKartForPlayer(p);
      });
    }

    /* Lobby display */
    if(!raceStarted){
      var names = Object.values(allPlayers).map(function(p){ return p.name||'?'; });
      el('w-count').textContent = names.length;
      el('w-chips').innerHTML   = names.map(function(n){
        return '<div class="w-chip">'+esc(n)+'</div>';
      }).join('');
    }

    updateStandings();
  });
}

function watchState(){
  stateRef = db.ref('race/'+raceId+'/state');
  stateRef.on('value', function(snap){
    if(!snap||!snap.val()) return;
    var st = snap.val();

    if(st.phase === 'started' && !raceStarted){
      raceStarted = true;
      gameRunning = true;
      var startedAt = st.startedAt || Date.now();
      showOverlay(null);
      el('hud').style.display='flex';
      el('hud-code').textContent=raceId;
      runCountdown(startedAt, function(){ /* loop is already running */ });
    } else if(st.phase === 'ended' && gameRunning){
      showPodium();
    }
  });
}

/* ═══════════════════════════════════════════════════════════════
   COUNTDOWN (server-timestamp synced)
═══════════════════════════════════════════════════════════════ */
function runCountdown(startedAt, done){
  var overlay=el('countdown-overlay'), numEl=el('cd-num');
  overlay.classList.add('show');
  function tick(){
    var elapsed = (Date.now()-startedAt)/1000;
    var cnt     = Math.max(0, Math.ceil(3-elapsed));
    numEl.className='cd-big'; void numEl.offsetWidth; numEl.className='cd-big';
    if(cnt===0){
      numEl.textContent='GO!';
      setTimeout(function(){ overlay.classList.remove('show'); done&&done(); }, 800);
    } else {
      numEl.textContent=String(cnt);
      setTimeout(tick, 1000);
    }
  }
  tick();
}

/* ═══════════════════════════════════════════════════════════════
   PODIUM + CONTROLS
═══════════════════════════════════════════════════════════════ */
window.__endRace = function(){
  if(!confirm('End race for all players?')) return;
  if(raceId && db) db.ref('race/'+raceId+'/state/phase').set('ended');
  gameRunning = false;
  showPodium();
};

function showPodium(){
  gameRunning = false;
  var sorted = Object.values(allPlayers).sort(function(a,b){
    if(!!b.finished!==!!a.finished) return b.finished?1:-1;
    return (b.progress||0)-(a.progress||0);
  });
  var medals=['🥇','🥈','🥉'], blks=['b1','b2','b3'];
  var order=[sorted[1],sorted[0],sorted[2]].filter(Boolean);
  var ranks=[2,1,3];
  var html='';
  for(var i=0;i<order.length;i++){
    var p=order[i], r=ranks[i]-1;
    html+='<div class="pod-col">'
      +'<div class="pod-name">'+esc((p.name||'?').slice(0,13))+'</div>'
      +'<div class="pod-blk '+blks[r]+'" style="border-color:'+esc(p.color||'#3498db')+'60;'
      +'box-shadow:0 0 22px '+esc(p.color||'#3498db')+'44">'+medals[r]+'</div>'
      +'</div>';
  }
  el('pod-wrap').innerHTML = html ||
    '<div style="color:var(--muted)">No finishers yet</div>';
  showOverlay('s-end');
}

function showOverlay(id){
  document.querySelectorAll('.oscreen').forEach(function(s){ s.classList.remove('on'); });
  if(id) el(id).classList.add('on');
}

/* ═══════════════════════════════════════════════════════════════
   CAMERA SWITCHING
═══════════════════════════════════════════════════════════════ */
window.setCamTarget = function(pid){
  camTarget = pid || null;
  /* Initialise lerp from current position for smooth transition */
  camFollow.copy(camera.position);
  updateCamButtons();
};

function updateCamButtons(){
  var sec = el('cam-section');
  if(!sec) return;

  var players = Object.values(allPlayers).sort(function(a,b){
    return (b.progress||0) - (a.progress||0);
  });

  if(!players.length){ sec.style.display='none'; return; }
  sec.style.display = 'block';

  var html = '<button class="cam-btn'+(camTarget===null?' active':'')+'"'
    +' onclick="setCamTarget(null)">&#x1F310; Overview</button>';

  players.forEach(function(p){
    var active = camTarget === p.pid;
    var col    = p.color || '#888888';
    html += '<button class="cam-btn player-btn'+(active?' active':'')+'"'
      +' style="--player-col:'+esc(col)+'"'
      +' onclick="setCamTarget(\''+esc(p.pid)+'\')">'
      +'<span class="cam-dot" style="background:'+esc(col)+'"></span>'
      +esc((p.name||'?').slice(0,11))
      +'</button>';
  });

  el('cam-btns').innerHTML = html;
}

/* ═══════════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════════ */
initScene();

if(!raceId){
  el('w-err').textContent='No race ID — open via the Projector button in LiveHost';
  el('w-status-txt').textContent='Waiting for connection…';
} else {
  el('w-code').textContent = raceId;
  el('w-status-txt').textContent = 'Waiting for race director to start…';
  watchPlayers();
  watchState();
}

window.addEventListener('beforeunload', function(){
  if(playersRef){ try{ playersRef.off('value'); }catch(_){} }
  if(stateRef){   try{ stateRef.off('value');   }catch(_){} }
});

})();
</script>
