<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="icon" type="image/png" sizes="64x64" href="./assets/edurena_logo_64.png">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>City Race — Edurena Projector</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050810;--panel:#0a0d1a;--bdr:#1a2035;
  --txt:#e8edf5;--muted:#5a6a8a;
  --acc:#00d4ff;--grn:#00ff88;--red:#ff3355;--yel:#ffcc00;
  --f:'Plus Jakarta Sans',system-ui,sans-serif;
  --mono:'Orbitron',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;color:var(--txt);font-family:var(--f)}
#c{position:fixed;top:0;left:0;width:100%;height:100%;display:block;z-index:1}

/* ── HUD SIDEBAR ── */
#hud{
  position:fixed;top:0;right:0;bottom:0;width:230px;
  background:rgba(5,8,16,.92);border-left:1px solid rgba(0,212,255,.12);
  backdrop-filter:blur(16px);z-index:10;
  display:flex;flex-direction:column;padding:16px;overflow:hidden;
}
.hud-brand{font-family:var(--mono);font-size:11px;font-weight:900;
  letter-spacing:3px;color:var(--acc);margin-bottom:3px;text-transform:uppercase}
.hud-code{font-family:var(--mono);font-size:22px;font-weight:900;
  letter-spacing:6px;color:#fff;text-shadow:0 0 14px rgba(0,212,255,.5);margin-bottom:14px}
.hud-lbl{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--muted);
  letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:6px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--red);flex-shrink:0;
  animation:ldp 1.2s ease-in-out infinite;box-shadow:0 0 7px var(--red)}
@keyframes ldp{0%,100%{opacity:1}50%{opacity:.3}}
.stand-row{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:7px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.05);margin-bottom:4px;transition:background .4s}
.stand-row.leader{border-color:rgba(255,204,0,.4);background:rgba(255,204,0,.07)}
.stand-pos{font-family:var(--mono);font-size:11px;font-weight:900;color:var(--muted);width:18px;text-align:center;flex-shrink:0}
.stand-row.rk1 .stand-pos{color:#ffd700}
.stand-row.rk2 .stand-pos{color:#c0c0c0}
.stand-row.rk3 .stand-pos{color:#cd7f32}
.stand-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.stand-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stand-pct{font-family:var(--mono);font-size:10px;color:var(--muted);white-space:nowrap}
.stand-done{color:var(--grn)}
.stand-meta{display:flex;flex:1;flex-direction:column;min-width:0;gap:2px}
.stand-name-row{display:flex;align-items:center;justify-content:space-between;gap:4px}
.stand-correct{font-family:var(--mono);font-size:9px;color:var(--grn);white-space:nowrap;opacity:.85}
.stand-bar-wrap{height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
.stand-bar{height:100%;border-radius:2px;transition:width .9s cubic-bezier(.4,0,.2,1);min-width:2px}
#standings{flex:1;overflow-y:auto;min-height:0;scrollbar-width:thin;scrollbar-color:rgba(0,212,255,.15) transparent}
#standings::-webkit-scrollbar{width:3px}
#standings::-webkit-scrollbar-thumb{background:rgba(0,212,255,.2);border-radius:2px}
#hud-ctrl{margin-top:auto;padding-top:10px;border-top:1px solid rgba(255,255,255,.07)}
.hud-btn{display:block;width:100%;padding:9px;border-radius:8px;font-family:var(--mono);
  font-size:11px;font-weight:700;letter-spacing:1px;cursor:pointer;border:none;text-align:center;transition:all .2s}
.hud-btn.end{background:rgba(255,51,85,.15);color:var(--red);border:1px solid rgba(255,51,85,.3)}
.hud-btn.end:hover{background:rgba(255,51,85,.25)}

/* ── CAMERA SWITCH BUTTONS ── */
.cam-section{margin-bottom:10px}
.cam-lbl{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--muted);
  letter-spacing:2px;text-transform:uppercase;margin-bottom:5px}
.cam-btn{display:block;width:100%;padding:6px 8px;border-radius:6px;
  font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.5px;
  cursor:pointer;border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.04);color:var(--muted);
  text-align:left;margin-bottom:3px;transition:all .15s;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cam-btn:hover{background:rgba(255,255,255,.1);color:var(--txt)}
.cam-btn.active{background:rgba(0,212,255,.12);border-color:rgba(0,212,255,.38);color:var(--acc)}
.cam-btn.player-btn.active{border-color:var(--player-col,#888);background:rgba(0,0,0,.2);
  color:var(--player-col,#888);box-shadow:0 0 8px var(--player-col,transparent)}
.cam-dot{display:inline-block;width:7px;height:7px;border-radius:50%;
  margin-right:5px;vertical-align:middle;flex-shrink:0}

/* ── OVERLAYS ── */
.oscreen{position:fixed;inset:0;z-index:50;display:none;flex-direction:column;
  align-items:center;justify-content:center;background:rgba(5,8,16,.92);backdrop-filter:blur(12px)}
.oscreen.on{display:flex}

/* ── WAITING ── */
.wait-card{text-align:center;padding:30px;max-width:600px;width:90%}
.w-brand{font-family:var(--mono);font-size:13px;font-weight:900;color:var(--acc);
  letter-spacing:4px;text-transform:uppercase;margin-bottom:26px}
.w-lbl{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.w-code{font-family:var(--mono);font-size:clamp(52px,11vw,80px);font-weight:900;
  color:var(--acc);letter-spacing:14px;text-shadow:0 0 40px rgba(0,212,255,.5);margin-bottom:4px}
.w-count-big{font-family:var(--mono);font-size:52px;font-weight:900;color:var(--grn);
  text-shadow:0 0 20px rgba(0,255,136,.4);margin-top:18px}
.w-count-lbl{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin:4px 0 16px}
.w-chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:520px;margin:0 auto 20px}
.w-chip{padding:4px 12px;background:#0d1525;border:1px solid #1e2d4a;
  border-radius:20px;font-size:12px;font-weight:600;animation:chipPop .3s ease;color:var(--acc)}
@keyframes chipPop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
.w-status{font-size:13px;color:var(--muted);letter-spacing:1px}
.pulse-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--acc);
  margin-right:7px;animation:pdot 1.4s ease-in-out infinite;vertical-align:middle;box-shadow:0 0 8px var(--acc)}
@keyframes pdot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}
.w-err{color:var(--red);font-size:13px;margin-top:12px}

/* ── COUNTDOWN ── */
#countdown-overlay{position:fixed;inset:0;z-index:60;display:flex;align-items:center;
  justify-content:center;pointer-events:none;opacity:0;transition:opacity .3s;
  background:rgba(5,8,16,.45);backdrop-filter:blur(3px)}
#countdown-overlay.show{opacity:1}
.cd-big{font-family:var(--mono);font-size:clamp(120px,25vw,220px);font-weight:900;
  color:#fff;text-shadow:0 0 80px var(--acc),0 0 160px rgba(0,212,255,.3);
  animation:cdPop .7s cubic-bezier(.22,1,.36,1) both}
@keyframes cdPop{from{transform:scale(3.5);opacity:0}to{transform:scale(1);opacity:1}}

/* ── PODIUM ── */
#s-end{gap:20px}
.pod-title{font-family:var(--mono);font-size:clamp(28px,5vw,48px);font-weight:900;
  background:linear-gradient(135deg,var(--yel),var(--acc));-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;letter-spacing:5px}
.pod-wrap{display:flex;align-items:flex-end;gap:16px;margin:20px 0}
.pod-col{display:flex;flex-direction:column;align-items:center;gap:8px}
.pod-blk{border-radius:8px 8px 0 0;background:linear-gradient(to top,rgba(255,255,255,.08),rgba(255,255,255,.15));
  display:flex;align-items:center;justify-content:center;font-family:var(--mono);
  font-size:28px;font-weight:900;color:#fff;width:110px}
.pod-blk.b1{height:130px;border:1px solid rgba(255,204,0,.5);box-shadow:0 0 25px rgba(255,204,0,.25)}
.pod-blk.b2{height:90px;border:1px solid rgba(192,192,192,.4)}
.pod-blk.b3{height:65px;border:1px solid rgba(205,127,50,.4)}
.pod-name{font-size:13px;font-weight:700;max-width:110px;text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.end-close-btn{padding:14px 44px;background:linear-gradient(135deg,#0055aa,#5500cc);
  color:#fff;border:none;border-radius:10px;font-family:var(--mono);font-size:13px;
  font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s;margin-top:8px}
.end-close-btn:hover{transform:translateY(-2px)}

/* ── LOADING BAR ── */
#load-bar{position:fixed;bottom:0;left:0;height:3px;width:0%;
  background:linear-gradient(90deg,var(--acc),var(--grn));z-index:80;transition:width .3s}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud" style="display:none">

    <div class="w-brand">&#x1F3CE; City Race — Projector View</div>

<div id="countdown-overlay">
  <div class="cd-big" id="cd-num">3</div>
</div>

<div class="oscreen" id="s-end">

  <div class="pod-wrap" id="pod-wrap"></div>

</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.module.js",

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

(function(){
'use strict';

var P      = new URLSearchParams(location.search);
var raceId = (P.get('raceId') || '').trim().toUpperCase();

function el(id){ return document.getElementById(id); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function setLoad(pct){ el('load-bar').style.width = pct + '%'; }

/* ── FIREBASE ── */
var db;
try {
  var fbCfg = {
    apiKey:'AIzaSyCLfySFzCpbz3CBX1bjha5KxvA0MrJExIc',
    authDomain:'kahoot-24063.firebaseapp.com',
    databaseURL:'https://kahoot-24063-default-rtdb.firebaseio.com',
    projectId:'kahoot-24063',
    storageBucket:'kahoot-24063.firebasestorage.app',
    messagingSenderId:'962917873467',
    appId:'1:962917873467:web:a6b526aee30cd15c92291e'
  };
  var ea = null;
  if(firebase.apps) firebase.apps.forEach(function(a){ if(a.name==='rh') ea=a; });
  db = firebase.database(ea || firebase.initializeApp(fbCfg,'rh'));
} catch(e){ el('w-err').textContent = 'Firebase: ' + e.message; }

/* ── GAME STATE ── */
var allPlayers  = {};
var gameRunning = false;
var raceStarted = false;
var lastTime    = 0;
var playersRef  = null, stateRef = null;
var lastCorrect = {}, kartFx = {};

/* ── CAMERA STATE ── */
var camTarget  = null;
var camFollow  = new THREE.Vector3(0, 82, 175);
var camLookAt  = new THREE.Vector3(0, 15, 0);
var _camPt     = new THREE.Vector3();
var _camTan    = new THREE.Vector3();

/* ── THREE GLOBALS ── */
var renderer, scene, camera, composer;
var trackCurve;
var kartObjects  = {};
var kartTemplate = {};   /* always ready — no GLB loading */
var ROAD_HW      = 12;

var camAngle  = 0;
var camRadius = 175;
var camHeight = 82;

/* ═══════════════════════════════
   INIT
═══════════════════════════════ */
function initScene(){
  var canvas = el('c');
  renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
  renderer.toneMapping       = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  renderer.outputColorSpace  = THREE.SRGBColorSpace;

  scene  = new THREE.Scene();
  scene.fog = new THREE.Fog(0xc0e0f5, 200, 420);

  camera = new THREE.PerspectiveCamera(54, window.innerWidth/window.innerHeight, 0.5, 700);
  camera.position.set(0, camHeight, camRadius);
  camera.lookAt(0, 15, 0);

  window.addEventListener('resize', onResize);

  composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  composer.addPass(new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight),
    0.28, 0.40, 0.88
  ));

  setupLights();
  buildCityEnvironment();

  setLoad(100);
  setTimeout(function(){ el('load-bar').style.opacity=0; }, 500);
  requestAnimationFrame(animate);
}

function onResize(){
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
}

/* ═══════════════════════════════
   LIGHTS
═══════════════════════════════ */
function setupLights(){
  scene.add(new THREE.HemisphereLight(0x87ceeb, 0x4aaa28, 1.2));

  var sun = new THREE.DirectionalLight(0xfff8d0, 3.0);
  sun.position.set(100, 160, 80);
  sun.castShadow = true;
  sun.shadow.mapSize.set(1536, 1536);
  sun.shadow.camera.left   = -250; sun.shadow.camera.right  = 250;
  sun.shadow.camera.top    =  250; sun.shadow.camera.bottom = -250;
  sun.shadow.camera.near   = 1;    sun.shadow.camera.far    = 650;
  sun.shadow.bias = -0.0003;
  scene.add(sun);

  var fill = new THREE.DirectionalLight(0xc8e8ff, 0.7);
  fill.position.set(-80, 80, -100);
  scene.add(fill);

  scene.add(new THREE.AmbientLight(0xffffff, 0.45));
}

/* ═══════════════════════════════
   CITY ENVIRONMENT
═══════════════════════════════ */
function buildCityEnvironment(){
  initTrackCurve(90);
  setLoad(8);

  buildSky();
  setLoad(15);

  /* Green ground */
  var grass = new THREE.Mesh(
    new THREE.PlaneGeometry(1400, 1400),
    new THREE.MeshLambertMaterial({ color: 0x4aaa28 })
  );
  grass.rotation.x = -Math.PI/2;
  grass.receiveShadow = true;
  scene.add(grass);

  var road = buildRoadMesh(); scene.add(road);
  buildCurbs();
  setLoad(30);

  buildSidewalks();
  setLoad(42);

  buildCityBuildings();
  setLoad(68);

  buildStreetLights();
  setLoad(80);

  buildStartBanner();
  buildFlags(110);
  setLoad(90);

  camRadius = 175; camHeight = 82;
  camFollow.set(0, 82, 175);
}

function initTrackCurve(r){
  var f = r/90;
  trackCurve = new THREE.CatmullRomCurve3([
    new THREE.Vector3(  0,0, 90*f), new THREE.Vector3( 38*f,0, 83*f),
    new THREE.Vector3( 68*f,0, 63*f), new THREE.Vector3( 87*f,0, 33*f),
    new THREE.Vector3( 92*f,0,  0),  new THREE.Vector3( 87*f,0,-33*f),
    new THREE.Vector3( 68*f,0,-63*f), new THREE.Vector3( 38*f,0,-83*f),
    new THREE.Vector3(  0,0,-92*f), new THREE.Vector3(-38*f,0,-83*f),
    new THREE.Vector3(-68*f,0,-63*f), new THREE.Vector3(-87*f,0,-33*f),
    new THREE.Vector3(-92*f,0,  0),  new THREE.Vector3(-87*f,0, 33*f),
    new THREE.Vector3(-68*f,0, 63*f), new THREE.Vector3(-38*f,0, 83*f),
  ], true, 'catmullrom', 0.5);
  trackCurve.arcLengthDivisions = 2000;
}

/* ── Day sky + clouds ── */
function buildSky(){
  var skyMat = new THREE.ShaderMaterial({
    uniforms:{
      uTop:{ value: new THREE.Color(0x1a6fc8) },
      uMid:{ value: new THREE.Color(0x5aaeee) },
      uBot:{ value: new THREE.Color(0xc0e0f5) },
    },
    vertexShader:'varying float vY;void main(){vY=normalize(position).y;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}',
    fragmentShader:'uniform vec3 uTop,uMid,uBot;varying float vY;void main(){float h=clamp(vY,-1.0,1.0);vec3 c=h>0.0?mix(uMid,uTop,pow(h,0.55)):mix(uBot,uMid,pow(h+1.0,0.55));gl_FragColor=vec4(c,1.0);}',
    side: THREE.BackSide, depthWrite: false,
  });
  scene.add(new THREE.Mesh(new THREE.SphereGeometry(450,32,16), skyMat));

  var cMat = new THREE.MeshBasicMaterial({ color:0xffffff, transparent:true, opacity:0.90 });
  [[0,125,-220],[110,118,-190],[-160,132,-100],[210,122,60],[-90,128,160],[55,112,215],[-215,120,-55],[175,135,-130],[80,140,90]].forEach(function(p){
    var cg=new THREE.Group(); cg.position.set(p[0],p[1],p[2]);
    var r=18+(Math.abs(p[0]*p[2])%14);
    [[0,0,0],[-r*.5,-r*.18,r*.28],[r*.55,-r*.12,0],[r*.1,r*.12,-r*.48]].forEach(function(o){
      var sr=r*(0.45+Math.abs(o[0]+o[2]+100)%10*0.04);
      var s=new THREE.Mesh(new THREE.SphereGeometry(sr,8,6),cMat);
      s.position.set(o[0],o[1],o[2]); s.scale.set(1.75,0.58,1.25); cg.add(s);
    });
    scene.add(cg);
  });
}

/* ── Road ribbon ── */
function buildRoadMesh(){
  var N=400, pos=[], nor=[], uvs=[], idx=[];
  var _p=new THREE.Vector3(), _t=new THREE.Vector3();
  for(var i=0;i<=N;i++){
    var u=i/N; trackCurve.getPointAt(u,_p); trackCurve.getTangentAt(u,_t); _t.normalize();
    var rx=_t.z, rz=-_t.x;
    pos.push(_p.x-rx*ROAD_HW,0.04,_p.z-rz*ROAD_HW); nor.push(0,1,0); uvs.push(0,u*18);
    pos.push(_p.x+rx*ROAD_HW,0.04,_p.z+rz*ROAD_HW); nor.push(0,1,0); uvs.push(1,u*18);
  }
  for(var i=0;i<N;i++){ var a=i*2,b=a+1,c=a+2,d=a+3; idx.push(a,c,b,b,c,d); }
  var geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  geo.setAttribute('normal',new THREE.Float32BufferAttribute(nor,3));
  geo.setAttribute('uv',new THREE.Float32BufferAttribute(uvs,2));
  geo.setIndex(idx);
  var tex=makeRoadTex(); tex.wrapS=THREE.ClampToEdgeWrapping; tex.wrapT=THREE.RepeatWrapping;
  var mesh=new THREE.Mesh(geo,new THREE.MeshStandardMaterial({map:tex,roughness:0.92,metalness:0,side:THREE.DoubleSide}));
  mesh.receiveShadow=true; return mesh;
}
function makeRoadTex(){
  var c=document.createElement('canvas'); c.width=256; c.height=512;
  var x=c.getContext('2d');
  var g=x.createLinearGradient(0,0,256,0);
  g.addColorStop(0,'#1a1a1e'); g.addColorStop(0.08,'#242428'); g.addColorStop(0.5,'#2a2a30'); g.addColorStop(0.92,'#242428'); g.addColorStop(1,'#1a1a1e');
  x.fillStyle=g; x.fillRect(0,0,256,512);
  for(var i=0;i<600;i++){ var v=Math.floor(Math.random()*16); x.fillStyle='rgba('+v+','+v+','+v+',0.35)'; x.fillRect(Math.random()*256,Math.random()*512,1+Math.random()*2,1); }

function makeBuildingTex(colorHex){
  var c=document.createElement('canvas'); c.width=128; c.height=256;
  var ctx=c.getContext('2d');
  ctx.fillStyle='rgb('+((colorHex>>16)&0xff)+','+((colorHex>>8)&0xff)+','+(colorHex&0xff)+')';
  ctx.fillRect(0,0,128,256);
  var cols=4,rows=9,winW=18,winH=14,padX=10,padY=14;
  var gapX=(128-padX*2-cols*winW)/(cols-1), gapY=(256-padY*2-rows*winH)/(rows-1);
  var rs=colorHex; function rnd(){ rs=(rs*69069+1)&0xffff; return rs/0xffff; }
  for(var row=0;row<rows;row++){
    for(var col=0;col<cols;col++){
      var wx=padX+col*(winW+gapX), wy=padY+row*(winH+gapY);
      var lit=rnd()>0.22;
      ctx.fillStyle=lit?(rnd()>0.5?'#e0f0ff':'#fff4d0'):'#1a2638';

  }

}

  kar.traverse(function(child){
    if(!child.isMesh) return; child.castShadow=true;
    if(child.name&&child.name.indexOf('whl')===0) wheels.push(child); else bodyMeshes.push(child);
  });
  group.add(kar);

}

function _rrf(ctx,x,y,w,h,r){

  ctx.beginPath(); ctx.moveTo(x+r[0],y);
  ctx.lineTo(x+w-r[1],y); ctx.arcTo(x+w,y,x+w,y+r[1],r[1]);
  ctx.lineTo(x+w,y+h-r[2]); ctx.arcTo(x+w,y+h,x+w-r[2],y+h,r[2]);
  ctx.lineTo(x+r[3],y+h); ctx.arcTo(x,y+h,x,y+h-r[3],r[3]);

/* ═══════════════════════════════
   KART ANIMATION
═══════════════════════════════ */
var _vP=new THREE.Vector3(), _vT=new THREE.Vector3(), _vR=new THREE.Vector3();

/* Deterministic lane offset from player ID so cars don't all stack center */
function _pidLane(pid){
  var h=0; for(var i=0;i<pid.length;i++) h=(h*31+pid.charCodeAt(i))&0xffff;
  return ((h%3)-1)*2.6; /* -2.6, 0, or +2.6 */
}

function updateKartObject(pid,player,dt){
  var ko=kartObjects[pid]; if(!ko) return;

  /* ── dead-reckoning ──
     Race.html only syncs progress to Firebase on ~10% of frames, so raw
     player.progress arrives in sparse steps. Extrapolate forward using the
     last-measured velocity so the car keeps gliding between updates instead
     of stalling near the old value and snapping when the next one lands. */
  var raw = player.progress||0;
  if(ko.lastRawTime){
    var sinceUpdate=Math.min((Date.now()-ko.lastRawTime)/1000,1.2);
    raw = ((ko.lastRaw!==undefined?ko.lastRaw:raw) + (ko.vel||0)*sinceUpdate);
    raw = ((raw%1)+1)%1;
  }

  /* ── lap-safe progress diff ──
     predicted raw is 0-1, smoothProg accumulates >1 across laps, so compare
     against its fractional part. */
  var cur_t = ((ko.smoothProg%1)+1)%1;
  var diff = raw - cur_t;
  if(diff<-0.5) diff+=1;   /* player crossed lap boundary forward */
  if(diff>0.5)  diff-=1;   /* safety: shouldn't happen in normal race */
  ko.smoothProg += diff * Math.min(1.0, dt*7.0); /* faster lerp = more responsive */

  var t=((ko.smoothProg%1)+1)%1;
  trackCurve.getPointAt(t,_vP);
  trackCurve.getTangentAt(t,_vT); _vT.normalize();
  _vR.set(_vT.z,0,-_vT.x);

  var lx=_pidLane(pid);
  _vP.x+=_vR.x*lx; _vP.z+=_vR.z*lx;
  /* gentle suspension bob — scales with speed so parked cars don't bounce */
  var bobSpd=Math.min(Math.abs(diff)*6,1);
  _vP.y=0.5+Math.sin(ko.smoothProg*220)*0.055*bobSpd;
  ko.group.position.copy(_vP);
  ko.group.rotation.y=Math.atan2(_vT.x,_vT.z);
  ko.group.rotation.z=0;

  /* wheel roll — spin around local X (the wheel's axle after the fixed rotation.z=PI/2 orientation) */
  var spd=diff/Math.max(dt,0.001);
  if(ko.wheels.length&&Math.abs(spd)>0.0001) ko.wheels.forEach(function(w){w.rotation.x+=spd*85;});

  var fx=kartFx[pid]||{}, nitro=Math.max(0,fx.nitro||0), boost=Math.max(0,fx.boost||0);
  if(nitro>0){ ko.boostLight.intensity=700*nitro; ko.boostLight.color.set(0x0099ff); ko.boostLight.distance=20; _setEm(ko,0.45); }
  else if(boost>0){ ko.boostLight.intensity=320*boost; ko.boostLight.color.set(ko.color); ko.boostLight.distance=14; _setEm(ko,0.22); }
  else { ko.boostLight.intensity=0; _setEm(ko,0.35); }
}
function _setEm(ko,v){ ko.bodyMeshes.forEach(function(m){(Array.isArray(m.material)?m.material:[m.material]).forEach(function(mat){if(mat&&mat.emissiveIntensity!==undefined)mat.emissiveIntensity=v;});}); }

var _idleT=0;
function updateIdleKarts(ts){
  _idleT=ts/1000;
  Object.values(allPlayers).forEach(function(p,i){
    var ko=kartObjects[p.pid]; if(!ko) return;
    var col=i%2, row=Math.floor(i/2), u=0.005*row;
    trackCurve.getPointAt(u,_vP); trackCurve.getTangentAt(u,_vT); _vT.normalize();
    _vR.set(_vT.z,0,-_vT.x);
    var lx=col===0?-3.2:3.2;
    ko.group.position.set(_vP.x+_vR.x*lx,0.5+Math.sin(_idleT*1.3+i*1.1)*0.12,_vP.z+_vR.z*lx);
    ko.group.rotation.y=Math.atan2(_vT.x,_vT.z);
    ko.group.rotation.z=Math.sin(_idleT*0.8+i)*0.02;
    ko.boostLight.intensity=0;
  });
}

/* ═══════════════════════════════
   ANIMATION LOOP
═══════════════════════════════ */
function animate(ts){
  requestAnimationFrame(animate);
  var dt=Math.min(0.05,(ts-(lastTime||ts))/1000); lastTime=ts;

  if(camTarget&&kartObjects[camTarget]){
    var _ko=kartObjects[camTarget], _t=((_ko.smoothProg||0)%1+1)%1;
    trackCurve.getPointAt(_t,_camPt); trackCurve.getTangentAt(_t,_camTan); _camTan.normalize();
    /* chase cam: 16 behind, 7 above — lookahead 12 ahead at 1.8 height */
    var iP={x:_camPt.x-_camTan.x*16,y:_camPt.y+7,z:_camPt.z-_camTan.z*16};
    var iL={x:_camPt.x+_camTan.x*12,y:_camPt.y+1.8,z:_camPt.z+_camTan.z*12};
    var lk=Math.min(1,dt*5.5);
    camFollow.x+=(iP.x-camFollow.x)*lk; camFollow.y+=(iP.y-camFollow.y)*lk; camFollow.z+=(iP.z-camFollow.z)*lk;
    camLookAt.x+=(iL.x-camLookAt.x)*lk; camLookAt.y+=(iL.y-camLookAt.y)*lk; camLookAt.z+=(iL.z-camLookAt.z)*lk;
  } else {
    camAngle+=dt*0.10;
    var cH=camHeight+Math.sin(camAngle*0.55)*10;
    var iO={x:Math.cos(camAngle)*camRadius,y:cH,z:Math.sin(camAngle)*camRadius};
    var lo=Math.min(1,dt*3.5);
    camFollow.x+=(iO.x-camFollow.x)*lo; camFollow.y+=(cH-camFollow.y)*lo; camFollow.z+=(iO.z-camFollow.z)*lo;
    camLookAt.x+=(0-camLookAt.x)*lo; camLookAt.y+=(15-camLookAt.y)*lo; camLookAt.z+=(0-camLookAt.z)*lo;
  }
  camera.position.copy(camFollow); camera.lookAt(camLookAt);

  Object.keys(kartFx).forEach(function(pid){ var f=kartFx[pid]; if(f.nitro>0)f.nitro-=dt; if(f.boost>0)f.boost-=dt; });

  if(raceStarted&&gameRunning) Object.values(allPlayers).forEach(function(p){updateKartObject(p.pid,p,dt);});
  else updateIdleKarts(ts);

  composer.render();
}

/* ═══════════════════════════════
   HUD STANDINGS
═══════════════════════════════ */
function updateStandings(){
  var sorted=Object.values(allPlayers).sort(function(a,b){ if(!!b.finished!==!!a.finished)return b.finished?1:-1; return(b.progress||0)-(a.progress||0); });
  var html='';
  sorted.forEach(function(p,i){
    var rk=i===0?' rk1':i===1?' rk2':i===2?' rk3':'';
    var bW=p.finished?100:Math.round((p.progress||0)*100);
    var pct=p.finished?'<span class="stand-done">DONE</span>':bW+'%';
    html+='<div class="stand-row'+(i===0?' leader':'')+rk+'">'
      +'<div class="stand-pos">'+(i+1)+'</div>'
      +'<div class="stand-dot" style="background:'+esc(p.color||'#888')+'"></div>'
      +'<div class="stand-meta"><div class="stand-name-row">'
      +'<div class="stand-name">'+esc((p.name||'?').slice(0,12))+'</div>'
      +((p.correct||0)>0?'<div class="stand-correct">'+(p.correct||0)+'&#x2714;</div>':'')
      +'</div><div class="stand-bar-wrap"><div class="stand-bar" style="width:'+bW+'%;background:'+esc(p.color||'#00d4ff')+'"></div></div></div>'
      +'<div class="stand-pct">'+pct+'</div></div>';
  });
  el('standings').innerHTML=html||'<div style="font-size:11px;color:var(--muted);padding:8px">Waiting…</div>';
  updateCamButtons();
}

/* ═══════════════════════════════
   FIREBASE
═══════════════════════════════ */
function watchPlayers(){
  playersRef=db.ref('race/'+raceId+'/players');
  playersRef.on('value',function(snap){
    var data=(snap&&snap.val())||{}, next={};
    Object.entries(data).forEach(function(e){
      var pid=e[0],p=e[1]; next[pid]=Object.assign({pid:pid},p);
      var prev=lastCorrect[pid]||0, curr=p.correct||0;
      if(curr>prev){ kartFx[pid]=kartFx[pid]||{}; if((p.streak||0)>=3)kartFx[pid].nitro=2.2; else kartFx[pid].boost=1.2; lastCorrect[pid]=curr; }
    });
    Object.keys(kartObjects).forEach(function(pid){ if(!next[pid]) removeKartForPlayer(pid); });
    allPlayers=next;
    Object.values(allPlayers).forEach(function(p){ if(!kartObjects[p.pid]) createKartForPlayer(p); });

    /* velocity estimate for dead-reckoning — measured from consecutive Firebase values */
    var _now=Date.now();
    Object.values(allPlayers).forEach(function(p){
      var ko=kartObjects[p.pid]; if(!ko) return;
      var raw=p.progress||0;
      if(ko.lastRawTime!==undefined){
        var dtSec=(_now-ko.lastRawTime)/1000;
        if(dtSec>0.05){
          var draw=raw-ko.lastRaw;
          if(draw<-0.5) draw+=1;
          if(draw>0.5)  draw-=1;
          var instVel=draw/dtSec;
          ko.vel=(ko.vel===undefined)?instVel:ko.vel*0.4+instVel*0.6;
          ko.vel=Math.max(0,Math.min(ko.vel,0.3));
        }
      }
      ko.lastRaw=raw; ko.lastRawTime=_now;
    });

    if(!raceStarted){
      var names=Object.values(allPlayers).map(function(p){return p.name||'?';});
      el('w-count').textContent=names.length;
      el('w-chips').innerHTML=names.map(function(n){return '<div class="w-chip">'+esc(n)+'</div>';}).join('');
    }
    updateStandings();
  });
}

var _pendingState=null;
var _sceneReady=false;

function watchState(){
  stateRef=db.ref('race/'+raceId+'/state');
  stateRef.on('value',function(snap){
    if(!snap||!snap.val()) return;
    var st=snap.val();
    if(st.phase==='started'&&!raceStarted){
      if(!_sceneReady){ _pendingState=st; return; }
      _applyRaceStart(st);
    } else if(st.phase==='ended'&&gameRunning){ showPodium(); }
  });
}

function _applyRaceStart(st){
  raceStarted=true; gameRunning=true;
  showOverlay(null); el('hud').style.display='flex'; el('hud-code').textContent=raceId;
  var elapsed=(Date.now()-(st.startedAt||Date.now()))/1000;
  if(elapsed>5) return; /* race already well underway — skip countdown */
  runCountdown(st.startedAt||Date.now(),function(){});
}

function runCountdown(startedAt,done){
  var ov=el('countdown-overlay'), ne=el('cd-num'); ov.classList.add('show');
  function tick(){
    var cnt=Math.max(0,Math.ceil(3-(Date.now()-startedAt)/1000));
    ne.className='cd-big'; void ne.offsetWidth; ne.className='cd-big';
    if(cnt===0){ ne.textContent='GO!'; setTimeout(function(){ov.classList.remove('show');done&&done();},800); }
    else { ne.textContent=String(cnt); setTimeout(tick,1000); }
  }
  tick();
}

window.__endRace=function(){ if(!confirm('End race for all players?'))return; if(raceId&&db)db.ref('race/'+raceId+'/state/phase').set('ended'); gameRunning=false; showPodium(); };

function showPodium(){
  gameRunning=false;
  var sorted=Object.values(allPlayers).sort(function(a,b){ if(!!b.finished!==!!a.finished)return b.finished?1:-1; return(b.progress||0)-(a.progress||0); });
  var med=['🥇','🥈','🥉'], blk=['b1','b2','b3'], order=[sorted[1],sorted[0],sorted[2]].filter(Boolean), rnk=[2,1,3], html='';
  for(var i=0;i<order.length;i++){
    var p=order[i], r=rnk[i]-1;
    html+='<div class="pod-col"><div class="pod-name">'+esc((p.name||'?').slice(0,13))+'</div>'
      +'<div class="pod-blk '+blk[r]+'" style="border-color:'+esc(p.color||'#3498db')+'60;box-shadow:0 0 22px '+esc(p.color||'#3498db')+'44">'+med[r]+'</div></div>';
  }
  el('pod-wrap').innerHTML=html||'<div style="color:var(--muted)">No finishers yet</div>';
  showOverlay('s-end');
}

function showOverlay(id){ document.querySelectorAll('.oscreen').forEach(function(s){s.classList.remove('on');}); if(id)el(id).classList.add('on'); }

window.setCamTarget=function(pid){ camTarget=pid||null; camFollow.copy(camera.position); updateCamButtons(); };

function updateCamButtons(){
  var sec=el('cam-section'); if(!sec)return;
  var players=Object.values(allPlayers).sort(function(a,b){return(b.progress||0)-(a.progress||0);});
  if(!players.length){sec.style.display='none';return;}
  sec.style.display='block';
  var html='<button class="cam-btn'+(camTarget===null?' active':'')+'" onclick="setCamTarget(null)">&#x1F310; Overview</button>';
  players.forEach(function(p){
    var col=p.color||'#888';
    html+='<button class="cam-btn player-btn'+(camTarget===p.pid?' active':'')+'" style="--player-col:'+esc(col)+'" onclick="setCamTarget(\''+esc(p.pid)+'\')">'
      +'<span class="cam-dot" style="background:'+esc(col)+'"></span>'+esc((p.name||'?').slice(0,11))+'</button>';
  });
  el('cam-btns').innerHTML=html;
}

/* ── BOOT — Firebase first so it connects while scene builds ── */
if(!raceId){
  el('w-err').textContent='No race ID — open via the Projector button in LiveHost';
  el('w-status-txt').textContent='Waiting for connection…';
} else {
  el('w-code').textContent=raceId;
  el('w-status-txt').textContent='Waiting for race director to start…';
  watchPlayers();
  watchState();
}

initScene();
_sceneReady=true;

/* Process any state that arrived while scene was building */
if(_pendingState){ _applyRaceStart(_pendingState); _pendingState=null; }

window.addEventListener('beforeunload',function(){
  if(playersRef){try{playersRef.off('value');}catch(_){}}
  if(stateRef){try{stateRef.off('value');}catch(_){}}
});

})();
</script>
