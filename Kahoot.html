<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Edurena — Live Quiz</title>
  <script src="edurena-config.js"></script>
  <style>
    :root{--bg:#0f172a;--panel:#1e293b;--track:#334155;--txt:#f8fafc;--muted:#94a3b8;--f:system-ui,sans-serif;--k-red:#e21b3c;--k-blue:#1368ce;--k-yellow:#d89e00;--k-green:#26890c}
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:var(--f);background:var(--bg);color:var(--txt);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
    .wrap{max-width:720px;width:100%}
    .screen{display:none}.screen.on{display:block}

    .top-controls{position:fixed;top:10px;right:12px;z-index:200;display:flex;gap:6px}
    .ctrl-btn{background:rgba(30,41,59,.9);border:1px solid #334155;border-radius:8px;color:var(--muted);font-size:16px;padding:6px 10px;cursor:pointer;line-height:1;transition:color .15s}
    .ctrl-btn:hover{color:var(--txt)}.ctrl-btn.muted{color:#f87171}

    /* JOIN */
    #s-join{text-align:center;padding:48px 20px}
    .brand{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px}
    .brand-dot{width:14px;height:14px;border-radius:50%}
    .brand-dot:nth-child(1){background:var(--k-red)}.brand-dot:nth-child(2){background:var(--k-blue)}
    .brand-dot:nth-child(3){background:var(--k-yellow)}.brand-dot:nth-child(4){background:var(--k-green)}
    .brand h1{font-size:26px;font-weight:800;color:#fff}
    .join-sub{color:var(--muted);font-size:14px;margin-bottom:28px}
    .join-card{background:var(--panel);border-radius:16px;padding:28px;max-width:360px;margin:0 auto;border:1px solid #2d3a52}
    .field-lbl{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;text-align:left}
    .inp{display:block;width:100%;padding:13px 14px;background:#0f172a;border:1.5px solid #2d3a52;border-radius:10px;color:var(--txt);font-size:16px;font-family:var(--f);outline:none;transition:border-color .15s;margin-bottom:14px;-webkit-appearance:none}
    .inp:focus{border-color:#4f78ff}
    .inp-code{text-transform:uppercase;letter-spacing:6px;font-family:monospace;font-size:18px;text-align:center}
    .join-btn{width:100%;padding:14px;background:#4f78ff;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:800;font-family:var(--f);cursor:pointer;transition:opacity .15s;margin-top:4px}
    .join-btn:disabled{opacity:.5;cursor:not-allowed}
    .join-err{color:#f87171;font-size:13px;margin-top:12px;min-height:18px;text-align:center}

    /* LOBBY */
    #s-lobby{text-align:center;padding:36px 20px}
    .lby-badge{display:inline-block;background:#4f78ff22;border:1px solid #4f78ff55;border-radius:20px;padding:4px 16px;font-size:12px;font-weight:600;color:#7fa4ff;margin-bottom:16px}
    .lby-code{font-family:monospace;font-size:clamp(40px,10vw,64px);font-weight:800;letter-spacing:10px;color:#fff;margin-bottom:4px}
    .lby-player-count{font-size:52px;font-weight:900;color:#4ade80;font-family:monospace;margin-top:16px;line-height:1}
    .lby-count-lbl{font-size:13px;color:var(--muted);margin:4px 0 20px}
    .chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:560px;margin:0 auto 20px;min-height:40px}
    .chip{padding:6px 16px;background:var(--panel);border:1px solid var(--track);border-radius:20px;font-size:13px;font-weight:600;animation:pop .22s ease}
    @keyframes pop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
    .lby-wait{font-size:14px;color:var(--muted)}
    .pulse{animation:pulse 1.6s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

    /* COUNTDOWN */
    #s-countdown{text-align:center;padding:80px 20px}
    .cd-label{font-size:16px;color:var(--muted);font-weight:600;margin-bottom:20px;text-transform:uppercase;letter-spacing:1px}
    .cd-num{font-size:clamp(80px,22vw,130px);font-weight:900;font-family:monospace;line-height:1;color:#fff;animation:cdPop .5s cubic-bezier(.17,.67,.46,1.41)}
    @keyframes cdPop{from{transform:scale(2);opacity:0}to{transform:scale(1);opacity:1}}

    /* QUESTION */
    .q-top{background:linear-gradient(135deg,#1e2d4a,#1a253e);border-radius:14px 14px 0 0;padding:18px 18px 12px;text-align:center;border:1px solid #2d3a52;border-bottom:none}
    .q-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .q-dots{display:flex;gap:4px}
    .q-dot{width:8px;height:8px;border-radius:50%;background:var(--track);transition:background .3s}
    .q-dot.done{background:#4ade80}.q-dot.active{background:#4f78ff}
    .timer-arc-wrap{display:flex;align-items:center;justify-content:center;gap:8px}
    .timer-svg{transform:rotate(-90deg)}
    .timer-bg{fill:none;stroke:#2d3a52;stroke-width:4}
    .timer-fg{fill:none;stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset .2s linear,stroke .5s}
    .timer-text{font-size:13px;font-weight:700;fill:#fff}
    .q-txt{font-size:clamp(16px,3.5vw,21px);font-weight:700;color:#fff;line-height:1.4;max-width:580px;margin:0 auto}
    .q-tts-btn{background:rgba(79,120,255,.15);border:1px solid rgba(79,120,255,.35);border-radius:8px;color:#7fa4ff;font-size:12px;padding:4px 10px;cursor:pointer;font-family:var(--f);display:inline-flex;align-items:center;gap:4px;margin-top:8px;transition:background .15s}
    .q-tts-btn:hover{background:rgba(79,120,255,.25)}
    .q-body{background:var(--panel);border:1px solid #2d3a52;border-radius:0 0 14px 14px;padding:14px}

    /* OPTIONS */
    .opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .opt-btn{display:flex;align-items:center;gap:12px;padding:14px;border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;font-family:var(--f);cursor:pointer;text-align:left;min-height:60px;transition:filter .1s,transform .1s;touch-action:manipulation;user-select:none;-webkit-user-select:none;-webkit-appearance:none}
    .opt-btn:not(:disabled):active{filter:brightness(1.25);transform:scale(.97)}
    .opt-btn:disabled{cursor:not-allowed}
    .opt-btn.k-red{background:var(--k-red)}.opt-btn.k-blue{background:var(--k-blue)}
    .opt-btn.k-yellow{background:var(--k-yellow)}.opt-btn.k-green{background:var(--k-green)}
    .opt-btn.state-correct{filter:brightness(1.2);outline:4px solid #4ade80;outline-offset:-4px;animation:bumpCorrect .35s ease}
    .opt-btn.state-wrong{filter:brightness(.4) grayscale(.4)}
    .opt-btn.state-reveal-correct{filter:brightness(1.15);outline:4px solid #4ade80;outline-offset:-4px}
    .opt-btn.state-reveal-wrong{filter:brightness(.35) grayscale(.5)}
    .opt-btn.state-reveal-notpicked{filter:brightness(.6)}
    @keyframes bumpCorrect{0%{transform:scale(1)}40%{transform:scale(1.06)}100%{transform:scale(1)}}
    .opt-shape{width:28px;height:28px;flex-shrink:0;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:14px}
    .opt-txt{flex:1}

    /* POST-ANSWER OVERLAY */
    .answered-overlay{padding:16px 0 0;text-align:center}
    .score-pop{font-size:clamp(44px,12vw,72px);font-weight:900;font-family:monospace;line-height:1;animation:scorePop .45s cubic-bezier(.17,.67,.46,1.41)}
    @keyframes scorePop{from{transform:scale(2.5) translateY(-10px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
    .score-pop.correct{color:#4ade80}.score-pop.wrong{color:#f87171}
    .score-label{font-size:15px;font-weight:700;margin-top:6px}
    .score-label.correct{color:#4ade80}.score-label.wrong{color:#f87171}
    .streak-badge{display:inline-block;background:#f59e0b22;border:1px solid #f59e0b55;border-radius:20px;padding:3px 12px;font-size:12px;color:#f59e0b;margin-top:6px}
    .total-pill{margin-top:8px;font-size:13px;color:var(--muted)}
    .total-pill span{color:#7fa4ff;font-family:monospace;font-weight:700}
    .waiting-lbl{font-size:13px;color:var(--muted);margin-top:10px;animation:pulse 1.5s ease infinite}

    /* SHORT ANSWER */
    .short-area{padding:4px 0}
    .short-inp{width:100%;padding:14px;background:#0f172a;border:2px solid #2d3a52;border-radius:10px;color:#fff;font-size:15px;font-family:var(--f);outline:none;margin-bottom:10px;-webkit-appearance:none}
    .short-inp:focus{border-color:#4f78ff}
    .sub-btn{width:100%;padding:14px;background:#4f78ff;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;font-family:var(--f);cursor:pointer}
    .sub-btn:disabled{opacity:.5;cursor:not-allowed}

    /* REVEAL */
    #s-reveal{padding:10px 0}
    .reveal-q{font-size:15px;font-weight:600;color:var(--muted);margin-bottom:12px;max-width:580px;margin-left:auto;margin-right:auto;text-align:center}
    .reveal-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
    .reveal-opt{display:flex;align-items:center;gap:10px;padding:13px 14px;border-radius:10px;font-size:14px;font-weight:600;position:relative}
    /* Correct answer = bright green */
    .reveal-opt.is-correct{background:var(--k-green);color:#fff;outline:3px solid #4ade80;outline-offset:-3px}
    /* The option the player picked (but it's wrong) = dim with a border so they can see what they chose */
    .reveal-opt.my-pick-wrong{background:var(--track);color:var(--muted);filter:brightness(.75);outline:2px solid #94a3b8;outline-offset:-2px}
    /* Other wrong options = just dim */
    .reveal-opt.not-picked{background:var(--track);color:var(--muted);filter:brightness(.55)}
    .reveal-opt-shape{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
    .reveal-correct-tick{margin-left:auto;font-size:16px}
    .reveal-my-marker{margin-left:auto;font-size:11px;color:#94a3b8;font-weight:600;white-space:nowrap}
    /* Score pill at bottom of reveal */
    .reveal-score-pill{text-align:center;padding:10px 0}
    .reveal-score-pill .rsp-label{font-size:13px;color:var(--muted);margin-bottom:4px}
    .reveal-score-pill .rsp-score{font-size:32px;font-weight:900;font-family:monospace;color:#7fa4ff}

    /* LEADERBOARD */
    #s-leaderboard{text-align:center;padding:16px 0}
    .lb-hdr{font-size:20px;font-weight:800;margin-bottom:18px}
    .lb-list{max-width:480px;margin:0 auto 20px;display:flex;flex-direction:column;gap:8px}
    .lb-row{display:flex;align-items:center;padding:12px 16px;border-radius:10px;gap:10px;font-weight:600;animation:slideIn .3s ease}
    @keyframes slideIn{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}
    .lb-row:nth-child(1){background:linear-gradient(90deg,#b8860b44,transparent);border:1px solid #b8860b66}
    .lb-row:nth-child(2){background:linear-gradient(90deg,#64748b44,transparent);border:1px solid #64748b66}
    .lb-row:nth-child(3){background:linear-gradient(90deg,#92400e44,transparent);border:1px solid #92400e55}
    .lb-row:nth-child(n+4){background:var(--panel);border:1px solid #2d3a52}
    .lb-rank{width:28px;font-size:18px;text-align:center}
    .lb-name{flex:1;font-size:15px;text-align:left}
    .lb-score{font-family:monospace;font-size:16px;font-weight:700;color:#4ade80}
    .lb-me{outline:2px solid #4f78ff;outline-offset:-2px;border-radius:10px}
    .lb-delta{font-size:11px;color:#4ade80;margin-left:4px}
    .lb-next-auto{font-size:12px;color:var(--muted);margin-top:8px}

    /* FINAL */
    #s-final{text-align:center;padding:48px 20px}
    .final-podium{display:flex;align-items:flex-end;justify-content:center;gap:12px;margin:24px auto;max-width:380px}
    .podium-slot{flex:1;text-align:center}
    .podium-avatar{width:52px;height:52px;border-radius:50%;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
    .podium-name{font-size:12px;font-weight:600;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .podium-score{font-size:13px;font-weight:700;color:#4ade80;font-family:monospace;margin-bottom:4px}
    .podium-bar{border-radius:6px 6px 0 0;width:100%}
    .p1 .podium-bar{height:90px;background:#b8860b}
    .p2 .podium-bar{height:60px;background:#64748b}
    .p3 .podium-bar{height:44px;background:#92400e}
    .p1 .podium-avatar{background:#b8860b44;color:#f59e0b;border:2px solid #b8860b}
    .p2 .podium-avatar{background:#64748b44;color:#94a3b8;border:2px solid #64748b}
    .p3 .podium-avatar{background:#92400e44;color:#d97706;border:2px solid #92400e}
    .final-score-big{font-size:50px;font-weight:900;font-family:monospace;color:#4ade80;line-height:1;margin-bottom:4px}
    .final-score-lbl{font-size:14px;color:var(--muted)}
    .play-again-btn{margin-top:28px;padding:14px 40px;background:#4f78ff;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;font-family:var(--f);cursor:pointer}

    .spin-icon{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spinR .7s linear infinite;vertical-align:middle;margin-right:8px}
    @keyframes spinR{to{transform:rotate(360deg)}}

    /* ── Mobile responsive ── */
    @media(max-width:520px){
      .opts-grid,.reveal-opts{grid-template-columns:1fr}
      .opt-btn{min-height:52px;font-size:13px;padding:12px}
    }
    @media(max-width:400px){
      body{padding:10px}
      .wrap{max-width:100%}
      #s-join{padding:32px 16px}
      .brand h1{font-size:22px}
      .join-input{padding:12px 14px;font-size:14px}
      .inp-code{font-size:16px;letter-spacing:4px}
      .join-btn{padding:13px;font-size:14px}
      .chip{font-size:11px;padding:5px 10px}
      .lby-code{letter-spacing:6px}
      .lby-player-count{font-size:42px}
      .q-txt{font-size:15px;padding:12px 14px}
      .lb-entry{padding:10px 12px;gap:8px}
      .lb-name{font-size:13px}
      .podium-avatar{width:44px;height:44px;font-size:16px}
      .podium-name{font-size:11px}
      .podium-score{font-size:11px}
      .final-score-big{font-size:40px}
      .play-again-btn{width:100%;padding:14px}
      .top-controls{top:10px;right:10px;gap:6px}
      .ctrl-btn{width:36px;height:36px;font-size:14px}
    }

    /* Touch-friendly minimum tap targets */
    .opt-btn, .join-btn, .play-again-btn {
      min-height: 48px;
      -webkit-tap-highlight-color: transparent;
    }
    .ctrl-btn {
      min-width: 44px;
      min-height: 44px;
      -webkit-tap-highlight-color: transparent;
    }

    /* Safe area insets for notched phones */
    body {
      padding-bottom: max(16px, env(safe-area-inset-bottom));
      padding-left:   max(16px, env(safe-area-inset-left));
      padding-right:  max(16px, env(safe-area-inset-right));
    }
  </style>
</head>
<body>

<div class="top-controls">
  <button class="ctrl-btn" id="ttsBtn" onclick="toggleTTS()" title="Read question aloud" style="display:none">🔊</button>
  <button class="ctrl-btn" id="soundBtn" onclick="toggleSound()" title="Toggle sound">🎵</button>
</div>

<div class="wrap">

  <!-- JOIN -->
  <div class="screen on" id="s-join">
    <div class="brand">
      <div class="brand-dot"></div><div class="brand-dot"></div>
      <h1>Edurena Live</h1>
      <div class="brand-dot"></div><div class="brand-dot"></div>
    </div>
    <p class="join-sub">Enter the room code your teacher shared</p>
    <div class="join-card">
      <div class="field-lbl">Room Code</div>
      <input class="inp inp-code" id="inp-code" type="text" placeholder="ABCD12" maxlength="8" autocomplete="off" spellcheck="false" inputmode="text">
      <div class="field-lbl">Your Name</div>
      <input class="inp" id="inp-name" type="text" placeholder="e.g. Adisa O." maxlength="20" autocomplete="off">
      <button class="join-btn" id="joinBtn">Join Quiz</button>
      <div class="join-err" id="joinErr"></div>
    </div>
  </div>

  <!-- LOBBY -->
  <div class="screen" id="s-lobby">
    <div class="lby-badge">Waiting Room</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:8px">Room code</div>
    <div class="lby-code" id="lby-code">------</div>
    <div class="lby-player-count" id="lby-count">0</div>
    <div class="lby-count-lbl">players joined</div>
    <div class="chips" id="lby-chips"></div>
    <div class="lby-wait pulse">Waiting for the teacher to start&hellip;</div>
  </div>

  <!-- COUNTDOWN -->
  <div class="screen" id="s-countdown">
    <div class="cd-label">Get Ready!</div>
    <div class="cd-num" id="cd-num">3</div>
  </div>

  <!-- QUESTION -->
  <div class="screen" id="s-question">
    <div class="q-top">
      <div class="q-meta">
        <div class="q-dots" id="q-dots"></div>
        <div class="timer-arc-wrap">
          <svg class="timer-svg" id="timer-svg" width="44" height="44" viewBox="0 0 44 44">
            <circle class="timer-bg" cx="22" cy="22" r="18"/>
            <circle class="timer-fg" id="timer-arc" cx="22" cy="22" r="18"
              stroke-dasharray="113" stroke-dashoffset="0" stroke="#4f78ff"/>
            <text id="timer-label" class="timer-text" x="22" y="22"
              dominant-baseline="central" text-anchor="middle"
              style="transform:rotate(90deg);transform-origin:22px 22px;fill:#fff">20</text>
          </svg>
        </div>
      </div>
      <div class="q-txt" id="q-txt">Loading&hellip;</div>
      <button class="q-tts-btn" id="q-tts-inner" onclick="readCurrentQuestion()" style="display:none">🔊 Read aloud</button>
    </div>
    <div class="q-body" id="q-body"></div>
  </div>

  <!-- REVEAL -->
  <div class="screen" id="s-reveal">
    <div class="reveal-q" id="reveal-q-txt"></div>
    <div class="reveal-opts" id="reveal-opts"></div>
    <div class="reveal-score-pill" id="reveal-score-pill"></div>
  </div>

  <!-- LEADERBOARD -->
  <div class="screen" id="s-leaderboard">
    <div class="lb-hdr">&#x1F3C6; Leaderboard</div>
    <div class="lb-list" id="lb-list"></div>
    <div class="lb-next-auto" id="lb-next-auto"></div>
  </div>

  <!-- FINAL -->
  <div class="screen" id="s-final">
    <div style="font-size:13px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">Final Results</div>
    <div class="lb-hdr">Game Over!</div>
    <div class="final-podium" id="final-podium"></div>
    <div style="font-size:14px;color:var(--muted);margin-bottom:6px" id="final-rank-badge"></div>
    <div class="final-score-big" id="final-score-big">0</div>
    <div class="final-score-lbl">your total score</div>
    <button class="play-again-btn" onclick="location.reload()">Play Again</button>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script>
(function(){
'use strict';

var P       = new URLSearchParams(window.location.search);
var GAS_URL = EDURENA.scriptUrl || (P.get('script') || '').trim();
var preCode = (P.get('room')   || '').trim().toUpperCase();

/* ── SOUND ── */
var soundOn = true, actx = null;
function getAC(){ if(!actx) try{actx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){} return actx; }
function unlockAC(){ var a=getAC(); if(a&&a.state==='suspended') a.resume(); }
function playTone(f,t,d,v,r){
  if(!soundOn) return; var a=getAC(); if(!a) return;
  try{var o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);
    o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(v||.15,a.currentTime);
    if(r)g.gain.exponentialRampToValueAtTime(.001,a.currentTime+d);
    o.start();o.stop(a.currentTime+d);}catch(e){}
}
function playRevealChime(){ [523,659,784].forEach(function(n,i){setTimeout(function(){playTone(n,'triangle',.25,.1,true);},i*90);}); }
function playCountdownBeep(){ playTone(880,'sine',.12,.12,true); }
function playCountdownGo(){ [523,659,784,1047].forEach(function(n,i){setTimeout(function(){playTone(n,'triangle',.3,.13,true);},i*120);}); }
function playTick(){ playTone(1200,'sine',.04,.05,true); }
function playLockIn(){ playTone(700,'sine',.08,.1,true); }
function toggleSound(){
  soundOn=!soundOn;
  var b=document.getElementById('soundBtn');
  b.textContent=soundOn?'🎵':'🔇'; b.classList.toggle('muted',!soundOn);
}

function doJoin(){
  unlockAC();
  var btn=el('joinBtn'), errEl=el('joinErr');
  sessionId=(el('inp-code').value||'').trim().toUpperCase();
  playerName=(el('inp-name').value||'').trim();
  errEl.textContent='';
  if(sessionId.length<4){errEl.textContent='Enter a valid room code';return;}
  if(playerName.length<2){errEl.textContent='Enter your name (at least 2 chars)';return;}
  if(!db){errEl.textContent='Connection not ready. Please refresh the page.';return;}

  btn.disabled=true; btn.innerHTML='<span class="spin-icon"></span>Joining…';
  playerId='p_'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);

  function joinFail(msg){
    btn.disabled=false; btn.textContent='Join Quiz';
    errEl.textContent=msg||'Could not join. Try again.';
  }

  try{
    db.ref('kahoot/'+sessionId+'/meta').once('value').then(function(metaSnap){
      var meta=metaSnap&&metaSnap.val();
      if(!meta){joinFail('Room not found. Check the code with your teacher.');return;}
      totalQ   = meta.totalQ   || 0;
      timePerQ = meta.timePerQ || 20;
      return db.ref('kahoot/'+sessionId+'/questions').once('value');
    }).then(function(qSnap){
      if(!qSnap) return;
      var raw = qSnap.val();
      var qArr = raw?(Array.isArray(raw)?raw:Object.values(raw)).filter(Boolean):[];
      if(!qArr.length){joinFail('Room not ready yet — ask your teacher to reload the host page.');return;}
      questions = qArr;
      totalQ    = totalQ || questions.length;
      return db.ref('kahoot/'+sessionId+'/players/'+playerId).set({
        name:playerName,score:0,streak:0,lastPoints:0,lastCorrect:false,
        answeredCount:0,joinedAt:firebase.database.ServerValue.TIMESTAMP,online:true
      });
    }).then(function(){
      db.ref('kahoot/'+sessionId+'/players/'+playerId+'/online').onDisconnect().set(false);
      el('lby-code').textContent=sessionId;
      buildDots();
      show('s-lobby');
      btn.disabled=false; btn.textContent='Join Quiz';
      watchLobbyPlayers();
      watchAnswerKeys();
      watchGameState();
    }).catch(function(err){
      joinFail('Error: '+(err&&err.message?err.message:String(err)));
    });
  }catch(e){
    joinFail('Unexpected error: '+e.message);
  }
}

/* ════════════════════════════════════════
   GAME STATE WATCHER
════════════════════════════════════════ */
function watchGameState(){
  stateRef=db.ref('kahoot/'+sessionId+'/state');
  stateRef.on('value',function(snap){
    var st=(snap&&snap.val())||{};
    var phase=st.phase||'lobby';

    if(phase==='countdown'){
      detachLobby();
      startCountdown(st.countdownValue||3);
    }
    else if(phase==='question'){
      detachLobby();
      var qi=typeof st.qIndex==='number'?st.qIndex:parseInt(st.qIndex||'0');
      if(st.timePerQ) timePerQ=st.timePerQ;
      if(qi!==currentQIdx){
        var serverTs=(st.qStartAt&&st.qStartAt>1000)?st.qStartAt:Date.now();
        startQuestion(qi, serverTs);
      }
    }
    else if(phase==='reveal'){
      cancelDeadlineTimeout();
      showReveal(
        typeof st.qIndex==='number'?st.qIndex:parseInt(st.qIndex||'0'),
        st.correctAnswer||'',
        st.correctText||''
      );
    }
    else if(phase==='leaderboard'){
      cancelDeadlineTimeout();
      showLeaderboard(st.autoAdvanceAt||0);
    }
    else if(phase==='final'){
      cancelDeadlineTimeout();
      showFinal();
    }
  });
  if(!playersRef) playersRef=db.ref('kahoot/'+sessionId+'/players');
}

function detachLobby(){
  if(lobbyPRef){try{lobbyPRef.off('value');}catch(_){}lobbyPRef=null;}
}

function cancelDeadlineTimeout(){
  if(deadlineTimeout){clearTimeout(deadlineTimeout);deadlineTimeout=null;}
  if(roundTimeout){clearTimeout(roundTimeout);roundTimeout=null;}
}

/* ════════════════════════════════════════
   START QUESTION
════════════════════════════════════════ */
function startQuestion(qi, serverTs){
  cancelDeadlineTimeout();
  stopTimer();
  answered=false;
  currentQIdx=qi;
  lastTickSecond=-1;

  var networkDelay=Math.max(0,Date.now()-serverTs);
  if(networkDelay>=timePerQ*1000){
    qStartAt_ms=Date.now()-(timePerQ*1000)+1500;
  } else {
    qStartAt_ms=Date.now();
  }

  if(currentUtt){window.speechSynthesis.cancel();currentUtt=null;}
  var q=questions[qi]; if(!q) return;
  setDot(qi);
  el('q-txt').textContent=q.question;
  renderAnswerArea(q);
  show('s-question');
  resetTTSBtn();
  runTimer();

  var msLeft=timePerQ*1000;
  deadlineTimeout=setTimeout(function(){
    if(currentQIdx===qi&&!answered) timeOut();
  },msLeft+800);

  if(ttsOn) setTimeout(readCurrentQuestion,300);
}

function renderAnswerArea(q){
  var body=el('q-body'); body.innerHTML='';
  if(q.type==='MCQ'||q.type==='TF'){
    var grid=document.createElement('div'); grid.className='opts-grid';
    (q.options||[]).forEach(function(opt,i){
      var btn=document.createElement('button');
      btn.className='opt-btn '+COLORS[i%4];
      btn.innerHTML='<span class="opt-shape">'+SHAPES[i%4]+'</span><span class="opt-txt">'+esc(opt)+'</span>';
      btn.dataset.answer=opt; btn.dataset.idx=i;
      btn.addEventListener('pointerdown',(function(o,b){
        return function(ev){ev.preventDefault();if(!answered)submitAnswer(o,b);};
      })(opt,btn));
      grid.appendChild(btn);
    });
    body.appendChild(grid);
  } else {
    var area=document.createElement('div'); area.className='short-area';
    var inp=document.createElement('input');
    inp.className='short-inp'; inp.type='text';
    inp.placeholder='Type your answer and press Enter';
    inp.maxLength=120; inp.autocomplete='off';
    var sb=document.createElement('button'); sb.className='sub-btn'; sb.textContent='Submit';
    sb.addEventListener('pointerdown',function(ev){
      ev.preventDefault();if(!answered&&inp.value.trim())submitAnswer(inp.value.trim(),null);
    });
    inp.addEventListener('keydown',function(e){
      if(e.key==='Enter'&&!answered&&inp.value.trim())submitAnswer(inp.value.trim(),null);
    });
    area.appendChild(inp); area.appendChild(sb); body.appendChild(area);
    setTimeout(function(){inp.focus();},80);
  }
}

/* ════════════════════════════════════════
   TIMER
════════════════════════════════════════ */
function runTimer(){
  stopTimer();
  var arc=el('timer-arc'), lbl=el('timer-label');
  function tick(){
    var deadline=qStartAt_ms+timePerQ*1000;
    var left=Math.max(0,(deadline-Date.now())/1000);
    var ratio=left/timePerQ;
    arc.setAttribute('stroke-dashoffset',ARC_TOTAL*(1-ratio));
    arc.setAttribute('stroke',ratio>.5?'#4ade80':ratio>.25?'#f59e0b':'#ef4444');
    lbl.textContent=Math.ceil(left);
    var secLeft=Math.ceil(left);
    if(secLeft<=5&&secLeft!==lastTickSecond){lastTickSecond=secLeft;playTick();}
    if(left>0){timerRaf=requestAnimationFrame(tick);}
  }
  timerRaf=requestAnimationFrame(tick);
}
function stopTimer(){if(timerRaf){cancelAnimationFrame(timerRaf);timerRaf=null;}}

/* ════════════════════════════════════════
   SUBMIT ANSWER
════════════════════════════════════════ */
function submitAnswer(answer, btnEl){
  if(answered) return;
  answered=true;
  cancelDeadlineTimeout();
  stopTimer();
  if(currentUtt){window.speechSynthesis.cancel();currentUtt=null;}

  el('q-body').querySelectorAll('.opt-btn,.sub-btn').forEach(function(b){b.disabled=true;});

  var deadline     =qStartAt_ms+timePerQ*1000;
  var timeRemMs    =Math.max(0,deadline-Date.now());
  var timeRemSec   =timeRemMs/1000;

  var key=answerKeyCache[currentQIdx];
  var isCorrect=false;

  if(key){
    var sa=normAnswer(answer);
    var ca=normAnswer(key.correct||'');
    var ct=normAnswer(key.correctText||key.correct||'');

    if(key.type==='SHORT'){
      var variants=ca.split('|');
      isCorrect=variants.some(function(v){
        var vt=v.trim();
        return vt===sa||sa.indexOf(vt)!==-1||(vt.length>=3&&vt.indexOf(sa)!==-1&&sa.length>=3);
      });
    } else if(key.type==='TF'){
      var normTF=function(x){
        var s=normAnswer(x);
        if(s==='true'||s==='a'||s==='yes'||s==='1') return 'true';
        if(s==='false'||s==='b'||s==='no'||s==='0') return 'false';
        return s;
      };
      isCorrect=normTF(sa)===normTF(ca);
    } else {
      var q=questions[currentQIdx];
      var correctText=ct||ca;
      if(/^[a-d]$/.test(ca)&&q&&q.options){
        var letterIdx=ca.charCodeAt(0)-97;
        if(q.options[letterIdx]) correctText=normAnswer(q.options[letterIdx]);
      }
      isCorrect=sa===correctText||sa===ca;
    }
  }

  var pts        =key?(key.points||1):1;
  var basePoints =pts*1000;
  var speedBonus =isCorrect?Math.round((timeRemSec/(timePerQ||20))*1000):0;
  var newStreak  =isCorrect?streak+1:0;
  var streakBonus=isCorrect?newStreak*50:0;
  var pointsEarned=isCorrect?(basePoints+speedBonus+streakBonus):0;

  streak    =newStreak;
  totalScore=totalScore+pointsEarned;
  myResults[currentQIdx]={isCorrect:isCorrect,pointsEarned:pointsEarned,myAnswer:answer};

  // Neutral lock-in feedback — no pass/fail revealed yet
  showAnsweredFeedback(btnEl, answer);

  var rawUpdate={};
  rawUpdate['kahoot/'+sessionId+'/rawAnswers/'+playerId+'/'+currentQIdx]={
    answer:        answer,
    timeRemaining: timeRemSec,
    currentStreak: streak,
    isCorrect:     isCorrect,
    pointsEarned:  pointsEarned,
    lockedAt:      firebase.database.ServerValue.TIMESTAMP
  };
  rawUpdate['kahoot/'+sessionId+'/players/'+playerId+'/streak']       =streak;
  rawUpdate['kahoot/'+sessionId+'/players/'+playerId+'/lastPoints']   =pointsEarned;
  rawUpdate['kahoot/'+sessionId+'/players/'+playerId+'/lastCorrect']  =isCorrect;
  rawUpdate['kahoot/'+sessionId+'/players/'+playerId+'/answeredCount']=currentQIdx+1;
  rawUpdate['kahoot/'+sessionId+'/players/'+playerId+'/online']       =true;
  db.ref().update(rawUpdate);

  if(pointsEarned>0){
    db.ref('kahoot/'+sessionId+'/players/'+playerId+'/score').transaction(function(current){
      return (current||0)+pointsEarned;
    });
  }
}

/* ════════════════════════════════════════
   ANSWERED FEEDBACK — neutral lock-in
════════════════════════════════════════ */
function showAnsweredFeedback(selectedBtn, answer){
  var body=el('q-body');
  var allBtns=body.querySelectorAll('.opt-btn');
  allBtns.forEach(function(b){
    var isPicked=(b===selectedBtn||normAnswer(b.dataset.answer||'')===normAnswer(answer));
    if(isPicked){
      b.style.outline='4px solid #fff';
      b.style.outlineOffset='-4px';
      b.style.filter='brightness(1.15)';
    } else {
      b.style.filter='brightness(.45) grayscale(.3)';
    }
  });

  playLockIn();

  var overlay=document.createElement('div');
  overlay.className='answered-overlay';
  overlay.innerHTML=
    '<div style="font-size:48px;margin-bottom:6px">🔒</div>'+
    '<div style="font-size:17px;font-weight:700;color:#f8fafc;margin-bottom:4px">Answer locked in!</div>'+
    '<div style="font-size:13px;color:var(--muted);margin-bottom:10px">Waiting for the teacher to reveal…</div>'+
    '<div class="total-pill">Score so far: <span>'+totalScore.toLocaleString()+' pts</span></div>';
  body.appendChild(overlay);
}

/* ════════════════════════════════════════
   REVEAL — FIX 1
   No "correct / wrong" messaging to the player.
   Just show all options, highlight the correct one green,
   mark the player's picked option if it was wrong (dim + border).
════════════════════════════════════════ */
function showReveal(qi, serverCorrect, correctText){
  stopTimer();
  cancelDeadlineTimeout();
  if(currentUtt){window.speechSynthesis.cancel();currentUtt=null;}
  var q=questions[qi]||questions[currentQIdx]; if(!q) return;
  var correct=serverCorrect||'';

  el('reveal-q-txt').textContent=q.question;
  var optsWrap=el('reveal-opts'); optsWrap.innerHTML='';

  // Determine what the player answered
  var myR   =myResults[qi];
  var myAns =myR?normAnswer(myR.myAnswer||''):'';

  // Play a gentle chime — no pass/fail sound
  playRevealChime();

  if(q.type==='MCQ'||q.type==='TF'){
    (q.options||[]).forEach(function(opt,i){
      // Is this the correct option?
      var isCorrectOpt=normAnswer(opt)===normAnswer(correct)
                    || String.fromCharCode(65+i)===correct.toUpperCase()
                    || normAnswer(opt)===normAnswer(correctText||'');

      // Did the player pick this option?
      var playerPickedThis=myAns&&(normAnswer(opt)===myAns);

      var div=document.createElement('div');
      var cls='reveal-opt';
      var suffix='';

      if(isCorrectOpt){
        cls+=' is-correct';
        suffix='<span class="reveal-correct-tick">✓</span>';
      } else if(playerPickedThis){
        // Player picked this but it's wrong — show with a muted border so they know what they chose
        cls+=' my-pick-wrong';
        suffix='<span class="reveal-my-marker">your pick</span>';
      } else {
        cls+=' not-picked';
      }

      div.className=cls;
      div.innerHTML='<div class="reveal-opt-shape">'+SHAPES[i%4]+'</div>'
        +'<span style="flex:1">'+esc(opt)+'</span>'
        +suffix;
      optsWrap.appendChild(div);
    });
  } else {
    // Short answer — just show the correct answer highlighted
    optsWrap.innerHTML='<div class="reveal-opt is-correct" style="grid-column:1/-1">'
      +'<div class="reveal-opt-shape">✓</div>'
      +'<span style="flex:1">'+esc(correctText||correct)+'</span>'
      +'</div>';
    // Show player's answer if they gave one
    if(myAns){
      optsWrap.innerHTML+='<div class="reveal-opt my-pick-wrong" style="grid-column:1/-1">'
        +'<div class="reveal-opt-shape">📝</div>'
        +'<span style="flex:1">You answered: '+esc(myR.myAnswer||myAns)+'</span>'
        +'</div>';
    }
  }

  // Score pill — just total score, no pass/fail label
  el('reveal-score-pill').innerHTML=
    '<div class="rsp-label">Your score</div>'
    +'<div class="rsp-score">'+totalScore.toLocaleString()+' pts</div>';

  show('s-reveal');
}

/* ════════════════════════════════════════
   LEADERBOARD
════════════════════════════════════════ */
function showLeaderboard(autoAdvanceAt){
  if(!playersRef) playersRef=db.ref('kahoot/'+sessionId+'/players');
  playersRef.once('value',function(snap){
    var players=(snap&&snap.val())||{};
    var sorted=Object.entries(players)
      .filter(function(e){return e[1].name;})
      .sort(function(a,b){return (b[1].score||0)-(a[1].score||0);});
    var medals=['🥇','🥈','🥉'];
    el('lb-list').innerHTML=sorted.slice(0,10).map(function(e,i){
      var pid=e[0],p=e[1],isMe=pid===playerId;
      var delta=p.lastPoints>0?'<span class="lb-delta">+'+p.lastPoints+'</span>':'';
      return '<div class="lb-row'+(isMe?' lb-me':'')+'" style="animation-delay:'+i*55+'ms">'
        +'<div class="lb-rank">'+(medals[i]||(i+1))+'</div>'
        +'<div class="lb-name">'+esc(p.name)+(isMe?' <span style="font-size:10px;color:#7fa4ff">(you)</span>':'')+'</div>'
        +(p.streak>1?'<span style="font-size:11px;color:#f59e0b">🔥'+p.streak+'</span>':'')
        +'<div class="lb-score">'+((p.score||0).toLocaleString())+delta+'</div>'
        +'</div>';
    }).join('');
    show('s-leaderboard');

    if(autoAdvanceAt&&autoAdvanceAt>Date.now()){
      var iv2=setInterval(function(){
        var cd=Math.max(0,Math.ceil((autoAdvanceAt-Date.now())/1000));
        el('lb-next-auto').textContent=cd>0?'Next question in '+cd+'s…':'Get ready! ⚡';
        if(cd<=0)clearInterval(iv2);
      },500);
    } else {
      el('lb-next-auto').textContent='Waiting for teacher…';
    }
  });
}

/* ════════════════════════════════════════
   FINAL PODIUM
════════════════════════════════════════ */
function showFinal(){
  stopTimer();
  cancelDeadlineTimeout();
  [523,659,784,1047,1318].forEach(function(n,i){
    setTimeout(function(){playTone(n,'triangle',.4,.14,true);},i*140);
  });
  if(!playersRef) playersRef=db.ref('kahoot/'+sessionId+'/players');
  playersRef.once('value',function(snap){
    var players=(snap&&snap.val())||{};
    var sorted=Object.entries(players)
      .filter(function(e){return e[1].name;})
      .sort(function(a,b){return (b[1].score||0)-(a[1].score||0);});
    var podiumOrder=[1,0,2],pClasses=['p2','p1','p3'];
    var podium=el('final-podium'); podium.innerHTML='';
    podiumOrder.forEach(function(rank,slot){
      var entry=sorted[rank]; if(!entry) return;
      var p=entry[1],div=document.createElement('div');
      div.className='podium-slot '+pClasses[slot];
      div.innerHTML='<div class="podium-avatar">'+(p.name||'?').slice(0,2).toUpperCase()+'</div>'
        +'<div class="podium-name">'+esc(p.name)+'</div>'
        +'<div class="podium-score">'+((p.score||0).toLocaleString())+'</div>'
        +'<div class="podium-bar"></div>';
      podium.appendChild(div);
    });
    var myRank=sorted.findIndex(function(e){return e[0]===playerId;});
    var myFinalScore=myRank>=0?(sorted[myRank][1].score||0):totalScore;
    var rankStr=myRank===0?'1st':myRank===1?'2nd':myRank===2?'3rd':(myRank>=0?(myRank+1)+'th':'—');
    el('final-rank-badge').textContent='You finished '+rankStr+' of '+sorted.length+' players';
    el('final-score-big').textContent=myFinalScore.toLocaleString();
    show('s-final');
  });
}

  if(stateRef)     try{stateRef.off('value');}catch(_){}
  if(playersRef)   try{playersRef.off('value');}catch(_){}
  if(lobbyPRef)    try{lobbyPRef.off('value');}catch(_){}
  if(answerKeyRef) try{answerKeyRef.off('value');}catch(_){}
});

}());
