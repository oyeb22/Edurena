<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edurena — Where Learning Becomes Competition</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>

/* ============================================================
   TOKENS
   ============================================================ */
:root {
  --bg:       #03060f;
  --surface:  #060d1e;
  --surface2: #0a1428;
  --brown:    #3a1f08;
  --amber:    #f5a623;
  --amber2:   #ffc144;
  --white:    #f0f4ff;
  --muted:    #7a8db0;
  --border:   rgba(17,32,64,1);
  --purple:   #a78bfa;
  --r:        10px;
}

* { margin:0; padding:0; box-sizing:border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Sora', system-ui, sans-serif;
  background: var(--bg);
  color: var(--white);
  overflow-x: hidden;
}

/* ============================================================
   STICKY NAV — hidden until hero exits viewport
   ============================================================ */
#topnav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 40px;
  height: 60px;
  transform: translateY(-100%);
  transition: transform 0.4s cubic-bezier(.5,.05,.3,1);
}
#topnav.visible { transform: translateY(0); }
.nav-brand { display:flex; align-items:center; gap:10px; text-decoration:none; }
.nav-logo-box {
  width:32px; height:32px;
  background: var(--amber);
  border-radius:9px;
  display:flex; align-items:center; justify-content:center;
}
.nav-wordmark { font-size:17px; font-weight:800; color:var(--white); }
.nav-wordmark span { color:var(--amber); }
.nav-links { display:flex; align-items:center; gap:24px; }
.nav-links a {
  font-size:14px; color:var(--muted);
  text-decoration:none; transition:color .2s;
}
.nav-links a:hover { color:var(--white); }
.nav-cta {
  background:var(--amber); color:var(--bg);
  padding:8px 20px; border-radius:7px;
  font-size:14px; font-weight:700;
  text-decoration:none; transition:background .2s;
}
.nav-cta:hover { background:var(--amber2); }

/* ============================================================
   SCROLL REVEAL — applied to each section
   ============================================================ */
.reveal {
  opacity: 0;
  transform: translateY(28px);
  transition: opacity 0.7s ease, transform 0.7s ease;
}
.reveal.in {
  opacity: 1;
  transform: translateY(0);
}

/* ============================================================
   SECTION 1 — HERO
   ============================================================ */
#hero {
  position: relative;
  width: 100%;
  height: 100vh;
  min-height: 560px;
  overflow: hidden;
  font-family: 'Sora', system-ui, sans-serif;
}

/* Backgrounds */
.hero-bg-grad {
  position: absolute; inset: 0;
  background: radial-gradient(circle at center, #fff8e0 0%, #f5e89a 50%, #e8c84e 100%);
  transition: opacity 1s ease;
}
.hero-bg-grad.fade { opacity: 0; }

.hero-bg-sat {
  position: absolute; inset: 0;
  background: radial-gradient(circle at 70% center, #ffd44a 0%, #f5a623 60%, #d68a14 100%);
  opacity: 0;
  transition: opacity 1s ease;
}
.hero-bg-sat.on { opacity: 1; }

/* Pulse rings */
@keyframes ringPulse {
  0%   { transform: translate(-50%,-50%) scale(0.3); opacity: 0.6; }
  100% { transform: translate(-50%,-50%) scale(2.6); opacity: 0; }
}
.hero-pulse {
  position: absolute; left:50%; top:50%;
  border: 2px solid rgba(184,118,26,0.5);
  border-radius: 50%;
  width: 140px; height: 140px;
  opacity: 0;
  animation: ringPulse 2.5s ease-out infinite both;
  pointer-events: none;
  transition: opacity .5s ease;
}
.hero-pulse.p2 { animation-delay: 0.8s; }
.hero-pulse.p3 { animation-delay: 1.6s; }
.hero-pulse.gone { opacity:0; animation:none; }

/* Dashed ring */
@keyframes dashSpin {
  from { transform: translate(-50%,-50%) rotate(0deg); }
  to   { transform: translate(-50%,-50%) rotate(360deg); }
}
.hero-dring {
  position: absolute; left:50%; top:50%;
  width: 240px; height: 240px;
  border: 3px dashed #b8761a;
  border-radius: 50%;
  animation: dashSpin 8s linear infinite;
  transform-origin: center;
  pointer-events: none;
  transition: left 1.2s cubic-bezier(.5,.05,.3,1), opacity .5s ease;
}
.hero-dring.shift { left:25%; opacity:0; }

/* Gold circle behind logo */
.hero-circle {
  position: absolute; left:50%; top:50%;
  width: 190px; height: 190px;
  border-radius: 50%;
  background: radial-gradient(circle at 50% 40%, #ffe07a 0%, #ffc144 55%, #d68a14 100%);
  transform: translate(-50%,-50%) scale(0);
  transition: transform 1s cubic-bezier(.34,1.56,.64,1),
              left 1.2s cubic-bezier(.5,.05,.3,1);
  z-index: 5;
  box-shadow: 0 4px 24px rgba(184,118,26,0.35);
}
.hero-circle.show   { transform: translate(-50%,-50%) scale(1); }
.hero-circle.shifted { left: 25%; }

/* GIF logo on gold circle */
.hero-logo {
  position: absolute; left:50%; top:50%;
  transform: translate(-50%,-50%) scale(0);
  transition: transform 1s cubic-bezier(.34,1.56,.64,1) .1s,
              left 1.2s cubic-bezier(.5,.05,.3,1);
  z-index: 6;
}
.hero-logo.show   { transform: translate(-50%,-50%) scale(1); }
.hero-logo.shifted { left: 25%; }
.hero-logo img {
  width: 160px; height: 90px;
  object-fit: contain;
  display: block;
}

/* Brown card */
.hero-brown {
  position: absolute; left:0; top:50%;
  transform: translate(-100%,-50%);
  width: 50%; height: 65%;
  background: var(--brown);
  border-radius: 0 16px 16px 0;
  transition: transform 1.1s cubic-bezier(.5,.05,.3,1);
  z-index: 3;
  box-shadow: 0 8px 40px rgba(58,31,8,0.3);
}
.hero-brown.expand { transform: translate(0,-50%); }

/* Wordmark + tagline */
.hero-wm {
  position: absolute; left:55%; top:50%;
  transform: translate(0,-50%);
  opacity: 0;
  transition: opacity .8s ease .2s;
  z-index: 4;
}
.hero-wm.show { opacity: 1; }
.hero-wm-word {
  font-size: clamp(44px, 6vw, 72px);
  font-weight: 800;
  color: var(--brown);
  letter-spacing: -2px;
  line-height: 1;
}
.hero-wm-word span { color: #b8761a; }
.hero-wm-tag {
  font-size: 13px;
  color: var(--brown);
  letter-spacing: 0.3em;
  text-transform: uppercase;
  margin-top: 14px;
  font-weight: 600;
  opacity: 0.8;
}

/* Scroll hint */
.hero-scroll-hint {
  position: absolute;
  bottom: 32px; left:50%;
  transform: translateX(-50%);
  display: flex; flex-direction:column; align-items:center; gap:6px;
  opacity: 0;
  transition: opacity .8s ease;
  z-index: 7;
}
.hero-scroll-hint.show { opacity: 1; }
.hero-scroll-hint span {
  font-size: 11px; letter-spacing:.2em;
  color: rgba(58,31,8,0.6);
  text-transform: uppercase;
}
@keyframes bounceDown {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(6px); }
}
.hero-scroll-hint .arrow {
  width: 20px; height: 20px;
  border-right: 2px solid rgba(58,31,8,0.5);
  border-bottom: 2px solid rgba(58,31,8,0.5);
  transform: rotate(45deg);
  animation: bounceDown 1.4s ease-in-out infinite;
}

/* ============================================================
   PLACEHOLDER SECTIONS (Pass 2 & 3 will fill these)
   ============================================================ */
.section-placeholder {
  min-height: 100vh;
  display: flex; align-items:center; justify-content:center;
  font-size: 18px; color: var(--muted);
  border-top: 1px solid var(--border);
}

</style>
</head>
<body>

<!-- STICKY NAV -->
<nav id="topnav" aria-label="Main navigation">
  <a class="nav-brand" href="#hero">
    <div class="nav-logo-box">
      <svg width="20" height="20" viewBox="-130 -100 260 210">
        <path d="M -110 -55 L -65 -55 L -45 15 L -25 -30 L 25 -30 L 45 15 L 65 -55 L 110 -55 L 110 40 L 65 40 L 45 -15 L 25 40 L -25 40 L -45 -15 L -65 40 L -110 40 Z" fill="#03060f"/>
        <circle cx="-35" cy="20" r="9" fill="#f5a623"/>
        <circle cx="35"  cy="20" r="9" fill="#f5a623"/>
      </svg>
    </div>
    <span class="nav-wordmark">edu<span>rena</span></span>
  </a>
  <div class="nav-links">
    <a href="#howitworks">How it works</a>
    <a href="#pricing">Pricing</a>
    <a href="#signup">Sign up</a>
    <a href="#" style="color:var(--white)">Sign in</a>
    <a class="nav-cta" href="#signup">Get started</a>
  </div>
</nav>

<!-- ============================================================
     SECTION 1 — HERO
     ============================================================ -->
<section id="hero">
  <div class="hero-bg-grad" id="heroBgGrad"></div>
  <div class="hero-bg-sat"  id="heroBgSat"></div>

  <div class="hero-pulse"    id="heroPr1"></div>
  <div class="hero-pulse p2" id="heroPr2"></div>
  <div class="hero-pulse p3" id="heroPr3"></div>

  <div class="hero-dring"  id="heroDring"></div>
  <div class="hero-brown"  id="heroBrown"></div>
  <div class="hero-circle" id="heroCircle"></div>

  <div class="hero-logo" id="heroLogo">
    <img src="./assets/logo_tasteful_3.7s.gif" alt="Edurena animated logo">
  </div>

  <div class="hero-wm" id="heroWm">
    <div class="hero-wm-word">edu<span>rena</span></div>
    <div class="hero-wm-tag">Convergence of learners</div>
  </div>

  <div class="hero-scroll-hint" id="heroScroll">
    <span>Scroll</span>
    <div class="arrow"></div>
  </div>
</section>

<!-- PLACEHOLDER — Pass 2 will replace these -->
<section id="about"      class="section-placeholder reveal">Section 2 — About (Pass 2)</section>
<section id="features"   class="section-placeholder reveal">Section 3 — Features wheel (Pass 2)</section>
<section id="howitworks" class="section-placeholder reveal">Section 4 — How it works (Pass 2)</section>
<section id="pricing"    class="section-placeholder reveal">Section 5 — Pricing (Pass 3)</section>
<section id="signup"     class="section-placeholder reveal">Section 6 — Signup CTA (Pass 3)</section>
<footer  id="footer"     class="section-placeholder reveal">Section 7 — Footer (Pass 3)</footer>

<script>
(function(){

  /* ---- Hero animation ---- */
  const bgGrad  = document.getElementById('heroBgGrad');
  const bgSat   = document.getElementById('heroBgSat');
  const dring   = document.getElementById('heroDring');
  const circle  = document.getElementById('heroCircle');
  const logo    = document.getElementById('heroLogo');
  const brown   = document.getElementById('heroBrown');
  const wm      = document.getElementById('heroWm');
  const scroll  = document.getElementById('heroScroll');
  const pr1     = document.getElementById('heroPr1');
  const pr2     = document.getElementById('heroPr2');
  const pr3     = document.getElementById('heroPr3');

  function heroReset() {
    bgGrad.classList.remove('fade');
    bgSat.classList.remove('on');
    dring.classList.remove('shift');
    circle.classList.remove('show','shifted');
    logo.classList.remove('show','shifted');
    brown.classList.remove('expand');
    wm.classList.remove('show');
    scroll.classList.remove('show');
    [pr1,pr2,pr3].forEach(p => p.classList.remove('gone'));
  }

  function heroPlay() {
    heroReset();
    /* Phase 1 — logo + circle scale in */
    setTimeout(() => {
      circle.classList.add('show');
      logo.classList.add('show');
    }, 200);

    /* Phase 2 — shift left, brown card, bg saturate, pulses gone */
    setTimeout(() => {
      bgGrad.classList.add('fade');
      bgSat.classList.add('on');
      circle.classList.add('shifted');
      logo.classList.add('shifted');
      dring.classList.add('shift');
      brown.classList.add('expand');
      [pr1,pr2,pr3].forEach(p => p.classList.add('gone'));
    }, 4200);  /* GIF is 3.7s — shift after it finishes */

    /* Phase 3 — wordmark */
    setTimeout(() => wm.classList.add('show'), 5400);

    /* Scroll hint after everything settles */
    setTimeout(() => scroll.classList.add('show'), 6200);
  }

  heroPlay();

  /* ---- Sticky nav — show once hero exits viewport ---- */
  const nav  = document.getElementById('topnav');
  const hero = document.getElementById('hero');

  const navObserver = new IntersectionObserver(
    ([entry]) => {
      nav.classList.toggle('visible', !entry.isIntersecting);
    },
    { threshold: 0.05 }
  );
  navObserver.observe(hero);

  /* ---- Scroll reveal for all .reveal sections ---- */
  const revealEls = document.querySelectorAll('.reveal');
  const revealObs = new IntersectionObserver(
    (entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('in');
          revealObs.unobserve(e.target);
        }
      });
    },
    { threshold: 0.12 }
  );
  revealEls.forEach(el => revealObs.observe(el));

})();
</script>
</body>
</html>
